    }
    card.appendChild(safe); app.appendChild(card); return;
  }
  app.innerHTML="<h2>"+station.label+"</h2><p class='muted'>Enter your PIN to clock in, take a break, or clock out.</p>";
  if(!staff.length){ const e=document.createElement("div"); e.className="empty card"; e.textContent="No staff configured. Add staff (name + PIN) in the builder."; app.appendChild(e); return; }
  // PIN pad
  const pad=document.createElement("div"); pad.className="card"; pad.style.maxWidth="260px";
  const disp=document.createElement("div"); disp.style.cssText="font-size:28px;letter-spacing:8px;text-align:center;min-height:36px;margin-bottom:8px"; disp.textContent=pinBuf.replace(/./g,"•")||"—"; pad.appendChild(disp);
  const grid=document.createElement("div"); grid.style.cssText="display:grid;grid-template-columns:repeat(3,1fr);gap:6px";
  const press=d=>{ pinBuf=(pinBuf+d).slice(0,8); render(); };
  ["1","2","3","4","5","6","7","8","9"].forEach(d=>{ const b=document.createElement("button"); b.textContent=d; b.onclick=()=>press(d); grid.appendChild(b); });
  const clr=document.createElement("button"); clr.textContent="⌫"; clr.onclick=()=>{ pinBuf=pinBuf.slice(0,-1); render(); }; grid.appendChild(clr);
  const zero=document.createElement("button"); zero.textContent="0"; zero.onclick=()=>press("0"); grid.appendChild(zero);
  const ent=document.createElement("button"); ent.className="primary"; ent.textContent="✓"; ent.onclick=()=>{ const who=staff.find(s=>String(s.pin)===pinBuf); if(who){ if(openPunch(who.id)){ clockAction={staffId:who.id}; pinBuf=""; render(); } else clockIn(who); } else { pinBuf=""; flash("PIN not recognized"); render(); } }; grid.appendChild(ent);
  pad.appendChild(grid); app.appendChild(pad);
  // who's on the clock — with live hours, break state, and (if waged) earnings
  const on=staff.filter(s=>openPunch(s.id));
  const oc=document.createElement("div"); oc.className="card"; oc.innerHTML="<div class='row'><b>On the clock</b></div>";
  if(!on.length){ const e=document.createElement("div"); e.className="muted"; e.textContent="Nobody clocked in."; oc.appendChild(e); }
  on.forEach(s=>{ const p=openPunch(s.id); const br=onBreak(p)?" · <span style='color:var(--warn,#c99a12)'>on break</span>":""; const wg=staffWage(s.id)?" · $"+earnedToday(s.id).toFixed(2):"";
    const row=document.createElement("div"); row.className="line"; row.innerHTML="<span>"+s.name+"</span><span class='spacer'></span><span class='muted'>in "+p.in+" · "+hoursToday(s.id).toFixed(2)+" h"+br+wg+"</span>"; oc.appendChild(row); });
  app.appendChild(oc);
}

/* APPOINTMENTS — book a customer + service + time; check-in turns a booking into a real order in the pipeline.
   Bookings live in DB.bookings; services are the catalog items. Staff options come from FLOW.staff/performers. */
let bookForm = { name:"", service:"", time:"", staff:"" };
function providerNames(){ return (FLOW.performers) || (FLOW.staff||[]).map(s=>s.name); }
function checkInBooking(bk){
  DB=loadDB(); DB.seq++;
  const item=FLOW.catalog.find(i=>i.id===bk.service);
  const line={ id:"L"+DB.seq, catId:item.id, name:item.name, modLabel:"", flags:[], performer:bk.staff||null, price:item.price, qty:1, category:item.category, path:(item.path||[]).slice(), stage:0 };
  const rec={ id:"R"+DB.seq, number:DB.seq, lines:[line], tenders:[], createdAt:new Date().toISOString().slice(11,16), ts:Date.now(), fromBooking:bk.id };
  if(bk.name){ rec.customer={ name:bk.name, phone:bk.phone||"" }; }
  if(storesOn()) rec.storeId = homeStore() || defaultStoreId();
  rec.status = allComplete(rec) ? "READY" : "INPROGRESS";
  DB.records.push(rec);
  const b=(DB.bookings||[]).find(x=>x.id===bk.id); if(b){ b.status="CHECKEDIN"; b.orderNo=rec.number; }
  saveDB(DB); render();
}
function renderBooking(app, station){
  app.innerHTML="<h2>"+station.label+"</h2>";
  const services=FLOW.catalog;
  // booking form
  const f=document.createElement("div"); f.className="card"; f.innerHTML="<div class='row'><b>New appointment</b></div>";
  const mk=(label,el)=>{ const d=document.createElement("div"); d.className="fld"; const s=document.createElement("span"); s.className="flab"; s.textContent=label; d.appendChild(s); d.appendChild(el); return d; };
  const name=document.createElement("input"); name.id="bkName"; name.placeholder="Customer"; name.value=bookForm.name; name.oninput=e=>bookForm.name=e.target.value;
  const svc=document.createElement("select"); svc.id="bkService"; svc.innerHTML="<option value=''>— service —</option>"+services.map(i=>"<option value='"+i.id+"'"+(bookForm.service===i.id?" selected":"")+">"+i.name+" ("+money(i.price)+")</option>").join(""); svc.onchange=e=>bookForm.service=e.target.value;
  const time=document.createElement("input"); time.id="bkTime"; time.type="time"; time.value=bookForm.time; time.oninput=e=>bookForm.time=e.target.value;
  f.appendChild(mk("Customer", name)); f.appendChild(mk("Service", svc)); f.appendChild(mk("Time", time));
  const provs=providerNames();
  if(provs.length){ const st=document.createElement("select"); st.id="bkStaff"; st.innerHTML="<option value=''>— anyone —</option>"+provs.map(n=>"<option"+(bookForm.staff===n?" selected":"")+">"+n+"</option>").join(""); st.onchange=e=>bookForm.staff=e.target.value; f.appendChild(mk("With", st)); }
  const add=document.createElement("button"); add.className="primary"; add.textContent="Book it"; add.style.marginTop="8px";
  add.onclick=()=>{ if(!bookForm.service||!bookForm.time){ flash("Pick a service and a time"); return; } DB=loadDB(); DB.bookings.push({ id:"B"+Date.now(), name:bookForm.name, service:bookForm.service, time:bookForm.time, staff:bookForm.staff, status:"BOOKED" }); bookForm={ name:"", service:"", time:"", staff:"" }; saveDB(DB); render(); };
  f.appendChild(add); app.appendChild(f);
  // today's schedule (sorted by time)
  const list=(DB.bookings||[]).slice().sort((a,b)=>(a.time||"").localeCompare(b.time||""));
  const sc=document.createElement("div"); sc.className="card"; sc.innerHTML="<div class='row'><b>Today's schedule</b></div>";
  if(!list.length){ const e=document.createElement("div"); e.className="muted"; e.textContent="No appointments yet."; sc.appendChild(e); }
  list.forEach(bk=>{ const item=FLOW.catalog.find(i=>i.id===bk.service)||{name:"?"}; const row=document.createElement("div"); row.className="line";
    const done=bk.status==="CHECKEDIN";
    row.innerHTML="<span><b>"+(bk.time||"—")+"</b> · "+(bk.name||"Guest")+" — "+item.name+(bk.staff?" <span class='pill'>"+bk.staff+"</span>":"")+(done?" <span class='pill clock good'>checked in #"+bk.orderNo+"</span>":"")+"</span><span class='spacer'></span>";
    if(!done){ const ci=document.createElement("button"); ci.className="good"; ci.textContent="Check in"; ci.style.padding="4px 10px"; ci.onclick=()=>checkInBooking(bk); row.appendChild(ci); }
    else { const cx=document.createElement("button"); cx.textContent="Remove"; cx.style.padding="4px 10px"; cx.onclick=()=>{ DB=loadDB(); DB.bookings=DB.bookings.filter(x=>x.id!==bk.id); saveDB(DB); render(); }; row.appendChild(cx); }
    sc.appendChild(row); });
  app.appendChild(sc);
}

/* KITCHEN DISPLAY (KDS) — interactive: live tickets with a prep timer that ages green→yellow→red, oldest first,
   and a Bump that fires the whole ticket ready. Thresholds from FLOW.kds {warnSec,badSec} (default 5/10 min). */
function kdsChip(r){
  const k=FLOW.kds||{warnSec:300,badSec:600}; const el=(Date.now()-(r.ts||Date.now()))/1000;
  const cls = el>=k.badSec ? "bad" : el>=k.warnSec ? "warn" : "good";
  return "<span class='pill clock "+cls+"'>"+fmtDur(el)+"</span>";
}
// bump only fires the released (current-course) lines; held courses wait until fired
function bumpRecord(r){ r.lines.forEach(l=>{ if(courseReleased(r,l)) l.stage=(l.path||[]).length; }); r.bumpedAt=new Date().toISOString().slice(11,16); afterChange(r); render(); }
/* ===================================== DELIVERY ROUTE (optional) =====================================
   A `route` station is a driver's manifest. Schedule stops (a customer, a day, pickup and/or delivery), then
   work them: "Picked up" opens an undetailed drop order for that customer (reusing quick-drop — detailed later
   at the plant); "Delivered" closes that customer's ready orders. Stops live in DB.stops (a top-level
   collection, like bookings). General — any business that runs a pickup/delivery route. Enabled by a route
   station; FLOW.route.days seeds the day chips. Inert without a route station. */
function renderRoute(app, station){
  DB=loadDB(); DB.stops=DB.stops||[];
  app.innerHTML="<h2>"+station.label+"</h2>";
  const days=(FLOW.route&&FLOW.route.days)||[];
  // schedule a stop
  const f=document.createElement("div"); f.className="card"; f.innerHTML="<div class='row'><b>Schedule a stop</b></div>";
  const ph=document.createElement("input"); ph.placeholder="phone"; ph.value=stopForm.phone; ph.oninput=e=>stopForm.phone=e.target.value;
  const nm=document.createElement("input"); nm.placeholder="name"; nm.value=stopForm.name; nm.oninput=e=>stopForm.name=e.target.value;
  const ad=document.createElement("input"); ad.placeholder="address"; ad.value=stopForm.address; ad.oninput=e=>stopForm.address=e.target.value;
  f.appendChild(ph); f.appendChild(nm); f.appendChild(ad);
  if(days.length){ const ds=document.createElement("select"); ds.innerHTML="<option value=''>— day —</option>"+days.map(d=>"<option"+(stopForm.day===d?" selected":"")+">"+d+"</option>").join(""); ds.onchange=e=>stopForm.day=e.target.value; f.appendChild(ds); }
  else { const di=document.createElement("input"); di.placeholder="day"; di.value=stopForm.day; di.oninput=e=>stopForm.day=e.target.value; f.appendChild(di); }
  const ks=document.createElement("select"); ["both","pickup","delivery"].forEach(k=>{ const o=document.createElement("option"); o.value=k; o.textContent=k; if(stopForm.kind===k)o.selected=true; ks.appendChild(o); }); ks.onchange=e=>stopForm.kind=e.target.value; f.appendChild(ks);
  const add=document.createElement("button"); add.className="primary"; add.textContent="Add stop"; add.style.marginLeft="8px";
  add.onclick=()=>{ if(!stopForm.phone&&!stopForm.name){ flash("Add a customer"); return; } DB=loadDB(); DB.stops=DB.stops||[]; DB.stops.push({ id:"S"+Date.now(), phone:(stopForm.phone||"").trim(), name:((stopForm.name||"").trim()||(stopForm.phone||"").trim()), address:(stopForm.address||"").trim(), day:stopForm.day, kind:stopForm.kind, status:"OPEN" }); stopForm={ phone:"",name:"",address:"",day:stopForm.day,kind:"both" }; saveDB(DB); render(); };
  f.appendChild(add); app.appendChild(f);
  // day filter
  if(days.length){ const bar=document.createElement("div"); bar.className="flowsel";
    const all=document.createElement("button"); if(!routeDay)all.className="sel"; all.textContent="All"; all.onclick=()=>{ routeDay=null; render(); }; bar.appendChild(all);
    days.forEach(d=>{ const bd=document.createElement("button"); if(routeDay===d)bd.className="sel"; bd.textContent=d; bd.onclick=()=>{ routeDay=d; render(); }; bar.appendChild(bd); }); app.appendChild(bar); }
  // manifest
  const stops=(DB.stops||[]).filter(s=> !routeDay || s.day===routeDay);
  if(!stops.length){ const e=document.createElement("div"); e.className="empty card"; e.textContent="No stops scheduled."; app.appendChild(e); }
  stops.forEach(s=>{ const c=document.createElement("div"); c.className="card";
    const ready=DB.records.filter(r=>(r.status==="READY"||r.status==="PAID") && r.customer && (s.phone? r.customer.phone===s.phone : r.customer.name===s.name));
    c.innerHTML="<div class='row'><b>"+s.name+"</b> <span class='pill'>"+s.kind+"</span>"+(s.day?" <span class='pill route'>"+s.day+"</span>":"")+"<span class='spacer'></span><span class='muted'>"+(s.address||"")+"</span></div>";
    const info=document.createElement("div"); info.className="muted"; info.style.margin="4px 0"; info.textContent= ready.length? (ready.length+" order(s) ready to deliver") : "no orders ready"; c.appendChild(info);
    if(s.kind!=="delivery" && !s.pickedUp){ const pu=document.createElement("button"); pu.className="good"; pu.textContent="✓ Picked up"; pu.onclick=()=>routePickup(s); c.appendChild(pu); }
    if(s.pickedUp){ const b=document.createElement("span"); b.className="pill clock good"; b.style.marginRight="8px"; b.textContent="picked up → #"+s.pickupOrder; c.appendChild(b); }
    if(s.kind!=="pickup"){ const dv=document.createElement("button"); dv.className="primary"; dv.style.marginLeft="8px"; dv.textContent=s.delivered?"delivered ✓":("Delivered ("+ready.length+")"); dv.disabled=s.delivered||!ready.length; dv.onclick=()=>routeDeliver(s, ready.map(r=>r.id)); c.appendChild(dv); }
    const rm=document.createElement("button"); rm.textContent="✕"; rm.title="Remove stop"; rm.style.cssText="margin-left:8px;padding:4px 10px"; rm.onclick=()=>{ DB=loadDB(); DB.stops=(DB.stops||[]).filter(x=>x.id!==s.id); saveDB(DB); render(); }; c.appendChild(rm);
    app.appendChild(c); });
}
function routePickup(s){
  DB=loadDB(); DB.seq++;
  const rec={ id:"R"+DB.seq, number:DB.seq, lines:[], tenders:[], createdAt:new Date().toISOString().slice(11,16), ts:Date.now(), undetailed:true, dropCount:0, fromRoute:s.id, status:"INPROGRESS", customer:{ name:s.name, phone:s.phone } };
  if(storesOn()) rec.storeId = storeForOrder(rec.customer);
  let c=DB.customers.find(x=>x.phone===s.phone); if(!c && s.phone){ c={ phone:s.phone, name:s.name }; DB.customers.push(c); } if(c && storesOn() && !c.storeId) c.storeId=rec.storeId;
  DB.records.push(rec);
  const st=(DB.stops||[]).find(x=>x.id===s.id); if(st){ st.pickedUp=true; st.pickupOrder=rec.number; }
  saveDB(DB); render();
}
function routeDeliver(s, ids){
  DB=loadDB(); (ids||[]).forEach(id=>{ const r=DB.records.find(x=>x.id===id); if(r){ r.status="CLOSED"; r.deliveredAt=new Date().toISOString().slice(11,16); } });
  const st=(DB.stops||[]).find(x=>x.id===s.id); if(st){ st.delivered=true; } saveDB(DB); render();
}
function renderKDS(app, station){
  app.innerHTML="<h2>"+station.label+"</h2><p class='muted'>Oldest first. Bump a ticket when it's up.</p>";
  const live=DB.records.filter(r=>r.status==="INPROGRESS").sort((a,b)=>(a.ts||0)-(b.ts||0));
  if(!live.length){ const e=document.createElement("div"); e.className="empty card"; e.textContent="All caught up — no tickets working."; app.appendChild(e); }
  live.forEach(r=>{ const c=document.createElement("div"); c.className="card";
    const fc=r.firedCourse||1;
    c.innerHTML="<div class='row'><b>#"+r.number+"</b> "+kdsChip(r)+(coursingOn()?" <span class='pill'>"+courseLabel(fc)+"</span>":"")+"<span class='spacer'></span><span class='muted'>"+r.createdAt+"</span></div>";
    r.lines.filter(l=>courseReleased(r,l)).forEach(l=>{ const row=document.createElement("div"); row.className="line"; const where=lineComplete(l)?"ready":("at "+l.path[l.stage]);
      row.innerHTML="<span>"+l.qty+"× "+l.name+(l.modLabel?" <small class='mods'>"+l.modLabel+"</small>":"")+"</span><span class='spacer'></span><span class='muted'>"+where+"</span>"; c.appendChild(row); });
    // held courses waiting to be fired
    if(coursingOn()){ const held=r.lines.filter(l=>!courseReleased(r,l));
      if(held.length){ const h=document.createElement("div"); h.className="muted"; h.style.marginTop="4px"; h.textContent="held: "+held.map(l=>l.qty+"× "+l.name).join(", ")+" ("+courseLabel(fc+1)+")"; c.appendChild(h); } }
    const bump=document.createElement("button"); bump.className="primary"; bump.textContent="Bump ✓"; bump.style.marginTop="10px"; bump.onclick=()=>{ bumpRecord(r); saveDB(DB); render(); }; c.appendChild(bump);
    if(heldCourses(r)){ const fire=document.createElement("button"); fire.textContent="🔥 Fire "+courseLabel((r.firedCourse||1)+1); fire.style.margin="10px 0 0 8px"; fire.onclick=()=>fireNextCourse(r); c.appendChild(fire); }
    app.appendChild(c); });
}

/* ===================================== FLOOR / TABLE STATE MACHINE =====================================
   A spatial primitive: tables (or salon chairs, auto bays, spa rooms) that move through states over time.
   Config: FLOW.floor { label, sections?, warnSec?, states?[{id,label,color,next}], tables:[{id,label,seats,section}] }.
   Table state + since-timestamp live in DB.tables; the default state list is the restaurant service flow. */
const FLOOR_STATES = [
  { id:"empty",    label:"Empty",    color:"#5b6675", next:"assigned" },
  { id:"assigned", label:"Seated",   color:"#c99a12", next:"greeted"  },
  { id:"greeted",  label:"Greeted",  color:"#2f7bd6", next:"ordered"  },
  { id:"ordered",  label:"Ordered",  color:"#1f5fb0", next:"food"     },
  { id:"food",     label:"Food out", color:"#2ea043", next:"check"    },
  { id:"check",    label:"Check",    color:"#c9711f", next:"paid"     },
  { id:"paid",     label:"Paid",     color:"#9a5314", next:"bussing"  },
  { id:"bussing",  label:"Bussing",  color:"#6f42c1", next:"empty"    }
];
function floorStates(){ return (FLOW.floor && FLOW.floor.states) || FLOOR_STATES; }
function floorStateById(id){ return floorStates().find(s=>s.id===id) || floorStates()[0]; }
function tableRec(t){ const r=(DB.tables||{})[t.id]; return { state:(r&&r.state)||floorStates()[0].id, since:(r&&r.since)||null, seatedTs:(r&&r.seatedTs)||null }; }
// state change also drives turn-time analytics: a "turn" runs from leaving Empty until returning to Empty
function setTableState(id, state){ DB=loadDB(); DB.tables=DB.tables||{}; DB.turns=DB.turns||[];
  const emptyId=floorStates()[0].id; const now=Date.now(); const prev=DB.tables[id]||{}; let seatedTs=prev.seatedTs||null;
  const wasEmpty=!prev.state || prev.state===emptyId;
  if(wasEmpty && state!==emptyId) seatedTs=now;                               // a table just got seated — turn begins
  if(state===emptyId){ if(seatedTs) DB.turns.push({ table:id, seatedTs, clearedTs:now, dur:now-seatedTs, day:todayStr() }); seatedTs=null; }  // cleared — turn ends, logged
  DB.tables[id]={ state, since:now, seatedTs }; saveDB(DB); render();
}
function tableSeats(id){ const t=((FLOW.floor&&FLOW.floor.tables)||[]).find(x=>x.id===id); return (t&&+t.seats)||0; }
function tableLabel(id){ const t=((FLOW.floor&&FLOW.floor.tables)||[]).find(x=>x.id===id); return (t&&(t.label||t.id))||id; }
// a check belongs to a table (restaurants): open orders tagged with tableId, and their running balance
function tableOpenOrders(id){ return DB.records.filter(r=>r.tableId===id && r.status!=="CLOSED" && r.status!=="REFUNDED"); }
function tableOpenTotal(id){ return tableOpenOrders(id).reduce((s,r)=>s+recordBalance(r),0); }
function turnsToday(){ return (DB.turns||[]).filter(x=>x.day===todayStr()); }
function turnStats(){ const ts=turnsToday(); const n=ts.length; return { n, avgMs:n?ts.reduce((s,x)=>s+x.dur,0)/n:0, covers:ts.reduce((s,x)=>s+tableSeats(x.table),0) }; }
function renderFloor(app, station){
  const cfg=FLOW.floor||{ tables:[] };
  app.innerHTML="<h2>"+station.label+"</h2>";
  const tables=(cfg.tables||[]).filter(t=> !floorSection || (t.section||"")===floorSection);
  const sections=cfg.sections || [...new Set((cfg.tables||[]).map(t=>t.section).filter(Boolean))];
  // section filter (server sees a section; manager sees all)
  if(sections.length){ const bar=document.createElement("div"); bar.className="opts"; bar.style.marginBottom="10px";
    const mk=(lab,val)=>{ const b=document.createElement("button"); if(floorSection===val) b.className="sel"; b.textContent=lab; b.onclick=()=>{ floorSection=val; selTable=null; render(); }; bar.appendChild(b); };
    mk("All", null); sections.forEach(s=>mk(s, s)); app.appendChild(bar); }
  // at-a-glance: how many tables are occupied (not empty)
  const occupied=tables.filter(t=>tableRec(t).state!=="empty").length;
  const meta=document.createElement("p"); meta.className="muted"; meta.style.margin="0 0 10px"; meta.textContent=occupied+" of "+tables.length+" tables occupied · tap a table to advance it"; app.appendChild(meta);
  // turn-time analytics — today's completed turns, average turn, covers served (seats × turns)
  const ts=turnStats();
  const an=document.createElement("div"); an.className="card"; an.style.cssText="display:flex;gap:18px;flex-wrap:wrap;margin-bottom:12px";
  const stat=(lab,val)=>"<div><div style='font-size:20px;font-weight:700'>"+val+"</div><div class='muted' style='font-size:12px'>"+lab+"</div></div>";
  an.innerHTML=stat("turns today", ts.n)+stat("avg turn", ts.n?fmtDur(ts.avgMs/1000):"—")+stat("covers", ts.covers)+stat("open", occupied+"/"+tables.length);
  app.appendChild(an);
  // the grid — each table colored by state, minutes-in-state, pulsing if it's been sitting too long.
  // If tables carry x,y (from the floor designer) lay them out spatially; otherwise auto-flow.
  const positioned = tables.some(t=>t.x!=null);
  const grid=document.createElement("div");
  if(positioned){ const h=Math.max(140, ...tables.map(t=>(t.y||0)+92)); grid.style.cssText="position:relative;min-height:"+h+"px"; }
  else grid.className="floorgrid";
  const warn=cfg.warnSec||600;
  tables.forEach(t=>{ const tr=tableRec(t); const st=floorStateById(tr.state); const el=tr.since?(Date.now()-tr.since)/1000:0;
    const b=document.createElement("button"); b.className="tabletile"+(tr.since&&el>=warn&&st.id!=="empty"?" warn":""); b.style.background=st.color; b.dataset.table=t.id;
    if(positioned){ b.style.position="absolute"; b.style.left=(t.x||0)+"px"; b.style.top=(t.y||0)+"px"; b.style.width="88px"; }
    const chk=tableOpenTotal(t.id);
    b.innerHTML="<b>"+ (t.label||t.id) +"</b> <span style='float:right;font-size:12px'>"+st.label+"</span>"
      +"<small>"+(t.seats?t.seats+" seats":"")+(t.section?" · "+t.section:"")+"</small>"
      +"<small>"+(chk>0.0001?"🧾 "+money(chk)+" open":(tr.since?fmtDur(el)+" in state":"—"))+"</small>";
    b.onclick=()=>{ selTable=(selTable===t.id?null:t.id); render(); };
    grid.appendChild(b); });
  app.appendChild(grid);
  // selected table: advance to the next state, or jump to any state
  if(selTable){ const t=(cfg.tables||[]).find(x=>x.id===selTable);
    if(t){ const tr=tableRec(t); const st=floorStateById(tr.state); const nx=st.next?floorStateById(st.next):null;
      const c=document.createElement("div"); c.className="card"; c.style.marginTop="12px";
      c.innerHTML="<div class='row'><b>"+(t.label||t.id)+"</b> <span class='pill'>"+st.label+"</span><span class='spacer'></span><span class='muted'>"+(t.seats?t.seats+" seats":"")+"</span></div>";
      // open check(s) rung to this table
      const chks=tableOpenOrders(t.id);
      if(chks.length){ const ck=document.createElement("div"); ck.style.cssText="margin:6px 0"; ck.innerHTML="<div class='muted'>Open check"+(chks.length>1?"s":"")+"</div>";
        chks.forEach(r=>{ const row=document.createElement("div"); row.className="line"; row.innerHTML="<span>#"+r.number+" · "+r.lines.length+" item(s)</span><span class='spacer'></span><span>"+money(recordBalance(r))+" due</span>"; ck.appendChild(row); });
        c.appendChild(ck);
      } else { const e=document.createElement("div"); e.className="muted"; e.style.margin="4px 0"; e.textContent="No open check — ring one at the register and tag this table."; c.appendChild(e); }
      if(nx){ const adv=document.createElement("button"); adv.className="primary"; adv.textContent="→ "+nx.label; adv.style.margin="4px 8px 8px 0"; adv.onclick=()=>{ setTableState(t.id, nx.id); }; c.appendChild(adv); }
      const jump=document.createElement("div"); jump.className="opts";
      floorStates().forEach(s=>{ const b=document.createElement("button"); if(s.id===st.id) b.className="sel"; b.textContent=s.label; b.onclick=()=>setTableState(t.id, s.id); jump.appendChild(b); });
      c.appendChild(jump); app.appendChild(c);
    }
  }
}

/* ===================================== STAFF SCHEDULING =====================================
   Worker-rights foundation (see docs/WORKER-RIGHTS.md, Phase 1): a weekly grid of staff × days.
   Set a shift per cell, see weekly hours with an overtime warning, publish → notify each worker.
   Shifts live in DB.shifts; DB.schedule holds the published stamp. Defaults tilt toward the worker. */
const SCHED_DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const OT_THRESHOLD = 40;   // weekly hours over this flag as overtime (US federal default)
function parseHM(s){ if(!s) return null; const [h,m]=String(s).split(":").map(Number); return h*60+(m||0); }
function shiftHrs(s){ const a=parseHM(s.start), b=parseHM(s.end); if(a==null||b==null||b<=a) return 0; return (b-a)/60; }
function staffShifts(id){ return (DB.shifts||[]).filter(s=>s.staffId===id); }
function cellShift(id, day){ return (DB.shifts||[]).find(s=>s.staffId===id && s.day===day); }
function weeklyHours(id){ return staffShifts(id).reduce((h,s)=>h+shiftHrs(s),0); }
// --- time off: a worker requests a day, a manager approves; approved days block scheduling (worker-protective) ---
function timeoffReq(id, day){ return (DB.timeoff||[]).find(t=>t.staffId===id && t.day===day && t.status!=="denied"); }
function pendingTimeoff(){ return (DB.timeoff||[]).filter(t=>t.status==="pending"); }
function requestTimeoff(id, name, day, reason){ DB=loadDB(); DB.timeoff=DB.timeoff||[];
  if(DB.timeoff.some(t=>t.staffId===id && t.day===day && t.status!=="denied")){ render(); return; }   // one open request per day
  DB.timeoff.push({ id:"T"+Date.now()+day, staffId:id, name, day, reason:reason||"", status:"pending", ts:Date.now() }); saveDB(DB); render();
}
function setTimeoff(reqId, status){ DB=loadDB(); const t=(DB.timeoff||[]).find(x=>x.id===reqId); if(!t) return;
  t.status=status;
  if(status==="approved"){ DB.shifts=(DB.shifts||[]).filter(s=>!(s.staffId===t.staffId && s.day===t.day));   // can't be both off and scheduled
    DB.schedule=DB.schedule||{}; delete DB.schedule.published; delete DB.schedule.notified; }
  saveDB(DB); render();
}
// --- shift coverage: a worker offers a shift, the manager reassigns it to an eligible co-worker ---
function offeredShifts(){ return (DB.shifts||[]).filter(s=>s.offered); }
function offerShift(shiftId){ DB=loadDB(); const s=(DB.shifts||[]).find(x=>x.id===shiftId); if(s) s.offered=true; saveDB(DB); render(); }
function cancelOffer(shiftId){ DB=loadDB(); const s=(DB.shifts||[]).find(x=>x.id===shiftId); if(s) delete s.offered; saveDB(DB); render(); }
function coverShift(shiftId, toId){ DB=loadDB(); const s=(DB.shifts||[]).find(x=>x.id===shiftId); if(!s) return;
  if((DB.timeoff||[]).some(t=>t.staffId===toId && t.day===s.day && t.status==="approved")){ flash("They're approved off that day"); render(); return; }
  if((DB.shifts||[]).some(x=>x.staffId===toId && x.day===s.day)){ flash("They're already scheduled that day"); render(); return; }
  s.staffId=toId; delete s.offered;
  DB.schedule=DB.schedule||{}; delete DB.schedule.published; delete DB.schedule.notified;   // reassignment un-publishes
  saveDB(DB); render();
}
function setShift(id, day, start, end){
  DB=loadDB();
  if(start && end && (DB.timeoff||[]).some(t=>t.staffId===id && t.day===day && t.status==="approved")){
    flash(((FLOW.staff||[]).find(s=>s.id===id)||{}).name+" is approved off "+SCHED_DAYS[day]+" — clear the day off first"); render(); return; }
  DB.shifts=(DB.shifts||[]).filter(s=>!(s.staffId===id && s.day===day));
  if(start && end) DB.shifts.push({ id:"S"+Date.now()+day, staffId:id, day, start, end });
  DB.schedule=DB.schedule||{}; delete DB.schedule.published; delete DB.schedule.notified;   // any edit un-publishes (change requires re-publish)
  saveDB(DB); render();
}
function publishSchedule(){
  DB=loadDB(); DB.schedule=DB.schedule||{}; DB.schedule.published=Date.now(); DB.schedule.notified=[];
  if(FLOW.endpoints && FLOW.endpoints.notify){ (FLOW.staff||[]).forEach(w=>{ const sh=staffShifts(w.id); if(sh.length){
    const body="Hi "+w.name+", your shifts are posted — "+sh.sort((a,b)=>a.day-b.day).map(s=>SCHED_DAYS[s.day]+" "+s.start+"–"+s.end).join(", ")+".";
    notifyAdapter().send(w.phone||"", body); DB.schedule.notified.push(w.name); } }); }
  saveDB(DB); render();
}
function renderSchedule(app, station){
  app.innerHTML="<h2>"+station.label+"</h2><p class='muted'>Set each shift, then publish. Editing a published week un-publishes it until you re-post — staff never get a silent change.</p>";
  const staff=FLOW.staff||[];
  if(!staff.length){ const e=document.createElement("div"); e.className="empty card"; e.textContent="No staff configured. Add staff (name + PIN) in the builder."; app.appendChild(e); return; }
  // the week grid
  const wrap=document.createElement("div"); wrap.className="card"; wrap.style.overflowX="auto";
  const tbl=document.createElement("table"); tbl.style.cssText="border-collapse:collapse;width:100%;min-width:560px;font-size:13px";
  tbl.innerHTML="<tr><th style='text-align:left;padding:6px'>Staff</th>"+SCHED_DAYS.map(d=>"<th style='padding:6px'>"+d+"</th>").join("")+"<th style='padding:6px'>Hrs</th></tr>";
  staff.forEach(w=>{ const tr=document.createElement("tr"); const hrs=weeklyHours(w.id); const ot=hrs>OT_THRESHOLD;
    const name=document.createElement("td"); name.style.cssText="padding:6px;font-weight:600"; name.textContent=w.name; tr.appendChild(name);
    SCHED_DAYS.forEach((d,di)=>{ const td=document.createElement("td"); td.style.cssText="padding:3px;text-align:center";
      const sh=cellShift(w.id, di); const to=timeoffReq(w.id, di);
      const b=document.createElement("button"); b.style.cssText="width:100%;padding:5px 4px;font-size:12px"; if(selCell&&selCell.id===w.id&&selCell.day===di) b.className="sel";
      if(to && to.status==="approved"){ b.textContent="OFF"; b.style.opacity=".65"; b.title="Approved time off"; }
      else if(to){ b.textContent="off?"; b.title="Time-off requested — pending"; }
      else if(sh && sh.offered){ b.textContent=sh.start+"–"+sh.end+" ↔"; b.title="Offered for coverage"; }
      else b.textContent= sh ? (sh.start+"–"+sh.end) : "+";
      b.onclick=()=>{ selCell={ id:w.id, day:di }; render(); };
      td.appendChild(b); tr.appendChild(td); });
    const tot=document.createElement("td"); tot.style.cssText="padding:6px;text-align:center;font-weight:600"; tot.innerHTML=hrs.toFixed(1)+(ot?" <span class='pill flag'>OT</span>":""); tr.appendChild(tot);
    tbl.appendChild(tr); });
  wrap.appendChild(tbl); app.appendChild(wrap);
  // cell editor
  if(selCell){ const w=staff.find(x=>x.id===selCell.id); const sh=cellShift(selCell.id, selCell.day)||{}; const to=timeoffReq(selCell.id, selCell.day);
    const c=document.createElement("div"); c.className="card";
    c.innerHTML="<div class='row'><b>"+w.name+" · "+SCHED_DAYS[selCell.day]+"</b></div>";
    if(to && to.status==="approved"){
      const note=document.createElement("div"); note.className="muted"; note.textContent="✓ Approved day off"+(to.reason?" — "+to.reason:"")+". Clear the day off to schedule a shift."; c.appendChild(note);
    } else {
      const start=document.createElement("input"); start.type="time"; start.id="shiftStart"; start.value=sh.start||"09:00"; start.style.margin="0 8px 0 0";
      const end=document.createElement("input"); end.type="time"; end.id="shiftEnd"; end.value=sh.end||"17:00";
      const fld=document.createElement("div"); fld.className="fld"; fld.innerHTML="<span class='flab'>Shift</span>"; fld.appendChild(start); fld.appendChild(document.createTextNode(" to ")); fld.appendChild(end); c.appendChild(fld);
      const save=document.createElement("button"); save.className="primary"; save.textContent="Save shift"; save.style.margin="8px 8px 0 0"; save.onclick=()=>{ setShift(selCell.id, selCell.day, start.value, end.value); selCell=null; }; c.appendChild(save);
      if(sh.start){ const clr=document.createElement("button"); clr.textContent="Clear"; clr.style.marginTop="8px"; clr.onclick=()=>{ setShift(selCell.id, selCell.day, null, null); selCell=null; }; c.appendChild(clr); }
      // shift coverage — offer this shift, then reassign it to an eligible co-worker
      if(sh.id){ const cv=document.createElement("div"); cv.style.cssText="margin-top:10px;border-top:1px solid var(--line);padding-top:8px";
        if(!sh.offered){ const off=document.createElement("button"); off.textContent="Offer for coverage"; off.onclick=()=>{ offerShift(sh.id); selCell=null; }; cv.appendChild(off); }
        else { const m=document.createElement("div"); m.className="muted"; m.textContent="↔ Needs coverage — reassign to:"; cv.appendChild(m);
          const opts=document.createElement("div"); opts.className="opts";
          staff.filter(o=>o.id!==selCell.id).forEach(o=>{ const offday=timeoffReq(o.id, selCell.day); const busy=cellShift(o.id, selCell.day);
            const blocked=(offday&&offday.status==="approved")||busy; const ot=(weeklyHours(o.id)+shiftHrs(sh))>OT_THRESHOLD;
            const bt=document.createElement("button"); bt.textContent=o.name+(ot?" (OT)":""); if(blocked){ bt.disabled=true; bt.title=busy?"already scheduled that day":"approved off that day"; }
            bt.onclick=()=>{ coverShift(sh.id, o.id); selCell=null; }; opts.appendChild(bt); });
          cv.appendChild(opts);
          const cancel=document.createElement("button"); cancel.textContent="Cancel offer"; cancel.style.marginTop="8px"; cancel.onclick=()=>{ cancelOffer(sh.id); selCell=null; }; cv.appendChild(cancel);
        }
        c.appendChild(cv);
      }
    }
    // time-off controls — request (worker), approve/deny (manager), cancel an approved day off
    const tw=document.createElement("div"); tw.style.cssText="margin-top:10px;border-top:1px solid var(--line);padding-top:8px";
    if(!to){ const ri=document.createElement("input"); ri.id="offReason"; ri.placeholder="reason (optional)"; ri.style.cssText="margin-right:8px;max-width:180px";
      const rb=document.createElement("button"); rb.textContent="Request day off"; rb.onclick=()=>{ requestTimeoff(selCell.id, w.name, selCell.day, ri.value); selCell=null; }; tw.appendChild(ri); tw.appendChild(rb);
    } else if(to.status==="pending"){ const m=document.createElement("div"); m.className="muted"; m.textContent="Time-off requested"+(to.reason?": "+to.reason:""); tw.appendChild(m);
      const ap=document.createElement("button"); ap.className="primary"; ap.textContent="Approve day off"; ap.style.margin="6px 8px 0 0"; ap.onclick=()=>{ setTimeoff(to.id,"approved"); selCell=null; }; tw.appendChild(ap);
      const dn=document.createElement("button"); dn.textContent="Deny"; dn.style.marginTop="6px"; dn.onclick=()=>{ setTimeoff(to.id,"denied"); selCell=null; }; tw.appendChild(dn);
    } else { const cancel=document.createElement("button"); cancel.textContent="Cancel day off"; cancel.onclick=()=>{ setTimeoff(to.id,"denied"); selCell=null; }; tw.appendChild(cancel); }
    c.appendChild(tw); app.appendChild(c);
  }
  // manager queue — pending time-off requests at a glance
  const pend=pendingTimeoff();
  if(pend.length){ const q=document.createElement("div"); q.className="card"; q.innerHTML="<div class='row'><b>Time-off requests</b> <span class='pill'>"+pend.length+"</span></div>";
    pend.forEach(t=>{ const row=document.createElement("div"); row.className="line";
      row.innerHTML="<span>"+t.name+" · "+SCHED_DAYS[t.day]+(t.reason?" — "+t.reason:"")+"</span>";
      const sp=document.createElement("span"); sp.className="spacer"; row.appendChild(sp);
      const ap=document.createElement("button"); ap.className="primary"; ap.textContent="Approve"; ap.style.marginRight="6px"; ap.onclick=()=>setTimeoff(t.id,"approved"); row.appendChild(ap);
      const dn=document.createElement("button"); dn.textContent="Deny"; dn.onclick=()=>setTimeoff(t.id,"denied"); row.appendChild(dn);
      q.appendChild(row); });
    app.appendChild(q);
  }
  // publish + notify
  const pub=document.createElement("div"); pub.className="card";
  const total=staff.reduce((h,w)=>h+weeklyHours(w.id),0);
  pub.innerHTML="<div class='line'><span>Scheduled this week</span><span class='spacer'></span><b>"+total.toFixed(1)+" h</b></div>";
  if(DB.schedule && DB.schedule.published){ const pl=document.createElement("div"); pl.className="muted"; pl.style.margin="6px 0"; pl.textContent="✓ Published"+((DB.schedule.notified&&DB.schedule.notified.length)?" · texted "+DB.schedule.notified.join(", "):""); pub.appendChild(pl); }
  const pb=document.createElement("button"); pb.className="primary"; pb.textContent=(DB.schedule&&DB.schedule.published)?"Re-publish":"📣 Publish schedule"; pb.style.marginTop="6px"; pb.onclick=()=>{ publishSchedule(); }; pub.appendChild(pb);
  app.appendChild(pub);
}

/* SHOUT-OUTS (kudos) — recognition is free and it matters most when money's tight. Anyone can hand a teammate a
   kudos; it shows on their portal and greets them at clock-in. Lives in DB.kudos. */
function kudosFor(id){ return (DB.kudos||[]).filter(k=>k.to===id).sort((a,b)=>(b.ts||0)-(a.ts||0)); }
function giveKudos(fromName, toId, toName, note){ if(!toId||!note) return; DB=loadDB(); DB.kudos=DB.kudos||[];
  DB.kudos.push({ id:"K"+Date.now(), from:fromName||"A teammate", to:toId, toName, note, ts:Date.now(), day:todayStr() }); saveDB(DB); render(); }

/* WORKER PORTAL — the worker's own view: log in by PIN, see your week, hours, and pay, claim open shifts
   yourself (self-serve coverage), and request time off. Everything rides the same synced DB the manager uses. */
function renderWorker(app, station){
  const staff=FLOW.staff||[];
  app.innerHTML="<h2>"+station.label+"</h2>";

function attachCustomer(phone, name){
  phone=(phone||"").trim(); if(!phone) return;
  DB=loadDB(); const found=(DB.customers||[]).find(c=>c.phone===phone);
  draft.customer = found ? {...found} : { phone, name:(name||"").trim()||phone, lastItems:[], points:0, gift:0 };
  render();
}
/* loyalty + gift card settlement, applied once when a record is paid */
function onPaid(r){
  if(!r.customer) return;
  const loy=FLOW.endpoints.loyalty;
  const c=(DB.customers||[]).find(x=>x.phone===r.customer.phone); if(!c) return;
  c.points=c.points||0; c.gift=c.gift||0;
  if(loy) c.points += Math.floor(recordTotal(r))*(loy.earnPerDollar||1);               // earn on the ticket
  const gc=r.lines.filter(l=>l.category==="giftcard").reduce((s,l)=>s+l.price*l.qty,0); // gift cards bought credit balance
  if(gc) c.gift += gc;
  if(r.redeemPts) c.points = Math.max(0, c.points - r.redeemPts);                       // spend redeemed points
  if(r.giftUsed)  c.gift   = Math.max(0, c.gift - r.giftUsed);                          // spend gift balance
}

    tb.appendChild(opts); app.appendChild(tb);

  // search / barcode-scan box — shown for big menus or when a scanner is configured (keyboard-wedge types code + Enter)
  const tiles=[];
  const addItem=item=> needsConfig(item) ? (pending={item, choices:{}, addons:[], flags:[], performer:null}, render()) : addLine(item, {}, [], [], null);
  if(FLOW.catalog.length>5 || FLOW.endpoints.scan){
    const search=document.createElement("input"); search.id="catSearch"; search.placeholder="Search or scan…"; search.autocomplete="off"; search.style.cssText="width:100%;margin-bottom:10px";
    search.oninput=()=>{ const q=search.value.trim().toLowerCase(); tiles.forEach(({item,btn})=>{ const hay=(item.name+" "+(item.category||"")+" "+(item.barcode||item.sku||"")).toLowerCase(); btn.style.display=(!q||hay.includes(q))?"":"none"; }); };
    search.onkeydown=e=>{ if(e.key!=="Enter") return; const q=search.value.trim().toLowerCase(); if(!q) return;
      const exact=tiles.find(({item})=>String(item.barcode||item.sku||"").toLowerCase()===q && !item.__out);
      const vis=tiles.find(({btn,item})=>btn.style.display!=="none" && !item.__out);
      const hit=exact||vis; if(hit){ addItem(hit.item); } else { flash("No match for “"+search.value.trim()+"”"); } };
    cat.appendChild(search);
  }
  const grid=document.createElement("div"); grid.className="grid";
  FLOW.catalog.forEach(item=>{
    const b=document.createElement("button"); b.className="tile"; const rem=remainingOf(item); const out=is86(item)||isOutOfStock(item);
    item.__out=out;
    if(out) b.className="tile eightysix";
    const via=item.path.length?item.path.join(" → "):"no prep";
    let sub = station.view.money?money(item.price)+" · "+via:via;
    if(item.par!=null) sub += is86(item) ? " · <span class='pill x86'>86</span>" : " · "+rem+" left";
    if(tracksStock(item)) sub += isOutOfStock(item) ? " · <span class='pill x86'>out of stock</span>" : " · "+stockOnHand(item)+" in stock"+(isLowStock(item)?" <span class='pill flag'>low</span>":"");
    b.innerHTML = item.name + "<small>"+sub+"</small>";
    b.disabled = out;
    b.onclick=()=> addItem(item);
    tiles.push({item, btn:b});
    grid.appendChild(b);
  });
  cat.appendChild(grid); app.appendChild(cat);

  if(pending) app.appendChild(configPanel(station));

  const c=document.createElement("div"); c.className="card";
  if(!draft.lines.length){ c.innerHTML="<div class='empty'>Tap items to build the order.</div>"; }
  else { draft.lines.forEach(l=>{ const row=document.createElement("div"); row.className="line";
      row.innerHTML="<span>"+l.qty+"× "+l.name+(l.modLabel?" <small class='mods'>"+l.modLabel+"</small>":"")+(l.performer?" <span class='pill'>"+l.performer+"</span>":"")+tagChip(l)+"</span><span class='pill route'>"+((l.path||[]).join(' → ')||'—')+"</span><span class='spacer'></span>"+(station.view.money?"<span>"+money(l.price*l.qty)+"</span>":"");
      if(l.serialized){ const tb=document.createElement("button"); tb.textContent="🏷 "+(l.tag||"tag"); tb.title="Scan / set the "+(l.tagLabel||"tag")+" on this unit"; tb.style.cssText="padding:2px 8px;margin-left:6px"; tb.onclick=()=>{ const v=prompt("Scan or type the "+(l.tagLabel||"tag")+" for this "+l.name+":", l.tag||""); if(v!=null&&v.trim()){ l.tag=v.trim(); render(); } }; row.appendChild(tb); }
      c.appendChild(row); });
    const tot=document.createElement("div"); tot.className="line"; tot.innerHTML="<b>Total</b><span class='spacer'></span><b>"+money(draft.lines.reduce((s,l)=>s+l.price*l.qty,0))+"</b>"; c.appendChild(tot); }
  app.appendChild(c);
  // deposit control (deposit-balance payment point)
  const dep = FLOW.endpoints.payment.deposit;
  if(dep && station.view.money && draft.lines.length){
    const amt=+(draft.lines.reduce((s,l)=>s+l.price*l.qty,0)*dep.pct/100).toFixed(2);
    const db=document.createElement("button"); if(draft.takeDeposit) db.className="sel"; db.style.marginRight="8px";
    db.textContent=(draft.takeDeposit?"✓ ":"")+"Take "+dep.pct+"% deposit "+money(amt);
    db.onclick=()=>{ draft.takeDeposit=!draft.takeDeposit; render(); }; app.appendChild(db);
  }
  // capacity & pacing: a live wait estimate, and a hard cap on orders in the queue
  let atCapacity=false;
  const cap=FLOW.capacity;
  if(cap){
    const active=DB.records.filter(r=>r.status==="INPROGRESS").length;
    atCapacity = active>=cap.max;
    const info=document.createElement("div"); info.className="muted"; info.style.margin="6px 0";
    info.textContent = atCapacity ? "⛔ At capacity ("+active+" in the queue) — hold new orders"
                                  : "~"+(active*cap.perOrderMins)+" min wait · "+active+" in the queue";
    app.appendChild(info);
  }
  const send=document.createElement("button"); send.className="primary"; send.textContent="Send order →"; send.disabled=!draft.lines.length||!!pending||atCapacity; send.onclick=sendDraft; app.appendChild(send);
  if(FLOW.stations.some(s=>s.type==="detail")){   // "drop now, detail later" — only when a detail station exists
    const qd=document.createElement("button"); qd.textContent="⛅ Quick drop (detail later)"; qd.style.marginLeft="8px"; qd.disabled=!!pending; qd.onclick=quickDrop; app.appendChild(qd);
  }
  // quotes / estimates: save the current draft to come back to, or load a saved one into the order
  if(FLOW.endpoints.quotes){
    const sq=document.createElement("button"); sq.textContent="Save as quote"; sq.style.margin="0 0 0 8px"; sq.disabled=!draft.lines.length||!!pending;
    sq.onclick=()=>{ DB=loadDB(); DB.quoteSeq=(DB.quoteSeq||0)+1; DB.quotes.push({ id:"Q"+DB.quoteSeq, num:DB.quoteSeq, lines:draft.lines.map(l=>({...l})), customer:draft.customer||null, total:+draft.lines.reduce((s,l)=>s+l.price*l.qty,0).toFixed(2), createdAt:new Date().toISOString().slice(11,16) }); draft={lines:[]}; saveDB(DB); render(); }; app.appendChild(sq);
    const quotes=DB.quotes||[];
    if(quotes.length){ const qc=document.createElement("div"); qc.className="card"; qc.style.marginTop="12px"; qc.innerHTML="<div class='row'><b>Saved quotes</b></div>";
      quotes.forEach(q=>{ const row=document.createElement("div"); row.className="line";
        row.innerHTML="<span>Quote #"+q.num+" · "+q.lines.length+" item(s) · "+money(q.total)+(q.customer?" <small class='muted'>"+(q.customer.name||q.customer.phone)+"</small>":"")+"</span><span class='spacer'></span>";
        const load=document.createElement("button"); load.className="good"; load.textContent="Load"; load.style.padding="4px 10px";
        load.onclick=()=>{ draft={ lines:q.lines.map(l=>({...l, stage:0})), customer:q.customer||undefined }; DB=loadDB(); DB.quotes=DB.quotes.filter(x=>x.id!==q.id); saveDB(DB); render(); }; row.appendChild(load);
        const del=document.createElement("button"); del.textContent="×"; del.style.padding="4px 10px"; del.style.marginLeft="6px"; del.onclick=()=>{ DB=loadDB(); DB.quotes=DB.quotes.filter(x=>x.id!==q.id); saveDB(DB); render(); }; row.appendChild(del);
        qc.appendChild(row); });
      app.appendChild(qc); }
  }
}
