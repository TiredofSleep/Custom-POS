<!--
  customPOS — engine skeleton (v0.4)
  ==================================
  Spine (v0.1) · fan-out (v0.2) · per-item paths + central station, two trades on one engine (v0.3).
  v0.4 adds the RULES EVALUATOR — the one mechanism behind several primitives:
    • REQUIRED modifiers  — a choice that must be made before the line can send (steak temp, drink size, starch)
    • SUGGESTED add-ons   — an upsell prompted at order time (oat milk, Scotchgard)
    • 86 / PAR-COUNT      — a remaining-count that decrements and, at zero, disables the item everywhere
  All of it is DATA on the catalog item — no code per trade. Pick the demo business up top.

  One self-contained file, no build, no deps, localStorage. Neutral demo config only.
  Docs: FLOW-SCHEMA.md · MODULE-LIBRARY.md · THE-MODEL.md
-->

<script>
/* ============================================================================
   customPOS ENGINE — MAP (search these banners to jump between sections)
   ----------------------------------------------------------------------------
   THE FLOWS ............. demo businesses as config (injected flow replaces these)
   MODULES / STATUS ..... module registry (station type → feature) + status labels
   ENGINE / SYNC ........ flow selection, localStorage DB, optional hub sync (saveDB)
   MONEY MATH ........... subtotal/discount/tax(incl or added)/total/paid/balance, refunds, returns
   INVENTORY ............ stock on-hand, low/out, reason-coded adjustments
   PAYMENTS / NOTIFY .... processor-agnostic charge/refund + notify seam (sim adapters)
   DATA & BACKUP ........ export (JSON/CSV), import, restore
   RULES EVALUATOR ...... required modifiers, 86/par, needsConfig
   RENDER ............... router (station.type → renderer) + install/PWA
   INTAKE ............... catalog, search/scan, config panel, deposits, capacity, quotes
   PIPELINE / KDS ....... production stations, checklists, kitchen display + bump
   CHECKOUT ............. tips, discounts/coupons, split, tenders, receipts, notify
   REPORT ............... Z-report, drawer, labor, inventory, A/R, refunds/returns, backup
   TIMECLOCK / BOOKING .. staff PIN + welcome; appointments → check-in
   BOARD / TRACKER ...... internal status board; sanitized customer tracker
   PICKER / BOOT ........ device setup screen; storage-event resync; first render
   ==========================================================================*/

/* ===================================== THE FLOWS ===================================== */
const CUSTOMPOS_VERSION = "0.63";   // engine version (the builder stamps this into downloads)
let FLOWS = {
  counter: {
    label:"Counter shop", topology:"linear",
    branding:{ name:"Demo Counter", brandColor:"#1f6feb" },
    endpoints:{ customer:{persist:false}, payment:{tenders:["cash"], closeGate:"balanceLE0"} },
    timer:{ mode:"aging", warnSec:300, badSec:600, label:"prep" },   // ticket ages green->yellow->red
    capacity:{ perOrderMins:4, max:3 },                              // live wait + cap on orders in the queue
    catalog:[
      {id:"c1", name:"Coffee", price:3.50, category:"drink", path:["bar"]},
      {id:"c2", name:"Latte",  price:4.75, category:"drink", path:["bar"],
        modifiers:[{group:"Size", required:true, options:[{name:"Small",price:0},{name:"Medium",price:0.50},{name:"Large",price:1.00}]}],
        addons:[{name:"Oat milk", price:0.75},{name:"Extra shot", price:0.90}]},
      {id:"c3", name:"Muffin", price:3.25, category:"food", path:["kitchen"], par:1, flags:["Nut allergy"]},   // 86 after 1; flag needs ack at kitchen
      {id:"c4", name:"Bagel",  price:2.75, category:"food", path:["kitchen"]}
    ],
    stations:[
      {id:"order",    type:"intake",      label:"Order Counter", view:{money:true}},
      {id:"bar",      type:"production",  label:"Bar",           view:{money:false}},
      {id:"kitchen",  type:"production",  label:"Kitchen",       view:{money:false}},
      {id:"checkout", type:"fulfillment", label:"Checkout",      view:{money:true}},
      {id:"board",    type:"board",       label:"Expo Board",    view:{money:false}}
    ]
  },
  cleaners: {
    label:"Cleaners", topology:"hub-and-spoke",
    branding:{ name:"Demo Cleaners", brandColor:"#2ea043" },
    endpoints:{ customer:{persist:true}, payment:{tenders:["cash","card","account"], closeGate:"balanceLE0", points:["deposit-balance"], deposit:{pct:50}},
      notify:{ template:"Hi {name}, your order #{number} at {biz} is ready for pickup." } },
    timer:{ mode:"due", promiseSec:172800, warnSec:86400, label:"promise" },   // back-scheduled ready-by date
    lifecycle:{ received:"Received — in line", ready:"Ready for pickup", done:"Picked up",
      byStation:{ assembly:"In cleaning & pressing", rack:"Being racked" },
      public:{ byStation:{ assembly:"Cleaning your order", rack:"Almost ready" } } },
    catalog:[
      {id:"g1", name:"Shirt", price:6.50, category:"press", path:["assembly","rack"], serialized:true, tagLabel:"HSL",
        modifiers:[{group:"Starch", required:true, options:[{name:"None",price:0},{name:"Light",price:0},{name:"Heavy",price:0.50}]}],
        flags:["Pre-existing damage"]},
      {id:"g2", name:"Pants", price:7.00, category:"press", path:["assembly","rack"], serialized:true, tagLabel:"HSL"},
      {id:"g3", name:"Wash & Fold", price:2.75, category:"wf", path:["rack"]}
    ],
    stations:[
      {id:"counter",  type:"central",    label:"Front Counter",    view:{money:true}},
      {id:"assembly", type:"production",  label:"Assembly",        view:{money:false}},
      {id:"rack",     type:"staging",     label:"Rack",            view:{money:false}},
      {id:"board",    type:"board",       label:"Status Board",    view:{money:false}},
      {id:"tracker",  type:"tracker",     label:"Customer Tracker", view:{money:false, external:true}},
      {id:"office",   type:"report",      label:"Office",          view:{money:true}}
    ]
  },
  repair: {   // THIRD trade — added as pure config, no engine changes: approval/waiver gate, split path, aging, deposit
    label:"Repair shop", topology:"hub-and-spoke",
    branding:{ name:"Demo Repair", brandColor:"#e3893c" },
    endpoints:{ customer:{persist:true}, payment:{tenders:["cash","card"], closeGate:"balanceLE0", points:["deposit-balance"], deposit:{pct:50}} },
    timer:{ mode:"aging", warnSec:600, badSec:1200, label:"in shop" },
    catalog:[
      {id:"r1", name:"Phone screen", price:129.00, category:"repair", path:["diagnose","repair","ready"],
        modifiers:[{group:"Device", required:true, options:[{name:"iPhone",price:0},{name:"Android",price:0},{name:"Other",price:20}]}],
        flags:["Data-loss waiver"]},
      {id:"r2", name:"Battery", price:59.00, category:"repair", path:["repair","ready"]},         // skips diagnostics
      {id:"r3", name:"Diagnostic", price:25.00, category:"repair", path:["diagnose","ready"]}
    ],
    stations:[
      {id:"counter",  type:"central",    label:"Front Counter",     view:{money:true}},
      {id:"diagnose", type:"production",  label:"Diagnostics",      view:{money:false}},
      {id:"repair",   type:"production",  label:"Repair Bench",     view:{money:false}},
      {id:"ready",    type:"staging",     label:"Ready Shelf",      view:{money:false}, checklist:["Powered on & tested","Cleaned","Case sealed"]},
      {id:"board",    type:"board",       label:"Job Board",        view:{money:false}},
      {id:"tracker",  type:"tracker",     label:"Customer Tracker", view:{money:false, external:true}}
    ]
  },
  salon: {   // FOURTH trade — services + per-provider commission + tips + retail, config-only
    label:"Salon", topology:"hub-and-spoke",
    branding:{ name:"Demo Salon", brandColor:"#b06fdb" },
    endpoints:{ customer:{persist:true}, payment:{tenders:["cash","card"], closeGate:"balanceLE0", tip:{presets:[15,18,20]}},
      loyalty:{ earnPerDollar:1, redeemPoints:20, redeemValue:5 } },   // earn 1 pt/$1; 20 pts = $5 off
    performers:["Alex","Sam","Jordan"],
    staff:[{id:"e1",name:"Alex",pin:"1111"},{id:"e2",name:"Sam",pin:"2222"},{id:"e3",name:"Jordan",pin:"3333"}],   // clock in by PIN
    welcome:{ message:"Make someone's day today ✂️", specials:["Ask about the color special","New: keratin add-on"] },
    commission:{ pct:40 },              // 40% of service sales
    catalog:[
      {id:"s1", name:"Haircut", price:35, category:"service",  path:["chair"], performer:true},
      {id:"s2", name:"Color",   price:85, category:"service",  path:["chair"], performer:true},
      {id:"s3", name:"Shampoo", price:22, category:"retail",   path:[]},              // retail — no performer, no commission
      {id:"s4", name:"Gift card $25", price:25, category:"giftcard", path:[]}         // sold as a product; credits gift balance
    ],
    stations:[
      {id:"desk",   type:"central",    label:"Front Desk",  view:{money:true}},
      {id:"chair",  type:"production",  label:"Chair",      view:{money:false}},
      {id:"book",   type:"booking",    label:"Appointments", view:{}},
      {id:"clock",  type:"timeclock",  label:"Time Clock",  view:{}},
      {id:"office", type:"report",     label:"Back Office", view:{money:true}}
    ]
  }
};

/* Module registry: enabling a station of a type auto-enables its module (the module contract). */
const MODULES = {
  core:    { label:"Core (intake/checkout)", stationTypes:["intake","fulfillment","central"] },
  makers:  { label:"Production / kitchen",    stationTypes:["production"] },
  staging: { label:"Staging / rack",          stationTypes:["staging"] },
  board:   { label:"Status board",            stationTypes:["board"] },
  portal:  { label:"Customer tracker",        stationTypes:["tracker"] },
  office:  { label:"Commission / reports",    stationTypes:["report"] },
  detail:  { label:"Detail / itemize",        stationTypes:["detail"] },
  route:   { label:"Delivery route",          stationTypes:["route"] },
  clock:   { label:"Time clock",              stationTypes:["timeclock"] },
  booking: { label:"Appointments",            stationTypes:["booking"] },
  kds:     { label:"Kitchen display (bump)",  stationTypes:["kds"] },
  floor:   { label:"Floor / table plan",      stationTypes:["floor"] },
  schedule:{ label:"Staff scheduling",        stationTypes:["schedule"] },
  worker:  { label:"Worker portal",           stationTypes:["worker"] }
};
function enabledModules(flow){ const types=new Set(flow.stations.map(s=>s.type)); return Object.keys(MODULES).filter(m=>MODULES[m].stationTypes.some(t=>types.has(t))); }
const STATUS_LABEL = { INPROGRESS:"In progress", READY:"Ready for pickup", PAID:"Ready for pickup", CLOSED:"Picked up" };
/* Config-driven NAMED LIFECYCLE STAGE for an order (e.g. Received → Detailing → Assembly → Racked → Ready → Picked up).
   Derives from the least-advanced incomplete line's current station, so the order reads as "where the slowest piece is."
   FLOW.lifecycle overrides the labels; FLOW.lifecycle.public overrides the customer-tracker phrasing. No trade code — pure config.
   Falls back to sensible defaults (station labels) when no lifecycle config is present, so every trade benefits. */
function stageOf(r, pub){
  const base = (FLOW.lifecycle) || {}; const L = (pub && base.public) ? Object.assign({}, base, base.public) : base;
  if(r.undetailed) return L.dropped || "Received — being itemized";
  if(r.status === "CLOSED") return L.done || "Picked up";
  if(r.status === "READY" || r.status === "PAID") return L.ready || "Ready for pickup";
  const inc = (r.lines||[]).filter(l => !lineComplete(l));
  if(!inc.length) return L.ready || "Ready for pickup";
  const started = (r.lines||[]).some(l => (l.stage||0) > 0 || lineComplete(l));
  if(!started) return L.received || "Received";
  let least = inc[0]; inc.forEach(l => { if((l.stage||0) < (least.stage||0)) least = l; });
  const stId = least.path[least.stage||0];
  const station = (FLOW.stations||[]).find(s => s.id === stId);
  return (L.byStation && L.byStation[stId]) || (station && (station.stageLabel || station.label)) || "In progress";
}

/* ============================================================================ ENGINE */
// A downloaded/built POS injects its single flow before this script runs — then there is no demo picker.
if(typeof window!=="undefined" && window.CUSTOMPOS_FLOW){ const f=window.CUSTOMPOS_FLOW; FLOWS = {}; FLOWS[f.flowId||"business"] = f; }
function flowId(){ const s=localStorage.getItem("custompos_flow"); return (s&&FLOWS[s]) ? s : Object.keys(FLOWS)[0]; }
let FLOW = FLOWS[flowId()];
function dkey(){ return "custompos_demo_"+flowId(); }
function skey(){ return "custompos_station_"+flowId(); }
function wkey(){ return "custompos_worker_"+flowId(); }   // worker portal: who's signed in on THIS device (personal-device stay-signed-in)
function loadDB(){ try { const d=JSON.parse(localStorage.getItem(dkey()))||{records:[],seq:0,customers:[]}; d.customers=d.customers||[]; d.punches=d.punches||[]; d.received=d.received||{}; d.bookings=d.bookings||[]; d.quotes=d.quotes||[]; d.adjustLog=d.adjustLog||[]; d.tables=d.tables||{}; d.turns=d.turns||[]; d.shifts=d.shifts||[]; d.schedule=d.schedule||{}; d.timeoff=d.timeoff||[]; d.incidents=d.incidents||[]; d.kudos=d.kudos||[]; return d; } catch(e){ return {records:[],seq:0,customers:[],punches:[],received:{},bookings:[],quotes:[],adjustLog:[],tables:{},turns:[],shifts:[],schedule:{},timeoff:[],incidents:[],kudos:[]}; } }
/* OPTIONAL multi-device sync — OFF unless a hub is configured (?hub=… / window.CUSTOMPOS_HUB / localStorage).
   When on, every save pushes to the hub and a poller pulls the merged DB, so separate devices share one POS. */
const SYNC = {
  url(){ try{ const q=new URL(location.href).searchParams.get("hub"); return q || (typeof window!=="undefined"&&window.CUSTOMPOS_HUB) || localStorage.getItem("custompos_hub") || ""; }catch(e){ return ""; } },
  get on(){ return !!this.url(); }, applying:false,
  push(){ if(!this.on) return; try{ fetch(this.url().replace(/\/$/,"")+"/api/db",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({db:loadDB()})}).then(r=>r.json()).then(j=>this.adopt(j.db)).catch(()=>{}); }catch(e){} },
  pull(){ if(!this.on) return; try{ fetch(this.url().replace(/\/$/,"")+"/api/db").then(r=>r.json()).then(j=>this.adopt(j.db)).catch(()=>{}); }catch(e){} },
  adopt(db){ if(!db) return; this.applying=true; try{ localStorage.setItem(dkey(), JSON.stringify(db)); }catch(e){} this.applying=false; render(); }
};
function saveDB(db){
  // stamp a modification time on any record whose content changed, so hub merge keeps the newer copy
  try{ const prev=JSON.parse(localStorage.getItem(dkey())||"{}"); const norm=r=>JSON.stringify({...r, upd:0});
    const was=new Map((prev.records||[]).map(r=>[r.id, norm(r)]));
    (db.records||[]).forEach(r=>{ if(was.get(r.id)!==norm(r)) r.upd=Date.now(); });
  }catch(e){}
  localStorage.setItem(dkey(), JSON.stringify(db)); if(SYNC.on && !SYNC.applying) SYNC.push();
}
let DB = loadDB();

function setFlow(id){ localStorage.setItem("custompos_flow", id); FLOW=FLOWS[id]; draft=null; pending=null; DB=loadDB(); render(); }
function boundStation(){ const id=localStorage.getItem(skey()); return FLOW.stations.find(s=>s.id===id)||null; }
function bindStation(id){ localStorage.setItem(skey(), id); render(); }
function unbind(){ localStorage.removeItem(skey()); render(); }

/* ===================================== MULTI-STORE (optional) =====================================
   A flow with a `stores` list becomes multi-location. Each device is scoped to a store; every order belongs
   to a store — the customer's home store if known, else this device's store, else the plant. Orders whose
   store is a DROP store are produced at the PLANT and read "assembled at <plant>". Print routing (Stage 4)
   keys off the ORDER's storeId, never the workstation. Fully inert when a flow has no `stores` — a
   single-store business never sees any of it. Pure data-as-config, no per-trade code. */
function storesOn(){ return Array.isArray(FLOW.stores) && FLOW.stores.length>0; }
function storeList(){ return storesOn() ? FLOW.stores : []; }
function storeById(id){ return storeList().find(s=>s.id===id) || null; }
function storeName(id){ const s=storeById(id); return s ? s.name : ""; }
function isPlantStore(id){ const s=storeById(id); return !!(s && s.plant); }
function plantStore(){ return storeList().find(s=>s.plant) || storeList()[0] || null; }
function defaultStoreId(){ const p=plantStore(); return p ? p.id : null; }
function stkey(){ return "custompos_store_"+flowId(); }               // which store THIS device is at
function homeStore(){ if(!storesOn()) return null; const id=localStorage.getItem(stkey()); return storeById(id) ? id : null; }
function setStore(id){ if(id) localStorage.setItem(stkey(), id); else localStorage.removeItem(stkey()); render(); }
function storeForOrder(cust){ return (cust && cust.storeId) || homeStore() || defaultStoreId(); }   // an order's home store
function storeChip(r){ if(!storesOn() || !r.storeId) return ""; const nm=storeName(r.storeId); return nm ? " <span class='pill' title='Store'>🏬 "+nm+"</span>" : ""; }
function tableChip(r){ return r.tableId ? " <span class='pill' title='Table'>🍽 "+tableLabel(r.tableId)+"</span>" : ""; }
function assembledAt(r){ if(!storesOn() || !r.storeId) return ""; const p=plantStore(); return (p && r.storeId!==p.id) ? "assembled at "+p.name : ""; }   // a drop-store order is done at the plant

/* ===================================== MONEY MATH ===================================== */
function lineSubtotal(r){ return r.lines.reduce((s,l)=> s + l.price*l.qty, 0); }
function recordDiscount(r){ return Math.min(r.discount||0, lineSubtotal(r)); }
function taxIncluded(){ return !!(FLOW.endpoints.tax && FLOW.endpoints.tax.included); }
function recordTax(r){                                   // per-line taxable; rate from config; discount prorated
  const rate=(FLOW.endpoints.tax&&FLOW.endpoints.tax.rate)||0; if(!rate) return 0;
  const sub=lineSubtotal(r); if(sub<=0) return 0;
  const taxable=r.lines.filter(l=>l.taxable!==false && l.category!=="giftcard").reduce((s,l)=>s+l.price*l.qty,0);
  const eff=taxable*(sub-recordDiscount(r))/sub;                       // taxable base after prorated discount
  return taxIncluded() ? +(eff*rate/(1+rate)).toFixed(2)              // VAT-style: tax is the portion already inside the price
                       : +(eff*rate).toFixed(2);                       // added on top
}
function recordNet(r){ return +(lineSubtotal(r) - recordDiscount(r) - (taxIncluded()?recordTax(r):0)).toFixed(2); }   // sales excluding tax
function recordTotal(r){ return +(lineSubtotal(r) - recordDiscount(r) + (taxIncluded()?0:recordTax(r)) + (r.tip||0) + (r.roundUp||0)).toFixed(2); }   // included tax is already inside the price; roundUp = optional charity add-on

function lineAge(l){ const it=FLOW.catalog.find(i=>i.id===l.catId); const a=it&&it.ageRestricted; return a===true?21:(+a||0); }
function orderAgeReq(r){ return Math.max(0, ...((r.lines||[]).filter(l=>!l.returned).map(lineAge))); }
function recordPaid(r){ return (r.tenders||[]).reduce((s,t)=> s + t.amount, 0); }

// refund reverses every original tender back to itself (card → card, cash → cash) and marks the order REFUNDED
function refundRecord(r){
  (r.tenders||[]).filter(t=>!t.refund).forEach(t=>{ if(t.type==="card" && payAdapter().refund){ payAdapter().refund(t.ref, Math.round(t.amount*100)); } });
  // reversing a house-account charge also credits the customer's balance (A/R)
  if(r.customer){ const cust=(DB.customers||[]).find(x=>x.phone===r.customer.phone); if(cust){ const acct=(r.tenders||[]).filter(t=>!t.refund&&t.type==="account").reduce((s,t)=>s+t.amount,0); if(acct){ cust.balance=+((cust.balance||0)-acct).toFixed(2); if(cust.balance<0) cust.balance=0; } } }
  (r.tenders||[]).filter(t=>!t.refund).slice().forEach(t=>{ r.tenders.push({ type:t.type, amount:+(-t.amount).toFixed(2), refund:true, ref:t.ref }); });

}
function returnedSubtotal(r){ return (r.lines||[]).filter(l=>l.returned).reduce((s,l)=>s+l.price*l.qty,0); }
// LINE-LEVEL return: refund selected lines' share of the total to the original tender(s), mark them returned
function returnLines(r, lineIds){
  const allSub=lineSubtotal(r); if(allSub<=0) return;
  const retSub=r.lines.filter(l=>lineIds.includes(l.id)).reduce((s,l)=>s+l.price*l.qty,0); if(retSub<=0) return;
  const amount=+((retSub/allSub)*recordTotal(r)).toFixed(2);
  const pos=(r.tenders||[]).filter(t=>!t.refund && t.amount>0); const posTotal=pos.reduce((s,t)=>s+t.amount,0)||amount;
  pos.forEach(t=>{ const share=+(-(amount*t.amount/posTotal)).toFixed(2); if(share){ if(t.type==="card"&&payAdapter().refund) payAdapter().refund(t.ref, Math.round(-share*100)); r.tenders.push({ type:t.type, amount:share, refund:true, ref:t.ref }); } });
  if(r.customer){ const cust=(DB.customers||[]).find(x=>x.phone===r.customer.phone); if(cust){ const acctPos=pos.filter(t=>t.type==="account").reduce((s,t)=>s+t.amount,0); if(acctPos>0){ const acctShare=+((amount*acctPos/posTotal)).toFixed(2); cust.balance=+((cust.balance||0)-acctShare).toFixed(2); if(cust.balance<0) cust.balance=0; } } }
  lineIds.forEach(id=>{ const l=r.lines.find(x=>x.id===id); if(l) l.returned=true; });
  if(r.lines.every(l=>l.returned)) r.status="REFUNDED";
  r.refundedAt=new Date().toISOString().slice(11,16); saveDB(DB); render();
}

/* Processor-agnostic PAYMENTS interface (matches docs/PAYMENTS-MODULE.md). A simulator adapter ships by
   default so a downloaded POS takes card payments out of the box; the certified CardConnect adapter swaps in
   on the business's own server. The browser only ever sees a token + last4 + brand — never a card number. */
const PAYMENTS = {
  sim: {
    label:"Simulator",
    charge(amountCents){
      const cents=Math.round(amountCents);
      if(cents%100===13) return { status:"declined", message:"declined (demo: any $_.13 declines)" };  // demo decline path
      const brands=["Visa","Mastercard","Amex"];
      return { status:"approved", ref:"SIM"+cents, auth:"OK", token:"tok_sim", brand:brands[cents%3], last4:String(cents).slice(-4).padStart(4,"0") };
    },
    refund(ref, amountCents){ return { status:"refunded", ref:(ref||"SIM")+"-R", amount:Math.round(amountCents) }; }
  }
};
function payAdapter(){ const pr=(FLOW.endpoints.payment&&FLOW.endpoints.payment.provider)||"sim"; return PAYMENTS[pr]||PAYMENTS.sim; }

/* NOTIFY — the same processor-agnostic shape as payments. A sim adapter records the message so a downloaded POS
   works offline; a hub adapter (Twilio etc.) does the real send server-side. The browser never holds an API key. */
const NOTIFY = { sim: { label:"Simulator", send(to, body){ return { status:"sent", to, body }; } } };
function notifyAdapter(){ const pr=(FLOW.endpoints.notify&&FLOW.endpoints.notify.provider)||"sim"; return NOTIFY[pr]||NOTIFY.sim; }
function composeNotify(r){
  const t=(FLOW.endpoints.notify&&FLOW.endpoints.notify.template)||"Hi {name}, your order #{number} at {biz} is ready.";
  return t.replace(/\{name\}/g, (r.customer&&r.customer.name)||"there").replace(/\{number\}/g, r.number).replace(/\{biz\}/g, FLOW.branding.name).replace(/\{status\}/g, STATUS_LABEL[r.status]||r.status);
}
function lineComplete(l){ return l.stage >= l.path.length; }
function allComplete(r){ return r.lines.every(lineComplete); }
// COURSE PACING: with coursing on, only fired courses reach the line; later courses hold until "fired".
function coursingOn(){ return !!(FLOW.endpoints && FLOW.endpoints.coursing); }
function courseOf(l){ return l.course||1; }
function courseReleased(r, l){ return !coursingOn() || courseOf(l) <= (r.firedCourse||1); }
function courseLabel(n){ const c=(FLOW.endpoints&&FLOW.endpoints.coursing&&FLOW.endpoints.coursing.labels)||FLOW.courses; return (c&&c[n-1]) || ("Course "+n); }
function maxCourse(r){ return Math.max(1, ...r.lines.map(courseOf)); }
function heldCourses(r){ return coursingOn() && (r.firedCourse||1) < maxCourse(r) && r.status==="INPROGRESS"; }

/* --- TIMER / SLA service: one primitive, aging or back-scheduled-due, threshold colors --- */
function fmtDur(s){ s=Math.max(0,Math.round(s)); if(s>=3600){ const h=Math.floor(s/3600), m=Math.round((s%3600)/60); return h+"h "+m+"m"; } const m=Math.floor(s/60); return m+":"+String(s%60).padStart(2,"0"); }
function clockChip(r){
  const t=FLOW.timer; if(!t||!r.ts) return "";
  let cls, txt;
  if(t.mode==="due"){ const rem=(r.ts + t.promiseSec*1000 - Date.now())/1000;
    cls = rem<0 ? "bad" : rem<=t.warnSec ? "warn" : "good"; txt = rem<0 ? "OVERDUE" : "due "+fmtDur(rem); }
  else { const el=(Date.now()-r.ts)/1000; cls = el>=t.badSec ? "bad" : el>=t.warnSec ? "warn" : "good"; txt = fmtDur(el); }

}

/* --- the RULES EVALUATOR: par/86 remaining, and modifier requirements --- */
function soldOf(catId){
  let n = DB.records.reduce((s,r)=> s + r.lines.filter(l=>l.catId===catId).reduce((a,l)=>a+l.qty,0), 0);
  if(draft) n += draft.lines.filter(l=>l.catId===catId).reduce((a,l)=>a+l.qty,0);
  return n;
}
function remainingOf(item){ return item.par==null ? Infinity : item.par - soldOf(item.id); }
function is86(item){ return remainingOf(item) <= 0; }
// INVENTORY: on-hand = starting stock + any received − everything sold. Tracked only when item.stock is set.
/* ===================================== INVENTORY ===================================== */
function tracksStock(item){ return item.stock!=null; }
function stockOnHand(item){ return (item.stock||0) + ((DB.received||{})[item.id]||0) - soldOf(item.id); }
// reason-coded stock change: receive/transfer add or remove, waste removes, recount sets the on-hand
const STOCK_REASONS = { "Receive":1, "Transfer in":1, "Transfer out":-1, "Waste":-1, "Recount":0 };
function adjustStock(item, qty, reason){
  qty=Number(qty)||0; if(!qty && reason!=="Recount") return;
  const sign=STOCK_REASONS[reason]!=null?STOCK_REASONS[reason]:1;
  const delta = reason==="Recount" ? +(qty - stockOnHand(item)) : sign*Math.abs(qty);
  DB.received=DB.received||{}; DB.received[item.id]=(DB.received[item.id]||0)+delta;
  DB.adjustLog=DB.adjustLog||[]; DB.adjustLog.push({ catId:item.id, name:item.name, reason, delta, at:new Date().toISOString().slice(11,16), day:todayStr() });
  saveDB(DB); render();
}
function isLowStock(item){ return tracksStock(item) && stockOnHand(item) <= (item.reorderAt!=null?item.reorderAt:0); }
function isOutOfStock(item){ return tracksStock(item) && stockOnHand(item) <= 0; }
function needsConfig(item){ return (item.modifiers&&item.modifiers.length) || (item.addons&&item.addons.length) || (item.flags&&item.flags.length) || item.performer; }

/* TIP POOLING — pooled tips shared fairly by hours worked (opt-in). Helps tipped hourly staff split evenly.
   On when FLOW.endpoints.payment.tipPool (or .tip.pool). Distribution is by each worker's recorded hours. */
function tipPoolOn(){ const pay=FLOW.endpoints&&FLOW.endpoints.payment; return !!(pay && (pay.tipPool || (pay.tip&&pay.tip.pool))); }
function poolHours(){ const by={}; let tot=0; (DB.punches||[]).forEach(pn=>{ const h=workedMs(pn)/3600000; by[pn.name]=(by[pn.name]||0)+h; tot+=h; }); return {by, tot}; }
function tipsForDay(day){ return DB.records.filter(r=>(r.status==="PAID"||r.status==="CLOSED") && dayOf(r.ts)===day).reduce((s,r)=>s+(r.tip||0),0); }
function tipShareFor(name, day){ const t=tipsForDay(day); const {by,tot}=poolHours(); return (!tot||!t)?0:t*(by[name]||0)/tot; }

/* WIN-BACK — regulars we haven't seen in a while. Bringing a lapsed customer back is cheaper than finding a new
   one; this surfaces them so the owner can invite them in one tap (over the notify seam). */
function winbackDays(){ return (FLOW.endpoints && FLOW.endpoints.winback && +FLOW.endpoints.winback.days) || 30; }
function customerLastVisit(phone){ let mx=0; DB.records.forEach(r=>{ if(r.customer && r.customer.phone===phone && (r.ts||0)>mx) mx=r.ts; }); return mx; }
function lapsedCustomers(){ const cut=Date.now()-winbackDays()*86400000; return (DB.customers||[]).map(c=>({c, last:customerLastVisit(c.phone)})).filter(x=>x.last>0 && x.last<cut).sort((a,b)=>a.last-b.last); }

/* COMMISSION & TIPS report — money-math primitive: per-performer service sales, commission %, tips */
/* ===================================== ROLES + MONEY-GATE (optional) =====================================
   Money-reversing / discretionary actions (refund, return) can require a manager/owner approval. Opt-in via
   FLOW.endpoints.approvals = { refund:true } together with FLOW.staff roles (role "owner"|"manager" may
   approve). Inert when unconfigured — a shop with no approver roles keeps the plain actions. The approver
   enters their PIN at the moment of the action; every approval is written to an audit log (DB.approvals).
   Generalizes "staff requests, owner approves" — the anti-theft gate — with no per-trade code. */
function approvers(){ return (FLOW.staff||[]).filter(s=> s.role==="owner" || s.role==="manager"); }
function needsApproval(action){ return !!(FLOW.endpoints && FLOW.endpoints.approvals && FLOW.endpoints.approvals[action]) && approvers().length>0; }
function withApproval(action, label, fn){
  if(!needsApproval(action)){ fn(null); render(); return; }
  const pin = prompt(label + "\nEnter a manager/owner PIN to approve this " + action + ":");
  if(pin==null) return;                                  // cancelled — no change
  const who = approvers().find(s=> String(s.pin)===String(pin));
  if(!who){ flash("Not authorized — a manager or owner PIN is required"); return; }
  fn(who);
  DB=loadDB(); DB.approvals=DB.approvals||[]; DB.approvals.push({ action, label, by:who.name, at:new Date().toISOString().slice(11,16), ts:Date.now() }); saveDB(DB);
  render();
}
function renderReport(app, station){
  const day = reportDay || todayStr(); const isToday = day===todayStr();
  app.innerHTML="<h2>"+station.label+" — "+(isToday?"today":day)+"</h2>";
  // day navigation — the report defaults to today but you can page back through history
  const nav=document.createElement("div"); nav.className="row"; nav.style.margin="0 0 10px";
  const prev=document.createElement("button"); prev.textContent="← "+shiftDay(day,-1); prev.onclick=()=>{ reportDay=shiftDay(day,-1); render(); }; nav.appendChild(prev);
  const dp=document.createElement("input"); dp.type="date"; dp.value=day; dp.style.margin="0 8px"; dp.max=todayStr(); dp.onchange=e=>{ reportDay = e.target.value||todayStr(); render(); }; nav.appendChild(dp);
  if(!isToday){ const next=document.createElement("button"); next.textContent=shiftDay(day,1)+" →"; next.onclick=()=>{ reportDay=shiftDay(day,1); if(reportDay===todayStr()) reportDay=null; render(); }; nav.appendChild(next);
    const tb=document.createElement("button"); tb.textContent="Today"; tb.style.marginLeft="8px"; tb.onclick=()=>{ reportDay=null; render(); }; nav.appendChild(tb); }
  app.appendChild(nav);
  const done=DB.records.filter(r=>(r.status==="PAID"||r.status==="CLOSED"||r.status==="REFUNDED") && dayOf(r.ts)===day);
  const L=(lab,val,bold)=>"<div class='line'>"+(bold?"<b>":"<span>")+lab+(bold?"</b>":"</span>")+"<span class='spacer'></span>"+(bold?"<b>":"<span>")+val+(bold?"</b>":"</span>")+"</div>";
  // ---- daily sales summary (refund-aware: a refunded order's sale nets out, its reversed tender nets its tenders) ----
  let net=0, tax=0, tips=0, disc=0, items=0, refunds=0, orders=0, cogs=0, roundUp=0; const byTender={}, byCat={}, byItem={}, byHour={};
  const itemCost=(l)=>{ const it=FLOW.catalog.find(i=>i.id===l.catId); return (it&&+it.cost)||0; };
  done.forEach(r=>{ const rf=r.status==="REFUNDED";
    if(rf){ refunds += recordTotal(r); }
    else { orders++;
      const allSub=lineSubtotal(r), frac = allSub>0 ? (allSub-returnedSubtotal(r))/allSub : 1;   // proportion still sold (line-level returns)
      net += recordNet(r)*frac; tax += recordTax(r)*frac; tips += r.tip||0; disc += recordDiscount(r)*frac; roundUp += r.roundUp||0;
      if(r.ts){ const hr=new Date(r.ts).getHours(); byHour[hr]=(byHour[hr]||0)+recordNet(r)*frac; }
      r.lines.filter(l=>!l.returned).forEach(l=>{ items += l.qty; cogs += itemCost(l)*l.qty; byCat[l.category||"other"]=(byCat[l.category||"other"]||0)+l.price*l.qty;
        const bi=byItem[l.name]=byItem[l.name]||{qty:0,rev:0,cost:0}; bi.qty+=l.qty; bi.rev+=l.price*l.qty; bi.cost+=itemCost(l)*l.qty; });
      const ret = -((r.tenders||[]).filter(t=>t.refund).reduce((s,t)=>s+t.amount,0)); if(ret>0.0001) refunds += ret;   // partial line returns
    }
    (r.tenders||[]).forEach(t=>{ byTender[t.type]=(byTender[t.type]||0)+t.amount; });   // refund pushes offsetting negative tenders, so this nets
  });
  const onAccount=byTender.account||0;   // charged to house accounts today — money owed, not money collected
  const collected=Object.keys(byTender).filter(k=>k!=="account").reduce((s,k)=>s+byTender[k],0);
  // ---- "how today went": one plain-language verdict fusing sales, margin, and labor — the first thing an owner sees ----
  if(isToday && (orders||refunds)){
    let laborCost=0; (DB.punches||[]).forEach(pn=>{ laborCost += (workedMs(pn)/3600000)*((pn.wage!=null?pn.wage:staffWage(pn.staffId))||0); });
    const haveCost=FLOW.catalog.some(i=>+i.cost>0); const marginPct = (haveCost&&net>0)? (net-cogs)/net*100 : null;
    const laborPct = (laborCost>0&&net>0)? laborCost/net*100 : null;
    const target=(FLOW.labor&&FLOW.labor.targetLaborPct)||30;

  const sum=document.createElement("div"); sum.className="card";

  if(Object.keys(byCat).length){ const cc=document.createElement("div"); cc.className="card"; cc.innerHTML="<div class='row'><b>By category</b></div>"+Object.keys(byCat).sort((a,b)=>byCat[b]-byCat[a]).map(k=>L(k, money(byCat[k]))).join(""); app.appendChild(cc); }
  // ---- top items: your best sellers by revenue, with per-item margin when costs are known (push winners, cut losers) ----

    const top=itemNames.sort((a,b)=>byItem[b].rev-byItem[a].rev).slice(0,8);

    const wrap=document.createElement("div"); wrap.style.cssText="border-top:1px solid var(--line);padding-top:8px;margin-top:8px";

    const rb=document.createElement("button"); rb.className="danger"; rb.textContent="Refund"; rb.style.padding="4px 10px";
    rb.onclick=()=>{ if(needsApproval("refund")){ withApproval("refund","Refund #"+r.number+" "+money(recordPaid(r)),(who)=>{ refundRecord(r); if(who) r.refundBy=who.name; saveDB(DB); }); } else { if(!confirm("Refund #"+r.number+" "+money(recordPaid(r))+" to "+tl+"?")) return; refundRecord(r); saveDB(DB); render(); } };

      retBtn.onclick=()=>{ const ids=picks.filter(x=>x.cb.checked).map(x=>x.id); if(!ids.length){ flash("Tick the items to return"); return; } if(needsApproval("refund")){ withApproval("refund","Return items on #"+r.number,()=>{ returnLines(r, ids); }); } else { returnLines(r, ids); } };

    const ret=r.lines.filter(l=>l.returned); if(ret.length){ const rr=document.createElement("div"); rr.className="muted"; rr.style.marginTop="4px"; rr.textContent="Returned: "+ret.map(l=>l.name).join(", "); wrap.appendChild(rr); }

  app.appendChild(rc);
  if((DB.approvals||[]).length){ const ac=document.createElement("div"); ac.className="card"; ac.innerHTML="<div class='row'><b>Approvals (audit)</b></div>";

/* TIME CLOCK — staff punch in/out by PIN, then a welcome screen (daily message + specials + encouragement).
   v0.44 adds worker-rights Phase 2: unpaid BREAKS (start/end), REAL-TIME EARNINGS while on shift, and a
   worker-protective BREAK-RULES engine (meal/rest reminders surfaced by default; operators tune, they don't
   silently remove). Config: FLOW.staff [{id,name,pin,wage?}], optional FLOW.welcome {message,specials:[...]},
   optional FLOW.labor {mealAfterHrs,mealMins,restEveryHrs,restMins}. Punches land in DB.punches. */
const CLOCK_CHEERS = ["Have a great shift!","You've got this.","Thanks for being here.","Let's make it a good one.","The team's glad you're on today."];
// worker-protective defaults — a shop that configures nothing still reminds workers of their breaks
const LABOR_DEFAULTS = { mealAfterHrs:5, mealMins:30, restEveryHrs:4, restMins:10 };
function laborRules(){ return Object.assign({}, LABOR_DEFAULTS, (FLOW.labor)||{}); }
const nowHM = () => new Date().toTimeString().slice(0,5);   // local HH:MM (matches the wall clock the worker sees)
function openPunch(staffId){ return (DB.punches||[]).find(p=>p.staffId===staffId && !p.out); }
function onBreak(p){ return !!(p && (p.breaks||[]).some(b=>!b.end)); }
function curBreak(p){ return p && (p.breaks||[]).find(b=>!b.end); }
function breakMs(p){ const now=Date.now(); return (p.breaks||[]).reduce((s,b)=> s + ((b.end?b.endTs:now)-b.startTs), 0); }
function workedMs(p){ const now=Date.now(); return Math.max(0, ((p.out?p.outTs:now)-p.inTs) - breakMs(p)); }  // paid time = clocked minus unpaid breaks
function hoursToday(staffId){ return (DB.punches||[]).filter(p=>p.staffId===staffId).reduce((s,p)=> s + workedMs(p), 0)/3600000; }
function staffWage(staffId){ const s=(FLOW.staff||[]).find(x=>x.id===staffId); return (s&&+s.wage)||0; }
function earnedToday(staffId){ return hoursToday(staffId) * staffWage(staffId); }
// worker-protective reminder: due a meal break once past mealAfterHrs with none taken yet
function breakDue(p){ if(!p) return null; const r=laborRules(); if(onBreak(p)) return null;
  const worked=workedMs(p)/3600000;
  const tookMeal=(p.breaks||[]).some(b=> b.end && (b.endTs-b.startTs)/60000 >= r.mealMins*0.6 );
  if(r.mealAfterHrs && worked>=r.mealAfterHrs && !tookMeal)
    return "You've worked "+worked.toFixed(1)+" h — you're due a "+r.mealMins+"-minute meal break.";
  const anyBreak=(p.breaks||[]).length>0;   // a rest break after a stretch with none at all
  if(r.restEveryHrs && worked>=r.restEveryHrs && !anyBreak)
    return "You've been on "+worked.toFixed(1)+" h without a break — take a "+r.restMins+"-minute breather.";
  return null;
}
// --- worker safety: file an incident / injury report, or a panic "get help now" alert (rides the notify seam) ---
const INCIDENT_TYPES = ["Injury","Safety hazard","Harassment","Near miss","Other"];
function incidentTypes(){ return (FLOW.safety && FLOW.safety.types) || INCIDENT_TYPES; }
function openIncidents(){ return (DB.incidents||[]).filter(i=>!i.ack); }
function ackIncident(id){ DB=loadDB(); const i=(DB.incidents||[]).find(x=>x.id===id); if(i) i.ack=true; saveDB(DB); render(); }
function fileIncident(staff, type, note, urgent){ DB=loadDB(); DB.incidents=DB.incidents||[];
  const rec={ id:"I"+Date.now(), staffId:staff?staff.id:null, name:staff?staff.name:"(unknown)", type, note:note||"", urgent:!!urgent, ts:Date.now(), at:nowHM(), day:todayStr(), ack:false };
  DB.incidents.push(rec);
  const phone=FLOW.safety && FLOW.safety.alertPhone;   // alert a manager if configured — never blocks the record
  if(phone && FLOW.endpoints && FLOW.endpoints.notify){ try{ notifyAdapter().send(phone, (urgent?"🆘 HELP NOW — ":"⚠️ Incident — ")+rec.name+": "+type+(note?" — "+note:"")+" @ "+rec.at); }catch(e){} }
  incidentSent = urgent?"help":"filed"; saveDB(DB); render();
}
function clockIn(staff){ DB.punches.push({ staffId:staff.id, name:staff.name, in:nowHM(), inTs:Date.now(), out:null, outTs:null, breaks:[], wage:+staff.wage||0 }); clockWelcome={ name:staff.name, inbound:true, staffId:staff.id }; clockAction=null; pinBuf=""; saveDB(DB); render(); }
function clockOut(staff){ const p=openPunch(staff.id); if(!p) return; const b=curBreak(p); if(b){ b.end=nowHM(); b.endTs=Date.now(); } p.out=nowHM(); p.outTs=Date.now(); clockWelcome={ name:staff.name, inbound:false, staffId:staff.id }; clockAction=null; pinBuf=""; saveDB(DB); render(); }
function startBreak(staff){ const p=openPunch(staff.id); if(!p||onBreak(p)) return; p.breaks.push({ start:nowHM(), startTs:Date.now(), end:null, endTs:null }); saveDB(DB); render(); }
function endBreak(staff){ const p=openPunch(staff.id); const b=curBreak(p); if(!b) return; b.end=nowHM(); b.endTs=Date.now(); saveDB(DB); render(); }
function renderTimeclock(app, station){

  if(clockTimer){ clearInterval(clockTimer); clockTimer=null; }
  if(staff.some(s=>openPunch(s.id))) clockTimer=setInterval(()=>{ const st=boundStation(); if(st&&st.type==="timeclock") render(); }, 30000);
  // welcome / goodbye screen right after a punch
  if(clockWelcome){
    const w=clockWelcome; const wel=document.createElement("div"); wel.className="card"; wel.style.textAlign="center";
    const cheer=CLOCK_CHEERS[w.name.length % CLOCK_CHEERS.length];  // deterministic (no Math.random in the engine)

      wel.innerHTML="<h2 style='margin:6px 0'>👋 Welcome, "+w.name+"!</h2><div class='muted' style='margin-bottom:10px'>Clocked in at "+nowHM()+" · "+cheer+"</div>";

      const kus=w.staffId?kudosFor(w.staffId):[]; if(kus.length){ const k=kus[0]; const kd=document.createElement("div"); kd.style.cssText="margin-top:10px;background:#123a1e;color:#b6f0c6;border-radius:8px;padding:8px 10px"; kd.innerHTML="⭐ <b>"+k.from+"</b> says: "+k.note; wel.appendChild(kd); }
    } else {

      wel.innerHTML="<h2 style='margin:6px 0'>✅ Thanks, "+w.name+"!</h2><div class='muted' style='margin-bottom:10px'>Clocked out · "+hoursToday(w.staffId).toFixed(2)+" h today"+paid+". See you next time.</div>";

    app.appendChild(wel); return;

  // on-shift action screen — break / clock out / live earnings (shown after a clocked-in worker enters their PIN)
  if(clockAction){

    if(!s||!p){ clockAction=null; render(); return; }
    const card=document.createElement("div"); card.className="card";
    card.innerHTML="<h2 style='margin:2px 0'>Hi "+s.name+"</h2><div class='muted'>On since "+p.in+" · "+(workedMs(p)/3600000).toFixed(2)+" h worked"+(breakMs(p)? " · "+(breakMs(p)/60000).toFixed(0)+" min on break":"")+"</div>";
    if(staffWage(s.id)){ const e=document.createElement("div"); e.className="line"; e.style.fontSize="18px"; e.innerHTML="<span>Earned this shift</span><span class='spacer'></span><b>$"+earnedToday(s.id).toFixed(2)+"</b>"; e.title="at $"+staffWage(s.id).toFixed(2)+"/h"; card.appendChild(e); }
    const due=breakDue(p); if(due){ const d=document.createElement("div"); d.className="line"; d.style.cssText="background:#5a3a12;color:#ffdca8;border-radius:6px;padding:8px;margin-top:6px"; d.textContent="⏰ "+due; card.appendChild(d); }
    const btns=document.createElement("div"); btns.style.cssText="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px";
    if(onBreak(p)){ const b=curBreak(p); const eb=document.createElement("button"); eb.className="primary"; eb.textContent="End break (since "+b.start+")"; eb.onclick=()=>endBreak(s); btns.appendChild(eb); }
    else { const sb=document.createElement("button"); sb.textContent="Start break"; sb.onclick=()=>startBreak(s); btns.appendChild(sb); }
    const co=document.createElement("button"); co.textContent="Clock out"; co.style.background="var(--bad)"; co.style.color="#fff"; co.onclick=()=>clockOut(s); btns.appendChild(co);
    const back=document.createElement("button"); back.textContent="Back"; back.onclick=()=>{ clockAction=null; render(); }; btns.appendChild(back);
    card.appendChild(btns);
    // worker safety — file an incident, or a panic "get help now" alert (identified worker)
    const safe=document.createElement("div"); safe.style.cssText="margin-top:12px;border-top:1px solid var(--line);padding-top:10px";
    if(incidentSent){ safe.innerHTML = incidentSent==="help"
        ? "<div style='color:#ffb3b3'><b>🆘 Help is on the way.</b> Your alert was sent"+((FLOW.safety&&FLOW.safety.alertPhone)?" to a manager":"")+" and logged.</div>"
        : "<div class='muted'>✓ Incident filed and logged. Thank you for reporting.</div>";
      const okb=document.createElement("button"); okb.textContent="OK"; okb.style.marginTop="6px"; okb.onclick=()=>{ incidentSent=null; render(); }; safe.appendChild(okb);
    } else {
