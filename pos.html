<!--
  customPOS — engine skeleton (v0.4)
  ==================================
  Spine (v0.1) · fan-out (v0.2) · per-item paths + central station, two trades on one engine (v0.3).
  v0.4 adds the RULES EVALUATOR — the one mechanism behind several primitives:
    • REQUIRED modifiers  — a choice that must be made before the line can send (steak temp, drink size, starch)
    • SUGGESTED add-ons   — an upsell prompted at order time (oat milk, Scotchgard)
    • 86 / PAR-COUNT      — a remaining-count that decrements and, at zero, disables the item everywhere
  All of it is DATA on the catalog item — no code per trade. Pick the demo business up top.

  One self-contained file, no build, no deps, localStorage. Neutral demo config only.
  Docs: FLOW-SCHEMA.md · MODULE-LIBRARY.md · THE-MODEL.md
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>customPOS — engine skeleton</title>
<!-- install-as-app: standalone display + home-screen icon (no service worker; the app is already offline via localStorage) -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  :root { --brand:#1f6feb; --bg:#0f1115; --card:#181b22; --line:#272b33; --ink:#e6e9ef; --dim:#9aa4b2; --good:#2ea043; --warn:#e3893c; --bad:#d0433a; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  header { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:0; }

  main { max-width:820px; margin:0 auto; padding:18px 16px 60px; }

  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; margin:10px 0; }
  .row { display:flex; align-items:center; gap:10px; } .row .spacer { flex:1; }
  button { font:inherit; color:var(--ink); background:#222834; border:1px solid var(--line); border-radius:8px; padding:9px 14px; cursor:pointer; }
  button:hover { border-color:var(--brand); } button:disabled { opacity:.4; cursor:default; }
  button:focus-visible, input:focus-visible, select:focus-visible, a:focus-visible, label:focus-visible { outline:2px solid var(--brand); outline-offset:2px; }   /* keyboard nav */
  button.primary { background:var(--brand); border-color:var(--brand); color:#fff; font-weight:600; }
  button.good { background:var(--good); border-color:var(--good); color:#fff; }
  button.danger { border-color:var(--bad); color:var(--bad); }
  button.sel { border-color:var(--brand); color:var(--brand); background:#1b2536; }
  .tile { display:inline-block; min-width:150px; text-align:left; margin:5px 6px 0 0; }
  .tile small { display:block; color:var(--dim); }
  .tile.eightysix { position:relative; }
  .muted { color:var(--dim); } .center { text-align:center; }
  .pill { font-size:12px; padding:2px 8px; border-radius:20px; background:#222834; color:var(--dim); border:1px solid var(--line); }
  .pill.route { border-color:var(--brand); color:var(--brand); }
  .pill.x86 { border-color:var(--bad); color:var(--bad); }
  .pill.flag { border-color:var(--bad); color:var(--bad); font-weight:600; }
  .pill.clock.good { border-color:var(--good); color:var(--good); }
  .pill.clock.warn { border-color:var(--warn); color:var(--warn); }
  .pill.clock.bad  { border-color:var(--bad);  color:var(--bad); }
  .line { display:flex; gap:8px; padding:6px 0; border-bottom:1px dashed var(--line); align-items:center; }
  .line:last-child { border-bottom:0; } .line small.mods { color:var(--dim); display:block; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:8px; }
  .empty { color:var(--dim); padding:20px; text-align:center; }
  .picker button { display:block; width:100%; text-align:left; margin:8px 0; padding:14px; }
  .picker button b { font-size:16px; } .picker button small { color:var(--dim); }
  .flowsel { display:flex; gap:8px; margin:6px 0 18px; }
  .mgroup { margin:10px 0; } .mgroup .lbl { color:var(--dim); font-size:13px; margin-bottom:5px; }
  .mgroup .opts { display:flex; gap:6px; flex-wrap:wrap; }
  input { font:inherit; color:var(--ink); background:#222834; border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin:0 6px 6px 0; }

<header>

<script>
/* ============================================================================
   THE FLOWS — businesses as config on ONE engine. Items carry `path` (workstations),
   `modifiers` (required choices), `addons` (suggested upsells), and `par` (86 count).
   ==========================================================================*/
const CUSTOMPOS_VERSION = "0.36";   // engine version (the builder stamps this into downloads)
let FLOWS = {
  counter: {
    label:"Counter shop", topology:"linear",
    branding:{ name:"Demo Counter", brandColor:"#1f6feb" },
    endpoints:{ customer:{persist:false}, payment:{tenders:["cash"], closeGate:"balanceLE0"} },
    timer:{ mode:"aging", warnSec:300, badSec:600, label:"prep" },   // ticket ages green->yellow->red
    capacity:{ perOrderMins:4, max:3 },                              // live wait + cap on orders in the queue
    catalog:[
      {id:"c1", name:"Coffee", price:3.50, category:"drink", path:["bar"]},
      {id:"c2", name:"Latte",  price:4.75, category:"drink", path:["bar"],
        modifiers:[{group:"Size", required:true, options:[{name:"Small",price:0},{name:"Medium",price:0.50},{name:"Large",price:1.00}]}],
        addons:[{name:"Oat milk", price:0.75},{name:"Extra shot", price:0.90}]},
      {id:"c3", name:"Muffin", price:3.25, category:"food", path:["kitchen"], par:1, flags:["Nut allergy"]},   // 86 after 1; flag needs ack at kitchen
      {id:"c4", name:"Bagel",  price:2.75, category:"food", path:["kitchen"]}
    ],
    stations:[
      {id:"order",    type:"intake",      label:"Order Counter", view:{money:true}},
      {id:"bar",      type:"production",  label:"Bar",           view:{money:false}},
      {id:"kitchen",  type:"production",  label:"Kitchen",       view:{money:false}},
      {id:"checkout", type:"fulfillment", label:"Checkout",      view:{money:true}},
      {id:"board",    type:"board",       label:"Expo Board",    view:{money:false}}
    ]
  },
  cleaners: {
    label:"Cleaners", topology:"hub-and-spoke",
    branding:{ name:"Demo Cleaners", brandColor:"#2ea043" },
    endpoints:{ customer:{persist:true}, payment:{tenders:["cash","card","account"], closeGate:"balanceLE0", points:["deposit-balance"], deposit:{pct:50}},
      notify:{ template:"Hi {name}, your order #{number} at {biz} is ready for pickup." } },
    timer:{ mode:"due", promiseSec:172800, warnSec:86400, label:"promise" },   // back-scheduled ready-by date
    catalog:[
      {id:"g1", name:"Shirt", price:6.50, category:"press", path:["assembly","rack"],
        modifiers:[{group:"Starch", required:true, options:[{name:"None",price:0},{name:"Light",price:0},{name:"Heavy",price:0.50}]}],
        flags:["Pre-existing damage"]},
      {id:"g2", name:"Pants", price:7.00, category:"press", path:["assembly","rack"]},
      {id:"g3", name:"Wash & Fold", price:2.75, category:"wf", path:["rack"]}
    ],
    stations:[
      {id:"counter",  type:"central",    label:"Front Counter",    view:{money:true}},
      {id:"assembly", type:"production",  label:"Assembly",        view:{money:false}},
      {id:"rack",     type:"staging",     label:"Rack",            view:{money:false}},
      {id:"board",    type:"board",       label:"Status Board",    view:{money:false}},
      {id:"tracker",  type:"tracker",     label:"Customer Tracker", view:{money:false, external:true}},
      {id:"office",   type:"report",      label:"Office",          view:{money:true}}
    ]
  },
  repair: {   // THIRD trade — added as pure config, no engine changes: approval/waiver gate, split path, aging, deposit
    label:"Repair shop", topology:"hub-and-spoke",
    branding:{ name:"Demo Repair", brandColor:"#e3893c" },
    endpoints:{ customer:{persist:true}, payment:{tenders:["cash","card"], closeGate:"balanceLE0", points:["deposit-balance"], deposit:{pct:50}} },
    timer:{ mode:"aging", warnSec:600, badSec:1200, label:"in shop" },
    catalog:[
      {id:"r1", name:"Phone screen", price:129.00, category:"repair", path:["diagnose","repair","ready"],
        modifiers:[{group:"Device", required:true, options:[{name:"iPhone",price:0},{name:"Android",price:0},{name:"Other",price:20}]}],
        flags:["Data-loss waiver"]},
      {id:"r2", name:"Battery", price:59.00, category:"repair", path:["repair","ready"]},         // skips diagnostics
      {id:"r3", name:"Diagnostic", price:25.00, category:"repair", path:["diagnose","ready"]}
    ],
    stations:[
      {id:"counter",  type:"central",    label:"Front Counter",     view:{money:true}},
      {id:"diagnose", type:"production",  label:"Diagnostics",      view:{money:false}},
      {id:"repair",   type:"production",  label:"Repair Bench",     view:{money:false}},
      {id:"ready",    type:"staging",     label:"Ready Shelf",      view:{money:false}, checklist:["Powered on & tested","Cleaned","Case sealed"]},
      {id:"board",    type:"board",       label:"Job Board",        view:{money:false}},
      {id:"tracker",  type:"tracker",     label:"Customer Tracker", view:{money:false, external:true}}
    ]
  },
  salon: {   // FOURTH trade — services + per-provider commission + tips + retail, config-only
    label:"Salon", topology:"hub-and-spoke",
    branding:{ name:"Demo Salon", brandColor:"#b06fdb" },
    endpoints:{ customer:{persist:true}, payment:{tenders:["cash","card"], closeGate:"balanceLE0", tip:{presets:[15,18,20]}},
      loyalty:{ earnPerDollar:1, redeemPoints:20, redeemValue:5 } },   // earn 1 pt/$1; 20 pts = $5 off
    performers:["Alex","Sam","Jordan"],
    staff:[{id:"e1",name:"Alex",pin:"1111"},{id:"e2",name:"Sam",pin:"2222"},{id:"e3",name:"Jordan",pin:"3333"}],   // clock in by PIN
    welcome:{ message:"Make someone's day today ✂️", specials:["Ask about the color special","New: keratin add-on"] },
    commission:{ pct:40 },              // 40% of service sales
    catalog:[
      {id:"s1", name:"Haircut", price:35, category:"service",  path:["chair"], performer:true},
      {id:"s2", name:"Color",   price:85, category:"service",  path:["chair"], performer:true},
      {id:"s3", name:"Shampoo", price:22, category:"retail",   path:[]},              // retail — no performer, no commission
      {id:"s4", name:"Gift card $25", price:25, category:"giftcard", path:[]}         // sold as a product; credits gift balance
    ],
    stations:[
      {id:"desk",   type:"central",    label:"Front Desk",  view:{money:true}},
      {id:"chair",  type:"production",  label:"Chair",      view:{money:false}},
      {id:"book",   type:"booking",    label:"Appointments", view:{}},
      {id:"clock",  type:"timeclock",  label:"Time Clock",  view:{}},
      {id:"office", type:"report",     label:"Back Office", view:{money:true}}
    ]
  }
};

/* Module registry: enabling a station of a type auto-enables its module (the module contract). */
const MODULES = {
  core:    { label:"Core (intake/checkout)", stationTypes:["intake","fulfillment","central"] },
  makers:  { label:"Production / kitchen",    stationTypes:["production"] },
  staging: { label:"Staging / rack",          stationTypes:["staging"] },
  board:   { label:"Status board",            stationTypes:["board"] },
  portal:  { label:"Customer tracker",        stationTypes:["tracker"] },
  office:  { label:"Commission / reports",    stationTypes:["report"] },
  clock:   { label:"Time clock",              stationTypes:["timeclock"] },
  booking: { label:"Appointments",            stationTypes:["booking"] },
  kds:     { label:"Kitchen display (bump)",  stationTypes:["kds"] }
};
function enabledModules(flow){ const types=new Set(flow.stations.map(s=>s.type)); return Object.keys(MODULES).filter(m=>MODULES[m].stationTypes.some(t=>types.has(t))); }
const STATUS_LABEL = { INPROGRESS:"In progress", READY:"Ready for pickup", PAID:"Ready for pickup", CLOSED:"Picked up" };

/* ============================================================================ ENGINE */
// A downloaded/built POS injects its single flow before this script runs — then there is no demo picker.
if(typeof window!=="undefined" && window.CUSTOMPOS_FLOW){ const f=window.CUSTOMPOS_FLOW; FLOWS = {}; FLOWS[f.flowId||"business"] = f; }
function flowId(){ const s=localStorage.getItem("custompos_flow"); return (s&&FLOWS[s]) ? s : Object.keys(FLOWS)[0]; }
let FLOW = FLOWS[flowId()];
function dkey(){ return "custompos_demo_"+flowId(); }
function skey(){ return "custompos_station_"+flowId(); }
function loadDB(){ try { const d=JSON.parse(localStorage.getItem(dkey()))||{records:[],seq:0,customers:[]}; d.customers=d.customers||[]; d.punches=d.punches||[]; d.received=d.received||{}; d.bookings=d.bookings||[]; d.quotes=d.quotes||[]; d.adjustLog=d.adjustLog||[]; return d; } catch(e){ return {records:[],seq:0,customers:[],punches:[],received:{},bookings:[],quotes:[],adjustLog:[]}; } }
/* OPTIONAL multi-device sync — OFF unless a hub is configured (?hub=… / window.CUSTOMPOS_HUB / localStorage).
   When on, every save pushes to the hub and a poller pulls the merged DB, so separate devices share one POS. */
const SYNC = {
  url(){ try{ const q=new URL(location.href).searchParams.get("hub"); return q || (typeof window!=="undefined"&&window.CUSTOMPOS_HUB) || localStorage.getItem("custompos_hub") || ""; }catch(e){ return ""; } },
  get on(){ return !!this.url(); }, applying:false,
  push(){ if(!this.on) return; try{ fetch(this.url().replace(/\/$/,"")+"/api/db",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({db:loadDB()})}).then(r=>r.json()).then(j=>this.adopt(j.db)).catch(()=>{}); }catch(e){} },
  pull(){ if(!this.on) return; try{ fetch(this.url().replace(/\/$/,"")+"/api/db").then(r=>r.json()).then(j=>this.adopt(j.db)).catch(()=>{}); }catch(e){} },
  adopt(db){ if(!db) return; this.applying=true; try{ localStorage.setItem(dkey(), JSON.stringify(db)); }catch(e){} this.applying=false; render(); }
};
function saveDB(db){
  // stamp a modification time on any record whose content changed, so hub merge keeps the newer copy
  try{ const prev=JSON.parse(localStorage.getItem(dkey())||"{}"); const norm=r=>JSON.stringify({...r, upd:0});
    const was=new Map((prev.records||[]).map(r=>[r.id, norm(r)]));
    (db.records||[]).forEach(r=>{ if(was.get(r.id)!==norm(r)) r.upd=Date.now(); });
  }catch(e){}
  localStorage.setItem(dkey(), JSON.stringify(db)); if(SYNC.on && !SYNC.applying) SYNC.push();
}
let DB = loadDB();

function setFlow(id){ localStorage.setItem("custompos_flow", id); FLOW=FLOWS[id]; draft=null; pending=null; DB=loadDB(); render(); }
function boundStation(){ const id=localStorage.getItem(skey()); return FLOW.stations.find(s=>s.id===id)||null; }
function bindStation(id){ localStorage.setItem(skey(), id); render(); }
function unbind(){ localStorage.removeItem(skey()); render(); }

function lineSubtotal(r){ return r.lines.reduce((s,l)=> s + l.price*l.qty, 0); }
function recordDiscount(r){ return Math.min(r.discount||0, lineSubtotal(r)); }
function taxIncluded(){ return !!(FLOW.endpoints.tax && FLOW.endpoints.tax.included); }
function recordTax(r){                                   // per-line taxable; rate from config; discount prorated
  const rate=(FLOW.endpoints.tax&&FLOW.endpoints.tax.rate)||0; if(!rate) return 0;
  const sub=lineSubtotal(r); if(sub<=0) return 0;
  const taxable=r.lines.filter(l=>l.taxable!==false && l.category!=="giftcard").reduce((s,l)=>s+l.price*l.qty,0);
  const eff=taxable*(sub-recordDiscount(r))/sub;                       // taxable base after prorated discount
  return taxIncluded() ? +(eff*rate/(1+rate)).toFixed(2)              // VAT-style: tax is the portion already inside the price
                       : +(eff*rate).toFixed(2);                       // added on top
}
function recordNet(r){ return +(lineSubtotal(r) - recordDiscount(r) - (taxIncluded()?recordTax(r):0)).toFixed(2); }   // sales excluding tax
function recordTotal(r){ return +(lineSubtotal(r) - recordDiscount(r) + (taxIncluded()?0:recordTax(r)) + (r.tip||0)).toFixed(2); }   // included tax is already inside the price
function recordPaid(r){ return (r.tenders||[]).reduce((s,t)=> s + t.amount, 0); }
function recordBalance(r){ return +(recordTotal(r) - recordPaid(r)).toFixed(2); }
function firstPerformer(r){ const l=r.lines.find(x=>x.performer); return l?l.performer:null; }
// refund reverses every original tender back to itself (card → card, cash → cash) and marks the order REFUNDED
function refundRecord(r){
  (r.tenders||[]).filter(t=>!t.refund).forEach(t=>{ if(t.type==="card" && payAdapter().refund){ payAdapter().refund(t.ref, Math.round(t.amount*100)); } });
  // reversing a house-account charge also credits the customer's balance (A/R)
  if(r.customer){ const cust=(DB.customers||[]).find(x=>x.phone===r.customer.phone); if(cust){ const acct=(r.tenders||[]).filter(t=>!t.refund&&t.type==="account").reduce((s,t)=>s+t.amount,0); if(acct){ cust.balance=+((cust.balance||0)-acct).toFixed(2); if(cust.balance<0) cust.balance=0; } } }
  (r.tenders||[]).filter(t=>!t.refund).slice().forEach(t=>{ r.tenders.push({ type:t.type, amount:+(-t.amount).toFixed(2), refund:true, ref:t.ref }); });
  r.status="REFUNDED"; r.refundedAt=new Date().toISOString().slice(11,16);
}

/* Processor-agnostic PAYMENTS interface (matches docs/PAYMENTS-MODULE.md). A simulator adapter ships by
   default so a downloaded POS takes card payments out of the box; the certified CardConnect adapter swaps in
   on the business's own server. The browser only ever sees a token + last4 + brand — never a card number. */
const PAYMENTS = {
  sim: {
    label:"Simulator",
    charge(amountCents){
      const cents=Math.round(amountCents);
      if(cents%100===13) return { status:"declined", message:"declined (demo: any $_.13 declines)" };  // demo decline path
      const brands=["Visa","Mastercard","Amex"];
      return { status:"approved", ref:"SIM"+cents, auth:"OK", token:"tok_sim", brand:brands[cents%3], last4:String(cents).slice(-4).padStart(4,"0") };
    },
    refund(ref, amountCents){ return { status:"refunded", ref:(ref||"SIM")+"-R", amount:Math.round(amountCents) }; }
  }
};
function payAdapter(){ const pr=(FLOW.endpoints.payment&&FLOW.endpoints.payment.provider)||"sim"; return PAYMENTS[pr]||PAYMENTS.sim; }

/* NOTIFY — the same processor-agnostic shape as payments. A sim adapter records the message so a downloaded POS
   works offline; a hub adapter (Twilio etc.) does the real send server-side. The browser never holds an API key. */
const NOTIFY = { sim: { label:"Simulator", send(to, body){ return { status:"sent", to, body }; } } };
function notifyAdapter(){ const pr=(FLOW.endpoints.notify&&FLOW.endpoints.notify.provider)||"sim"; return NOTIFY[pr]||NOTIFY.sim; }
function composeNotify(r){
  const t=(FLOW.endpoints.notify&&FLOW.endpoints.notify.template)||"Hi {name}, your order #{number} at {biz} is ready.";
  return t.replace(/\{name\}/g, (r.customer&&r.customer.name)||"there").replace(/\{number\}/g, r.number).replace(/\{biz\}/g, FLOW.branding.name).replace(/\{status\}/g, STATUS_LABEL[r.status]||r.status);
}
function lineComplete(l){ return l.stage >= l.path.length; }
function allComplete(r){ return r.lines.every(lineComplete); }
function linesAtStation(r, stationId){ return r.lines.filter(l => !lineComplete(l) && l.path[l.stage]===stationId); }
function afterChange(r){ if(r.status==="INPROGRESS" && allComplete(r)) r.status="READY"; saveDB(DB); }

/* --- TIMER / SLA service: one primitive, aging or back-scheduled-due, threshold colors --- */
function fmtDur(s){ s=Math.max(0,Math.round(s)); if(s>=3600){ const h=Math.floor(s/3600), m=Math.round((s%3600)/60); return h+"h "+m+"m"; } const m=Math.floor(s/60); return m+":"+String(s%60).padStart(2,"0"); }
function clockChip(r){
  const t=FLOW.timer; if(!t||!r.ts) return "";
  let cls, txt;
  if(t.mode==="due"){ const rem=(r.ts + t.promiseSec*1000 - Date.now())/1000;
    cls = rem<0 ? "bad" : rem<=t.warnSec ? "warn" : "good"; txt = rem<0 ? "OVERDUE" : "due "+fmtDur(rem); }
  else { const el=(Date.now()-r.ts)/1000; cls = el>=t.badSec ? "bad" : el>=t.warnSec ? "warn" : "good"; txt = fmtDur(el); }
  return " <span class='pill clock "+cls+"'>"+txt+"</span>";
}

/* --- the RULES EVALUATOR: par/86 remaining, and modifier requirements --- */
function soldOf(catId){
  let n = DB.records.reduce((s,r)=> s + r.lines.filter(l=>l.catId===catId).reduce((a,l)=>a+l.qty,0), 0);
  if(draft) n += draft.lines.filter(l=>l.catId===catId).reduce((a,l)=>a+l.qty,0);
  return n;
}
function remainingOf(item){ return item.par==null ? Infinity : item.par - soldOf(item.id); }
function is86(item){ return remainingOf(item) <= 0; }
// INVENTORY: on-hand = starting stock + any received − everything sold. Tracked only when item.stock is set.
function tracksStock(item){ return item.stock!=null; }
function stockOnHand(item){ return (item.stock||0) + ((DB.received||{})[item.id]||0) - soldOf(item.id); }
// reason-coded stock change: receive/transfer add or remove, waste removes, recount sets the on-hand
const STOCK_REASONS = { "Receive":1, "Transfer in":1, "Transfer out":-1, "Waste":-1, "Recount":0 };
function adjustStock(item, qty, reason){
  qty=Number(qty)||0; if(!qty && reason!=="Recount") return;
  const sign=STOCK_REASONS[reason]!=null?STOCK_REASONS[reason]:1;
  const delta = reason==="Recount" ? +(qty - stockOnHand(item)) : sign*Math.abs(qty);
  DB.received=DB.received||{}; DB.received[item.id]=(DB.received[item.id]||0)+delta;
  DB.adjustLog=DB.adjustLog||[]; DB.adjustLog.push({ catId:item.id, name:item.name, reason, delta, at:new Date().toISOString().slice(11,16), day:todayStr() });
  saveDB(DB); render();
}
function isLowStock(item){ return tracksStock(item) && stockOnHand(item) <= (item.reorderAt!=null?item.reorderAt:0); }
function isOutOfStock(item){ return tracksStock(item) && stockOnHand(item) <= 0; }
function needsConfig(item){ return (item.modifiers&&item.modifiers.length) || (item.addons&&item.addons.length) || (item.flags&&item.flags.length) || item.performer; }

/* ============================================================================ RENDER */
function money(n){ return "$"+n.toFixed(2); }
function dayOf(ts){ return new Date(ts||Date.now()).toLocaleDateString("en-CA"); }   // local YYYY-MM-DD
function todayStr(){ return new Date().toLocaleDateString("en-CA"); }
function shiftDay(dstr, delta){ const d=new Date(dstr+"T12:00:00"); d.setDate(d.getDate()+delta); return d.toLocaleDateString("en-CA"); }
function flash(msg){ let t=document.getElementById("toast"); if(!t){ t=document.createElement("div"); t.id="toast"; t.setAttribute("role","status"); t.setAttribute("aria-live","polite"); t.style.cssText="position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--bad);color:#fff;padding:10px 16px;border-radius:8px;z-index:99;font-weight:600"; document.body.appendChild(t); } t.textContent=msg; t.style.display="block"; }
// data ownership: your data is yours to take out. Everything below builds plain files from the local DB.
function downloadFile(name, text, type){ const blob=new Blob([text],{type:type||"text/plain"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000); }
function csvCell(v){ v=(v==null?"":String(v)); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }
function csvRows(rows){ return rows.map(r=>r.map(csvCell).join(",")).join("\n"); }
function backupJSON(){ return JSON.stringify({ app:"customPOS", flowId:flowId(), exportedAt:new Date().toISOString(), data:loadDB() }, null, 2); }
function customersCSV(){ const cs=(loadDB().customers||[]); return csvRows([["name","phone","points","gift","balance"], ...cs.map(c=>[c.name||"",c.phone||"",c.points||0,c.gift||0,c.balance||0])]); }
function salesCSV(day){ const d=loadDB(); const done=d.records.filter(r=>(r.status==="PAID"||r.status==="CLOSED"||r.status==="REFUNDED") && dayOf(r.ts)===day);
  return csvRows([["order","time","status","items","subtotal","discount","tax","tip","total","tenders"],
    ...done.map(r=>[r.number, r.createdAt||"", r.status, r.lines.map(l=>l.qty+"x "+l.name).join("; "), lineSubtotal(r).toFixed(2), recordDiscount(r).toFixed(2), recordTax(r).toFixed(2), (r.tip||0).toFixed(2), recordTotal(r).toFixed(2), (r.tenders||[]).map(t=>t.type+":"+t.amount).join("; ")])]); }
function slug(){ return (FLOW.branding.name||"custompos").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,""); }
function restoreBackup(text){ const obj=JSON.parse(text); const db=obj&&obj.data?obj.data:obj; if(!db||!Array.isArray(db.records)) throw new Error("not a customPOS backup"); localStorage.setItem(dkey(), JSON.stringify(db)); }
// install-as-app: brand the manifest + theme with the business so "Add to Home Screen" shows the shop's name/color
let __installReady=false;
function setupInstall(){
  if(__installReady) return; __installReady=true;
  const name=FLOW.branding.name||"customPOS", color=FLOW.branding.brandColor||"#1f6feb";
  const tc=document.getElementById("themeColor"); if(tc) tc.content=color;
  const at=document.createElement("meta"); at.name="apple-mobile-web-app-title"; at.content=name; document.head.appendChild(at);
  const letter=(name.trim()[0]||"C").toUpperCase();
  const svg="<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512'><rect width='512' height='512' rx='96' fill='"+color+"'/><text x='256' y='352' font-family='sans-serif' font-size='300' font-weight='bold' fill='#fff' text-anchor='middle'>"+letter+"</text></svg>";
  const icon="data:image/svg+xml,"+encodeURIComponent(svg);
  const manifest={ name, short_name:name.slice(0,12), display:"standalone", start_url:".", background_color:"#0f1115", theme_color:color, icons:[{src:icon, sizes:"any", type:"image/svg+xml"}] };
  const link=document.createElement("link"); link.rel="manifest"; link.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"})); document.head.appendChild(link);
  const ai=document.createElement("link"); ai.rel="apple-touch-icon"; ai.href=icon; document.head.appendChild(ai);
}
function render(){
  DB = loadDB();
  setupInstall();
  document.getElementById("brandDot").style.background = FLOW.branding.brandColor;
  document.getElementById("bizName").textContent = FLOW.branding.name;
  const station = boundStation();
  document.getElementById("stationLabel").textContent = station ? "· "+station.label : "";
  const chg = document.getElementById("changeStation"); chg.style.display = station ? "" : "none"; chg.onclick = unbind;
  const app = document.getElementById("app"); app.innerHTML = "";
  if(!station){ renderPicker(app); return; }
  if(station.type==="intake")           renderIntake(app, station);
  else if(station.type==="production" || station.type==="staging") renderPipeline(app, station);
  else if(station.type==="fulfillment") renderCheckout(app, station);
  else if(station.type==="central"){ renderIntake(app, station); renderCheckout(app, station); }
  else if(station.type==="board")       renderBoard(app, station);
  else if(station.type==="tracker")     renderTracker(app, station);
  else if(station.type==="report")      renderReport(app, station);
  else if(station.type==="timeclock")   renderTimeclock(app, station);
  else if(station.type==="booking")     renderBooking(app, station);
  else if(station.type==="kds")         renderKDS(app, station);
}

/* COMMISSION & TIPS report — money-math primitive: per-performer service sales, commission %, tips */
function renderReport(app, station){
  const day = reportDay || todayStr(); const isToday = day===todayStr();
  app.innerHTML="<h2>"+station.label+" — "+(isToday?"today":day)+"</h2>";
  // day navigation — the report defaults to today but you can page back through history
  const nav=document.createElement("div"); nav.className="row"; nav.style.margin="0 0 10px";
  const prev=document.createElement("button"); prev.textContent="← "+shiftDay(day,-1); prev.onclick=()=>{ reportDay=shiftDay(day,-1); render(); }; nav.appendChild(prev);
  const dp=document.createElement("input"); dp.type="date"; dp.value=day; dp.style.margin="0 8px"; dp.max=todayStr(); dp.onchange=e=>{ reportDay = e.target.value||todayStr(); render(); }; nav.appendChild(dp);
  if(!isToday){ const next=document.createElement("button"); next.textContent=shiftDay(day,1)+" →"; next.onclick=()=>{ reportDay=shiftDay(day,1); if(reportDay===todayStr()) reportDay=null; render(); }; nav.appendChild(next);
    const tb=document.createElement("button"); tb.textContent="Today"; tb.style.marginLeft="8px"; tb.onclick=()=>{ reportDay=null; render(); }; nav.appendChild(tb); }
  app.appendChild(nav);
  const done=DB.records.filter(r=>(r.status==="PAID"||r.status==="CLOSED"||r.status==="REFUNDED") && dayOf(r.ts)===day);
  const L=(lab,val,bold)=>"<div class='line'>"+(bold?"<b>":"<span>")+lab+(bold?"</b>":"</span>")+"<span class='spacer'></span>"+(bold?"<b>":"<span>")+val+(bold?"</b>":"</span>")+"</div>";
  // ---- daily sales summary (refund-aware: a refunded order's sale nets out, its reversed tender nets its tenders) ----
  let net=0, tax=0, tips=0, disc=0, items=0, refunds=0, orders=0; const byTender={}, byCat={};
  done.forEach(r=>{ const rf=r.status==="REFUNDED";
    if(rf){ refunds += recordTotal(r); }
    else { orders++; net += recordNet(r); tax += recordTax(r); tips += r.tip||0; disc += recordDiscount(r);
      r.lines.forEach(l=>{ items += l.qty; byCat[l.category||"other"]=(byCat[l.category||"other"]||0)+l.price*l.qty; }); }
    (r.tenders||[]).forEach(t=>{ byTender[t.type]=(byTender[t.type]||0)+t.amount; });   // refund pushes offsetting negative tenders, so this nets
  });
  const onAccount=byTender.account||0;   // charged to house accounts today — money owed, not money collected
  const collected=Object.keys(byTender).filter(k=>k!=="account").reduce((s,k)=>s+byTender[k],0);
  const sum=document.createElement("div"); sum.className="card";
  sum.innerHTML="<div class='row'><b>Sales summary</b></div>"
    + L("Orders", String(orders)) + L("Items sold", String(items))
    + L("Net sales", money(net)) + (disc?L("Discounts","−"+money(disc)):"") + L("Tax collected", money(tax)) + (tips?L("Tips", money(tips)):"") + (refunds?L("Refunds","−"+money(refunds)):"")
    + L("Total collected", money(collected), true) + (onAccount?L("On account (A/R)", money(onAccount)):"");
  app.appendChild(sum);
  if(Object.keys(byTender).length){ const tc=document.createElement("div"); tc.className="card"; tc.innerHTML="<div class='row'><b>By tender</b></div>"+Object.keys(byTender).map(k=>L(k[0].toUpperCase()+k.slice(1), money(byTender[k]))).join(""); app.appendChild(tc); }
  if(Object.keys(byCat).length){ const cc=document.createElement("div"); cc.className="card"; cc.innerHTML="<div class='row'><b>By category</b></div>"+Object.keys(byCat).sort((a,b)=>byCat[b]-byCat[a]).map(k=>L(k, money(byCat[k]))).join(""); app.appendChild(cc); }
  // ---- cash drawer count ----
  const dc=document.createElement("div"); dc.className="card";
  dc.innerHTML="<div class='row'><b>Cash drawer</b></div>"+L("Expected cash", money(byTender.cash||0));
  const cnt=document.createElement("div"); cnt.className="fld"; cnt.innerHTML="<span class='flab'>Counted</span>";
  const inp=document.createElement("input"); inp.id="cashCount"; inp.type="number"; inp.placeholder="$"; inp.style.width="100px";
  const diff=document.createElement("span"); diff.className="muted"; diff.style.marginLeft="10px";
  inp.oninput=()=>{ const c=Number(inp.value); if(inp.value===""){ diff.textContent=""; return; } const d=+(c-(byTender.cash||0)).toFixed(2); diff.textContent = d===0?"balanced ✓":(d>0?"over +"+money(d):"short "+money(-d)); diff.style.color = d===0?"var(--good)":"var(--warn)"; };
  cnt.appendChild(inp); cnt.appendChild(diff); dc.appendChild(cnt); app.appendChild(dc);
  // ---- labor: hours off the time clock (closes the loop with the timeclock station) ----
  if((DB.punches||[]).length){
    const now=Date.now(); const byStaff={}; let stillOn=false;
    DB.punches.forEach(pn=>{ if(!pn.out) stillOn=true; byStaff[pn.name]=(byStaff[pn.name]||0)+((pn.out?pn.outTs:now)-pn.inTs)/3600000; });
    const lc=document.createElement("div"); lc.className="card"; lc.innerHTML="<div class='row'><b>Labor — hours today</b></div>";
    let tot=0; Object.keys(byStaff).forEach(n=>{ tot+=byStaff[n]; lc.innerHTML+=L(n, byStaff[n].toFixed(2)+" h"); });
    lc.innerHTML+=L("Total hours", tot.toFixed(2)+" h", true) + (stillOn?"<div class='muted' style='margin-top:4px'>Some staff are still on the clock.</div>":"");
    app.appendChild(lc);
  }
  // ---- inventory: on-hand + reorder list, with reason-coded adjustments (receive / waste / transfer / recount) ----
  const tracked=FLOW.catalog.filter(tracksStock);
  if(tracked.length){
    const low=tracked.filter(isLowStock);
    const ic=document.createElement("div"); ic.className="card"; ic.innerHTML="<div class='row'><b>Stock</b>"+(low.length?" <span class='pill flag'>"+low.length+" to reorder</span>":"")+"</div>";
    tracked.forEach(item=>{ const oh=stockOnHand(item); const row=document.createElement("div"); row.className="line";
      const status=isOutOfStock(item)?"<span class='pill x86'>out</span>":isLowStock(item)?"<span class='pill flag'>low</span>":"";
      row.innerHTML="<span>"+item.name+" "+status+"</span><span class='spacer'></span><span class='muted'>"+oh+" on hand</span>";
      const qty=document.createElement("input"); qty.type="number"; qty.placeholder="qty"; qty.style.width="60px"; qty.style.margin="0 6px"; qty.className="rcv"; qty.dataset.cat=item.id;
      const sel=document.createElement("select"); sel.className="rcvreason"; Object.keys(STOCK_REASONS).forEach(rz=>{ const o=document.createElement("option"); o.value=rz; o.textContent=rz; sel.appendChild(o); });
      const rb=document.createElement("button"); rb.textContent="Apply"; rb.style.padding="4px 10px"; rb.style.marginLeft="6px";
      rb.onclick=()=>adjustStock(item, qty.value, sel.value);
      row.appendChild(qty); row.appendChild(sel); row.appendChild(rb); ic.appendChild(row); });
    // recent adjustments (audit trail for waste / transfers / recounts)
    const log=(DB.adjustLog||[]).filter(a=>a.day===day && a.reason!=="Receive");
    if(log.length){ const lg=document.createElement("div"); lg.className="muted"; lg.style.marginTop="8px"; lg.innerHTML="<b>Adjustments</b>";
      log.slice(-8).forEach(a=>{ const d=document.createElement("div"); d.textContent=a.at+" · "+a.name+" · "+a.reason+" "+(a.delta>0?"+":"")+a.delta; lg.appendChild(d); }); ic.appendChild(lg); }
    app.appendChild(ic);
  }
  // ---- house accounts (A/R): who owes, with a record-payment to settle ----
  if((FLOW.endpoints.payment.tenders||[]).includes("account")){
    const owing=(DB.customers||[]).filter(c=>(c.balance||0)>0.0001);
    const totalAR=owing.reduce((s,c)=>s+(c.balance||0),0);
    const hc=document.createElement("div"); hc.className="card"; hc.innerHTML="<div class='row'><b>House accounts</b>"+(totalAR>0.0001?" <span class='pill flag'>"+money(totalAR)+" owed</span>":"")+"</div>";
    if(!owing.length){ const e=document.createElement("div"); e.className="muted"; e.textContent="No outstanding balances."; hc.appendChild(e); }
    owing.forEach(c=>{ const row=document.createElement("div"); row.className="line";
      row.innerHTML="<span>"+(c.name||c.phone)+" <small class='muted'>"+c.phone+"</small></span><span class='spacer'></span><span class='muted'>"+money(c.balance)+" owed</span>";
      const amt=document.createElement("input"); amt.type="number"; amt.placeholder="$"; amt.style.width="70px"; amt.style.margin="0 6px"; amt.className="arpay"; amt.dataset.phone=c.phone;
      const pb=document.createElement("button"); pb.textContent="Record payment"; pb.style.padding="4px 10px";
      pb.onclick=()=>{ const n=Number(amt.value)||c.balance; const pay=Math.min(n, c.balance); c.balance=+((c.balance||0)-pay).toFixed(2); if(c.balance<=0.0001) c.balance=0; saveDB(DB); render(); };
      row.appendChild(amt); row.appendChild(pb); hc.appendChild(row); });
    app.appendChild(hc);
  }
  // ---- refunds (back-office: reverse a paid order to its original tender) ----
  const refundable=DB.records.filter(r=>(r.status==="PAID"||r.status==="CLOSED") && recordPaid(r)>0.0001);
  const rc=document.createElement("div"); rc.className="card"; rc.innerHTML="<div class='row'><b>Refund an order</b></div>";
  if(!refundable.length){ const e=document.createElement("div"); e.className="muted"; e.textContent="No paid orders to refund."; rc.appendChild(e); }
  refundable.forEach(r=>{ const tl=[...new Set((r.tenders||[]).map(t=>t.type))].join(", ");
    const row=document.createElement("div"); row.className="line";
    row.innerHTML="<span>#"+r.number+" · "+money(recordPaid(r))+" <small class='muted'>"+tl+"</small></span><span class='spacer'></span>";
    const rb=document.createElement("button"); rb.className="danger"; rb.textContent="Refund"; rb.style.padding="4px 10px";
    rb.onclick=()=>{ if(!confirm("Refund #"+r.number+" "+money(recordPaid(r))+" to "+tl+"?")) return; refundRecord(r); saveDB(DB); render(); };
    row.appendChild(rb); rc.appendChild(row); });
  app.appendChild(rc);
  // ---- commission (only when the trade pays commission) ----
  const pct=(FLOW.commission&&FLOW.commission.pct)||0;
  if(FLOW.performers){
    const per={};
    done.forEach(r=>{ r.lines.filter(l=>l.performer && l.category==="service").forEach(l=>{ per[l.performer]=per[l.performer]||{svc:0,tips:0}; per[l.performer].svc += l.price*l.qty; }); if(r.tip && r.tipTo){ per[r.tipTo]=per[r.tipTo]||{svc:0,tips:0}; per[r.tipTo].tips += r.tip; } });
    Object.keys(per).forEach(n=>{ const d=per[n]; const comm=+(d.svc*pct/100).toFixed(2); const c=document.createElement("div"); c.className="card";
      c.innerHTML="<div class='row'><b>"+n+"</b></div>"
        +"<div class='line'><span>Service sales</span><span class='spacer'></span><span>"+money(d.svc)+"</span></div>"
        +"<div class='line'><span>Commission ("+pct+"%)</span><span class='spacer'></span><span>"+money(comm)+"</span></div>"
        +"<div class='line'><span>Tips</span><span class='spacer'></span><span>"+money(d.tips)+"</span></div>"
        +"<div class='line'><b>Take-home</b><span class='spacer'></span><b>"+money(comm+d.tips)+"</b></div>";
      app.appendChild(c); });
  }
  // ---- data & backup: your data is yours — take it out any time, restore it any time ----
  const bk=document.createElement("div"); bk.className="card"; bk.innerHTML="<div class='row'><b>Data &amp; backup</b></div>"
    +"<div class='muted' style='margin:2px 0 10px'>Your data lives only in this file (plus your optional hub). Back it up regularly — it's plain, portable, and yours.</div>";
  const mkBtn=(label,fn,cls)=>{ const b=document.createElement("button"); if(cls) b.className=cls; b.textContent=label; b.style.margin="0 8px 8px 0"; b.onclick=fn; return b; };
  bk.appendChild(mkBtn("⬇ Backup (JSON)", ()=>downloadFile(slug()+"-backup-"+todayStr()+".json", backupJSON(), "application/json"), "primary"));
  bk.appendChild(mkBtn("⬇ Customers (CSV)", ()=>downloadFile(slug()+"-customers.csv", customersCSV(), "text/csv")));
  bk.appendChild(mkBtn("⬇ Sales "+day+" (CSV)", ()=>downloadFile(slug()+"-sales-"+day+".csv", salesCSV(day), "text/csv")));
  const rl=document.createElement("label"); rl.textContent="⬆ Restore backup"; rl.className="btn"; rl.style.cssText="display:inline-block;padding:9px 15px;border:1px solid var(--line);border-radius:8px;cursor:pointer";
  const ri=document.createElement("input"); ri.type="file"; ri.accept=".json,application/json"; ri.id="restoreFile"; ri.style.display="none";
  ri.onchange=e=>{ const f=e.target.files[0]; if(!f) return; const rd=new FileReader(); rd.onload=()=>{ try{ if(!confirm("Restore this backup? It replaces the current data on this device.")) return; restoreBackup(rd.result); flash("Backup restored"); render(); }catch(err){ flash("Not a valid backup file"); } }; rd.readAsText(f); };
  rl.appendChild(ri); bk.appendChild(rl);
  app.appendChild(bk);
}

/* TIME CLOCK — staff punch in/out by PIN, then a welcome screen (daily message + specials + encouragement).
   Config: FLOW.staff [{id,name,pin}] and optional FLOW.welcome {message, specials:[...]}. Punches land in DB.punches. */
const CLOCK_CHEERS = ["Have a great shift!","You've got this.","Thanks for being here.","Let's make it a good one.","The team's glad you're on today."];
function openPunch(staffId){ return (DB.punches||[]).find(p=>p.staffId===staffId && !p.out); }
function hoursToday(staffId){ const now=Date.now(); return (DB.punches||[]).filter(p=>p.staffId===staffId).reduce((s,p)=> s + ((p.out? p.outTs : now) - p.inTs), 0)/3600000; }
function punch(staff){
  const open=openPunch(staff.id); const hhmm=new Date().toISOString().slice(11,16);
  if(open){ open.out=hhmm; open.outTs=Date.now(); clockWelcome={ name:staff.name, inbound:false }; }
  else { DB.punches.push({ staffId:staff.id, name:staff.name, in:hhmm, inTs:Date.now(), out:null, outTs:null }); clockWelcome={ name:staff.name, inbound:true }; }
  pinBuf=""; saveDB(DB); render();
}
function renderTimeclock(app, station){
  const staff=FLOW.staff||[];
  // welcome / goodbye screen right after a punch
  if(clockWelcome){
    const w=clockWelcome; const wel=document.createElement("div"); wel.className="card"; wel.style.textAlign="center";
    const cheer=CLOCK_CHEERS[w.name.length % CLOCK_CHEERS.length];  // deterministic (no Math.random in the engine)
    if(w.inbound){
      wel.innerHTML="<h2 style='margin:6px 0'>👋 Welcome, "+w.name+"!</h2><div class='muted' style='margin-bottom:10px'>Clocked in at "+new Date().toISOString().slice(11,16)+" · "+cheer+"</div>";
      const wc=FLOW.welcome||{};
      if(wc.message){ const m=document.createElement("div"); m.className="line"; m.style.justifyContent="center"; m.innerHTML="<span>"+wc.message+"</span>"; wel.appendChild(m); }
      if((wc.specials||[]).length){ const s=document.createElement("div"); s.style.marginTop="8px"; s.innerHTML="<b>Today's specials</b>"; (wc.specials||[]).forEach(sp=>{ const d=document.createElement("div"); d.className="muted"; d.textContent="• "+sp; s.appendChild(d); }); wel.appendChild(s); }
    } else {
      wel.innerHTML="<h2 style='margin:6px 0'>✅ Thanks, "+w.name+"!</h2><div class='muted' style='margin-bottom:10px'>Clocked out · "+hoursToday(staff.find(x=>x.name===w.name)?.id ?? -1).toFixed(2)+" h today. See you next time.</div>";
    }
    const ok=document.createElement("button"); ok.className="primary"; ok.textContent=w.inbound?"Start shift":"Done"; ok.onclick=()=>{ clockWelcome=null; render(); }; wel.appendChild(ok);
    app.appendChild(wel); return;
  }
  app.innerHTML="<h2>"+station.label+"</h2><p class='muted'>Enter your PIN to clock in or out.</p>";
  if(!staff.length){ const e=document.createElement("div"); e.className="empty card"; e.textContent="No staff configured. Add staff (name + PIN) in the builder."; app.appendChild(e); return; }
  // PIN pad
  const pad=document.createElement("div"); pad.className="card"; pad.style.maxWidth="260px";
  const disp=document.createElement("div"); disp.style.cssText="font-size:28px;letter-spacing:8px;text-align:center;min-height:36px;margin-bottom:8px"; disp.textContent=pinBuf.replace(/./g,"•")||"—"; pad.appendChild(disp);
  const grid=document.createElement("div"); grid.style.cssText="display:grid;grid-template-columns:repeat(3,1fr);gap:6px";
  const press=d=>{ pinBuf=(pinBuf+d).slice(0,8); render(); };
  ["1","2","3","4","5","6","7","8","9"].forEach(d=>{ const b=document.createElement("button"); b.textContent=d; b.onclick=()=>press(d); grid.appendChild(b); });
  const clr=document.createElement("button"); clr.textContent="⌫"; clr.onclick=()=>{ pinBuf=pinBuf.slice(0,-1); render(); }; grid.appendChild(clr);
  const zero=document.createElement("button"); zero.textContent="0"; zero.onclick=()=>press("0"); grid.appendChild(zero);
  const ent=document.createElement("button"); ent.className="primary"; ent.textContent="✓"; ent.onclick=()=>{ const who=staff.find(s=>String(s.pin)===pinBuf); if(who){ punch(who); } else { pinBuf=""; flash("PIN not recognized"); render(); } }; grid.appendChild(ent);
  pad.appendChild(grid); app.appendChild(pad);
  // who's on the clock
  const on=staff.filter(s=>openPunch(s.id));
  const oc=document.createElement("div"); oc.className="card"; oc.innerHTML="<div class='row'><b>On the clock</b></div>";
  if(!on.length){ const e=document.createElement("div"); e.className="muted"; e.textContent="Nobody clocked in."; oc.appendChild(e); }
  on.forEach(s=>{ const p=openPunch(s.id); const row=document.createElement("div"); row.className="line"; row.innerHTML="<span>"+s.name+"</span><span class='spacer'></span><span class='muted'>in "+p.in+" · "+hoursToday(s.id).toFixed(2)+" h</span>"; oc.appendChild(row); });
  app.appendChild(oc);
}

/* APPOINTMENTS — book a customer + service + time; check-in turns a booking into a real order in the pipeline.
   Bookings live in DB.bookings; services are the catalog items. Staff options come from FLOW.staff/performers. */
let bookForm = { name:"", service:"", time:"", staff:"" };
function providerNames(){ return (FLOW.performers) || (FLOW.staff||[]).map(s=>s.name); }
function checkInBooking(bk){
  DB=loadDB(); DB.seq++;
  const item=FLOW.catalog.find(i=>i.id===bk.service);
  const line={ id:"L"+DB.seq, catId:item.id, name:item.name, modLabel:"", flags:[], performer:bk.staff||null, price:item.price, qty:1, category:item.category, path:(item.path||[]).slice(), stage:0 };

/* KITCHEN DISPLAY (KDS) — interactive: live tickets with a prep timer that ages green→yellow→red, oldest first,
   and a Bump that fires the whole ticket ready. Thresholds from FLOW.kds {warnSec,badSec} (default 5/10 min). */
function kdsChip(r){
  const k=FLOW.kds||{warnSec:300,badSec:600}; const el=(Date.now()-(r.ts||Date.now()))/1000;
  const cls = el>=k.badSec ? "bad" : el>=k.warnSec ? "warn" : "good";
  return "<span class='pill clock "+cls+"'>"+fmtDur(el)+"</span>";
}
function bumpRecord(r){ r.lines.forEach(l=>{ l.stage=(l.path||[]).length; }); r.bumpedAt=new Date().toISOString().slice(11,16); afterChange(r); render(); }
function renderKDS(app, station){
  app.innerHTML="<h2>"+station.label+"</h2><p class='muted'>Oldest first. Bump a ticket when it's up.</p>";
  const live=DB.records.filter(r=>r.status==="INPROGRESS").sort((a,b)=>(a.ts||0)-(b.ts||0));
  if(!live.length){ const e=document.createElement("div"); e.className="empty card"; e.textContent="All caught up — no tickets working."; app.appendChild(e); }
  live.forEach(r=>{ const c=document.createElement("div"); c.className="card";
    c.innerHTML="<div class='row'><b>#"+r.number+"</b> "+kdsChip(r)+"<span class='spacer'></span><span class='muted'>"+r.createdAt+"</span></div>";
    r.lines.forEach(l=>{ const row=document.createElement("div"); row.className="line"; const where=lineComplete(l)?"ready":("at "+l.path[l.stage]);
      row.innerHTML="<span>"+l.qty+"× "+l.name+(l.modLabel?" <small class='mods'>"+l.modLabel+"</small>":"")+"</span><span class='spacer'></span><span class='muted'>"+where+"</span>"; c.appendChild(row); });
    const bump=document.createElement("button"); bump.className="primary"; bump.textContent="Bump ✓"; bump.style.marginTop="10px"; bump.onclick=()=>{ bumpRecord(r); saveDB(DB); render(); }; c.appendChild(bump);
    app.appendChild(c); });
}

let draft = null;      // the order being built

let pinBuf = "";       // time-clock PIN entry buffer

function attachCustomer(phone, name){
  phone=(phone||"").trim(); if(!phone) return;
  DB=loadDB(); const found=(DB.customers||[]).find(c=>c.phone===phone);
  draft.customer = found ? {...found} : { phone, name:(name||"").trim()||phone, lastItems:[], points:0, gift:0 };
  render();
}
/* loyalty + gift card settlement, applied once when a record is paid */
function onPaid(r){
  if(!r.customer) return;
  const loy=FLOW.endpoints.loyalty;
  const c=(DB.customers||[]).find(x=>x.phone===r.customer.phone); if(!c) return;
  c.points=c.points||0; c.gift=c.gift||0;
  if(loy) c.points += Math.floor(recordTotal(r))*(loy.earnPerDollar||1);               // earn on the ticket
  const gc=r.lines.filter(l=>l.category==="giftcard").reduce((s,l)=>s+l.price*l.qty,0); // gift cards bought credit balance
  if(gc) c.gift += gc;
  if(r.redeemPts) c.points = Math.max(0, c.points - r.redeemPts);                       // spend redeemed points
  if(r.giftUsed)  c.gift   = Math.max(0, c.gift - r.giftUsed);                          // spend gift balance
}

function renderIntake(app, station){
  if(!draft) draft = { lines:[] };
  renderCustomerBar(app, station);
  const cat=document.createElement("div"); cat.innerHTML="<h2>New order</h2>";
  // search / barcode-scan box — shown for big menus or when a scanner is configured (keyboard-wedge types code + Enter)
  const tiles=[];
  const addItem=item=> needsConfig(item) ? (pending={item, choices:{}, addons:[], flags:[], performer:null}, render()) : addLine(item, {}, [], [], null);
  if(FLOW.catalog.length>5 || FLOW.endpoints.scan){
    const search=document.createElement("input"); search.id="catSearch"; search.placeholder="Search or scan…"; search.autocomplete="off"; search.style.cssText="width:100%;margin-bottom:10px";
    search.oninput=()=>{ const q=search.value.trim().toLowerCase(); tiles.forEach(({item,btn})=>{ const hay=(item.name+" "+(item.category||"")+" "+(item.barcode||item.sku||"")).toLowerCase(); btn.style.display=(!q||hay.includes(q))?"":"none"; }); };
    search.onkeydown=e=>{ if(e.key!=="Enter") return; const q=search.value.trim().toLowerCase(); if(!q) return;
      const exact=tiles.find(({item})=>String(item.barcode||item.sku||"").toLowerCase()===q && !item.__out);
      const vis=tiles.find(({btn,item})=>btn.style.display!=="none" && !item.__out);
      const hit=exact||vis; if(hit){ addItem(hit.item); } else { flash("No match for “"+search.value.trim()+"”"); } };
    cat.appendChild(search);
  }
  const grid=document.createElement("div"); grid.className="grid";
  FLOW.catalog.forEach(item=>{
    const b=document.createElement("button"); b.className="tile"; const rem=remainingOf(item); const out=is86(item)||isOutOfStock(item);
    item.__out=out;
    if(out) b.className="tile eightysix";
    const via=item.path.length?item.path.join(" → "):"no prep";
    let sub = station.view.money?money(item.price)+" · "+via:via;
    if(item.par!=null) sub += is86(item) ? " · <span class='pill x86'>86</span>" : " · "+rem+" left";
    if(tracksStock(item)) sub += isOutOfStock(item) ? " · <span class='pill x86'>out of stock</span>" : " · "+stockOnHand(item)+" in stock"+(isLowStock(item)?" <span class='pill flag'>low</span>":"");
    b.innerHTML = item.name + "<small>"+sub+"</small>";
    b.disabled = out;
    b.onclick=()=> addItem(item);
    tiles.push({item, btn:b});
    grid.appendChild(b);
  });
  cat.appendChild(grid); app.appendChild(cat);

  if(pending) app.appendChild(configPanel(station));

  const c=document.createElement("div"); c.className="card";
  if(!draft.lines.length){ c.innerHTML="<div class='empty'>Tap items to build the order.</div>"; }
  else { draft.lines.forEach(l=>{ const row=document.createElement("div"); row.className="line";
      row.innerHTML="<span>"+l.qty+"× "+l.name+(l.modLabel?" <small class='mods'>"+l.modLabel+"</small>":"")+(l.performer?" <span class='pill'>"+l.performer+"</span>":"")+"</span><span class='pill route'>"+((l.path||[]).join(' → ')||'—')+"</span><span class='spacer'></span>"+(station.view.money?"<span>"+money(l.price*l.qty)+"</span>":""); c.appendChild(row); });
    const tot=document.createElement("div"); tot.className="line"; tot.innerHTML="<b>Total</b><span class='spacer'></span><b>"+money(draft.lines.reduce((s,l)=>s+l.price*l.qty,0))+"</b>"; c.appendChild(tot); }
  app.appendChild(c);
  // deposit control (deposit-balance payment point)
  const dep = FLOW.endpoints.payment.deposit;
  if(dep && station.view.money && draft.lines.length){
    const amt=+(draft.lines.reduce((s,l)=>s+l.price*l.qty,0)*dep.pct/100).toFixed(2);
    const db=document.createElement("button"); if(draft.takeDeposit) db.className="sel"; db.style.marginRight="8px";
    db.textContent=(draft.takeDeposit?"✓ ":"")+"Take "+dep.pct+"% deposit "+money(amt);
    db.onclick=()=>{ draft.takeDeposit=!draft.takeDeposit; render(); }; app.appendChild(db);
  }
  // capacity & pacing: a live wait estimate, and a hard cap on orders in the queue
  let atCapacity=false;
  const cap=FLOW.capacity;
  if(cap){
    const active=DB.records.filter(r=>r.status==="INPROGRESS").length;
    atCapacity = active>=cap.max;
    const info=document.createElement("div"); info.className="muted"; info.style.margin="6px 0";
    info.textContent = atCapacity ? "⛔ At capacity ("+active+" in the queue) — hold new orders"
                                  : "~"+(active*cap.perOrderMins)+" min wait · "+active+" in the queue";
    app.appendChild(info);
  }
  const send=document.createElement("button"); send.className="primary"; send.textContent="Send order →"; send.disabled=!draft.lines.length||!!pending||atCapacity; send.onclick=sendDraft; app.appendChild(send);
  // quotes / estimates: save the current draft to come back to, or load a saved one into the order
  if(FLOW.endpoints.quotes){
    const sq=document.createElement("button"); sq.textContent="Save as quote"; sq.style.margin="0 0 0 8px"; sq.disabled=!draft.lines.length||!!pending;
    sq.onclick=()=>{ DB=loadDB(); DB.quoteSeq=(DB.quoteSeq||0)+1; DB.quotes.push({ id:"Q"+DB.quoteSeq, num:DB.quoteSeq, lines:draft.lines.map(l=>({...l})), customer:draft.customer||null, total:+draft.lines.reduce((s,l)=>s+l.price*l.qty,0).toFixed(2), createdAt:new Date().toISOString().slice(11,16) }); draft={lines:[]}; saveDB(DB); render(); }; app.appendChild(sq);
    const quotes=DB.quotes||[];
    if(quotes.length){ const qc=document.createElement("div"); qc.className="card"; qc.style.marginTop="12px"; qc.innerHTML="<div class='row'><b>Saved quotes</b></div>";
      quotes.forEach(q=>{ const row=document.createElement("div"); row.className="line";
        row.innerHTML="<span>Quote #"+q.num+" · "+q.lines.length+" item(s) · "+money(q.total)+(q.customer?" <small class='muted'>"+(q.customer.name||q.customer.phone)+"</small>":"")+"</span><span class='spacer'></span>";
        const load=document.createElement("button"); load.className="good"; load.textContent="Load"; load.style.padding="4px 10px";
        load.onclick=()=>{ draft={ lines:q.lines.map(l=>({...l, stage:0})), customer:q.customer||undefined }; DB=loadDB(); DB.quotes=DB.quotes.filter(x=>x.id!==q.id); saveDB(DB); render(); }; row.appendChild(load);
        const del=document.createElement("button"); del.textContent="×"; del.style.padding="4px 10px"; del.style.marginLeft="6px"; del.onclick=()=>{ DB=loadDB(); DB.quotes=DB.quotes.filter(x=>x.id!==q.id); saveDB(DB); render(); }; row.appendChild(del);
        qc.appendChild(row); });
      app.appendChild(qc); }
  }
}

function configPanel(station){
  const item=pending.item; const c=document.createElement("div"); c.className="card"; c.style.borderColor="var(--brand)";

    wrap.appendChild(opts); c.appendChild(wrap);

    item.flags.forEach(f=>{ const on=pending.flags.includes(f); const b=document.createElement("button"); if(on) b.className="sel";
      b.textContent=(on?"✓ ⚠ ":"⚠ ")+f; b.onclick=()=>{ pending.flags = on?pending.flags.filter(x=>x!==f):[...pending.flags,f]; render(); }; opts.appendChild(b); });
    wrap.appendChild(opts); c.appendChild(wrap);

    const wrap=document.createElement("div"); wrap.className="mgroup"; wrap.innerHTML="<div class='lbl'>Performed by (required)</div>";
    const opts=document.createElement("div"); opts.className="opts";
    (FLOW.performers||[]).forEach(name=>{ const b=document.createElement("button"); if(pending.performer===name) b.className="sel"; b.textContent=name; b.onclick=()=>{ pending.performer=name; render(); }; opts.appendChild(b); });
    wrap.appendChild(opts); c.appendChild(wrap);
  }
  const reqMet=(item.modifiers||[]).every(g=>!g.required||pending.choices[g.group]) && (!item.performer || pending.performer);
  const add=document.createElement("button"); add.className="primary"; add.textContent="Add to order"; add.disabled=!reqMet; add.style.marginRight="8px";
  add.onclick=()=>{ addLine(item, pending.choices, pending.addons, pending.flags, pending.performer); pending=null; render(); };
  const cancel=document.createElement("button"); cancel.textContent="Cancel"; cancel.onclick=()=>{ pending=null; render(); };
  c.appendChild(add); c.appendChild(cancel);
  return c;
}

function addLine(item, choices, addons, flags, performer){
  const mods=[...Object.values(choices||{}), ...(addons||[])];
  const price=item.price + mods.reduce((s,m)=>s+(m.price||0),0);
  const modLabel=mods.map(m=>m.name).filter(Boolean).join(", ");
  draft.lines.push({ id:"L"+Math.round(performance.now()), catId:item.id, name:item.name, modLabel, flags:(flags||[]).slice(), performer:performer||null, price, qty:1, category:item.category, path:item.path.slice(), stage:0 });
  render();
}
function sendDraft(){
  DB=loadDB(); DB.seq++;
  const rec={ id:"R"+DB.seq, number:DB.seq, lines:draft.lines.map(l=>({...l, stage:0})), tenders:[], createdAt:new Date().toISOString().slice(11,16), ts:Date.now() };
  rec.status = allComplete(rec) ? "READY" : "INPROGRESS";
  const dep = FLOW.endpoints.payment.deposit;
  if(draft.takeDeposit && dep){ rec.tenders.push({ type:"deposit", amount:+(recordTotal(rec)*dep.pct/100).toFixed(2) }); }
  if(draft.customer){                          // persist the customer + remember 'the usual'
    rec.customer={ name:draft.customer.name, phone:draft.customer.phone };
    let c=DB.customers.find(x=>x.phone===draft.customer.phone);
    if(!c){ c={ phone:draft.customer.phone, name:draft.customer.name }; DB.customers.push(c); }
    c.name = draft.customer.name || c.name;
    c.lastItems = rec.lines.map(l=>({ catId:l.catId, name:l.name, price:l.price, qty:l.qty, category:l.category, path:(l.path||[]).slice(), performer:l.performer||null, modLabel:l.modLabel||"", flags:(l.flags||[]).slice() }));
  }
  DB.records.push(rec); saveDB(DB); draft=null; render();
}

function renderPipeline(app, station){
  app.innerHTML="<h2>"+station.label+"</h2>";
  const recs=DB.records.filter(r=> r.status==="INPROGRESS" && linesAtStation(r, station.id).length);
  if(!recs.length){ const e=document.createElement("div"); e.className="empty card"; e.textContent="Nothing waiting."; app.appendChild(e); }
  recs.forEach(r=>{ const mine=linesAtStation(r, station.id); const c=document.createElement("div"); c.className="card";
    c.innerHTML="<div class='row'><b>#"+r.number+"</b> <span class='pill'>"+r.status+"</span>"+clockChip(r)+"<span class='spacer'></span><span class='muted'>"+r.createdAt+"</span></div>";
    let hasFlags=false;
    mine.forEach(l=>{ const row=document.createElement("div"); row.className="line"; const next=l.path[l.stage+1];
      const flagHtml=(l.flags||[]).map(f=>{ hasFlags=true; return " <span class='pill flag'>⚠ "+f+"</span>"; }).join("");
      const perfHtml=l.performer?" <span class='pill'>"+l.performer+"</span>":"";
      row.innerHTML="<span>"+l.qty+"× "+l.name+(l.modLabel?" <small class='mods'>"+l.modLabel+"</small>":"")+perfHtml+flagHtml+"</span><span class='spacer'></span><span class='muted'>"+(next?"→ "+next:"→ ready")+"</span>"; c.appendChild(row); });
    // checklist-as-gate: steps at this station must all be done before the record can advance
    let checksOk=true;
    if(station.checklist && station.checklist.length){
      r.checks=r.checks||{}; const done=r.checks[station.id]||{};
      const wrap=document.createElement("div"); wrap.className="mgroup"; wrap.innerHTML="<div class='lbl'>Checklist (required)</div>";
      const opts=document.createElement("div"); opts.className="opts";
      station.checklist.forEach((step,i)=>{ const on=!!done[i]; if(!on) checksOk=false; const bb=document.createElement("button"); if(on) bb.className="sel"; bb.textContent=(on?"✓ ":"○ ")+step; bb.onclick=()=>{ r.checks=r.checks||{}; r.checks[station.id]=r.checks[station.id]||{}; r.checks[station.id][i]=!on; saveDB(DB); render(); }; opts.appendChild(bb); });
      wrap.appendChild(opts); c.appendChild(wrap);
    }
    const needAck = hasFlags && !r.acked;   // acknowledged once per record; persists + broadcasts
    if(needAck){ const a=document.createElement("button"); a.className="primary"; a.textContent="⚠ Acknowledge & continue"; a.style.marginTop="10px"; a.onclick=()=>{ r.acked=true; saveDB(DB); render(); }; c.appendChild(a); }
    else { const b=document.createElement("button"); b.className="good"; b.textContent="Mark done here"; b.style.marginTop="10px"; b.disabled=!checksOk; b.onclick=()=>{ mine.forEach(l=>l.stage++); afterChange(r); render(); }; c.appendChild(b); }
    app.appendChild(c); });
}

function receiptPanel(r){
  const sub=lineSubtotal(r), disc=recordDiscount(r), tax=recordTax(r), tip=r.tip||0, tot=recordTotal(r);
  const line=(l,v,b)=>"<div class='line'>"+(b?"<b>":"<span class='muted'>")+l+(b?"</b>":"</span>")+"<span class='spacer'></span>"+(b?"<b>":"<span>")+v+(b?"</b>":"</span>")+"</div>";
  const rows=r.lines.map(l=>"<div class='line'><span>"+l.qty+"× "+l.name+(l.modLabel?" ("+l.modLabel+")":"")+"</span><span class='spacer'></span><span>"+money(l.price*l.qty)+"</span></div>").join("");
  const hr="<hr style='border:none;border-top:1px dashed var(--line)'>";
  const totals=(disc||tax?line("Subtotal",money(sub)):"")+(disc?line("Discount","−"+money(disc)):"")+(tax?line(taxIncluded()?"Tax (incl.)":"Tax",money(tax)):"")+(tip?line("Tip",money(tip)):"")+line("Total",money(tot),true);
  const tenders=(r.tenders||[]).map(t=>line(t.type==="card"?("💳 "+t.brand+" ••"+t.last4):t.type[0].toUpperCase()+t.type.slice(1), money(t.amount))).join("");
  const wrap=document.createElement("div"); wrap.className="card"; wrap.style.borderColor="var(--brand)"; wrap.id="receipt";
  wrap.innerHTML="<div class='center'><b>"+FLOW.branding.name+"</b><div class='muted'>Order #"+r.number+" · "+r.createdAt+"</div></div>"+hr+rows+hr+totals+(tenders?hr+tenders:"")+"<p class='center muted' style='margin-top:8px'>Thank you!</p>";
  const pr=document.createElement("button"); pr.className="primary"; pr.textContent="Print"; pr.onclick=()=>window.print(); wrap.appendChild(pr);
  return wrap;
}
function renderCheckout(app, station){
  const h=document.createElement("h2"); h.textContent=station.type==="central"?"Ready for pickup":station.label; app.appendChild(h);
  const recs=DB.records.filter(r=> r.status==="READY"||r.status==="PAID");
  if(!recs.length){ const e=document.createElement("div"); e.className="empty card"; e.textContent="No orders ready to check out."; app.appendChild(e); }
  recs.forEach(r=>{ const c=document.createElement("div"); c.className="card"; const bal=recordBalance(r);
    c.innerHTML="<div class='row'><b>#"+r.number+"</b> <span class='pill'>"+r.status+"</span>"+clockChip(r)+"<span class='spacer'></span><span class='muted'>"+r.createdAt+"</span></div>";
    r.lines.forEach(l=>{ const row=document.createElement("div"); row.className="line"; row.innerHTML="<span>"+l.qty+"× "+l.name+(l.modLabel?" <small class='mods'>"+l.modLabel+"</small>":"")+"</span><span class='spacer'></span><span>"+money(l.price*l.qty)+"</span>"; c.appendChild(row); });
    // tip UI (money-math): presets on the service subtotal, attributed to the provider
    const tipCfg=FLOW.endpoints.payment.tip;
    if(tipCfg && r.status==="READY"){
      const base=r.lines.filter(l=>l.performer).reduce((s,l)=>s+l.price*l.qty,0) || recordTotal(r);
      const wrap=document.createElement("div"); wrap.className="mgroup"; wrap.innerHTML="<div class='lbl'>Tip</div>";
      const opts=document.createElement("div"); opts.className="opts";
      tipCfg.presets.forEach(p=>{ const amt=+(base*p/100).toFixed(2); const on=Math.abs((r.tip||0)-amt)<0.005; const b=document.createElement("button"); if(on) b.className="sel"; b.textContent=p+"% "+money(amt); b.onclick=()=>{ r.tip=amt; r.tipTo=firstPerformer(r); saveDB(DB); render(); }; opts.appendChild(b); });
      const no=document.createElement("button"); if(!r.tip) no.className="sel"; no.textContent="No tip"; no.onclick=()=>{ r.tip=0; r.tipTo=null; saveDB(DB); render(); }; opts.appendChild(no);
      wrap.appendChild(opts); c.appendChild(wrap);
    }
    // discounts (opt-in per flow)
    if(FLOW.endpoints.discounts && r.status==="READY"){
      const wrap=document.createElement("div"); wrap.className="mgroup"; wrap.innerHTML="<div class='lbl'>Discount</div>";
      const coupons=Array.isArray(FLOW.endpoints.discounts)?FLOW.endpoints.discounts:null;
      if(coupons){   // named coupon codes: type a code to apply its % or $ off
        const box=document.createElement("div"); box.className="opts";
        const inp=document.createElement("input"); inp.id="couponCode"; inp.placeholder="Coupon code"; inp.style.width="140px"; if(r.coupon) inp.value=r.coupon;
        const apply=document.createElement("button"); apply.textContent="Apply"; apply.onclick=()=>{ const code=(inp.value||"").trim().toUpperCase(); const co=coupons.find(x=>String(x.code).toUpperCase()===code); if(!co){ flash("No such coupon"); return; } r.discount = co.pct ? +(lineSubtotal(r)*co.pct/100).toFixed(2) : (co.amount||0); r.coupon=co.code; saveDB(DB); render(); };
        const clr=document.createElement("button"); clr.textContent="Clear"; clr.onclick=()=>{ r.discount=0; delete r.coupon; saveDB(DB); render(); };
        box.appendChild(inp); box.appendChild(apply); box.appendChild(clr); wrap.appendChild(box);
        if(r.coupon){ const ap=document.createElement("div"); ap.className="muted"; ap.style.marginTop="4px"; ap.textContent="✓ "+r.coupon+" applied"; wrap.appendChild(ap); }
      } else {
        const opts=document.createElement("div"); opts.className="opts";
        const mk=(lab,fn,on)=>{ const bb=document.createElement("button"); if(on) bb.className="sel"; bb.textContent=lab; bb.onclick=()=>{ fn(); saveDB(DB); render(); }; opts.appendChild(bb); };
        mk("10% off", ()=>{ r.discount=+(lineSubtotal(r)*0.10).toFixed(2); }, Math.abs((r.discount||0)-lineSubtotal(r)*0.10)<0.005 && r.discount);
        mk("$5 off", ()=>{ r.discount=5; }, r.discount===5);
        mk("None", ()=>{ r.discount=0; delete r.coupon; }, !r.discount);
        wrap.appendChild(opts);
      }
      c.appendChild(wrap);
    }
    if(r.tip){ const tl=document.createElement("div"); tl.className="line"; tl.innerHTML="<span class='muted'>Tip"+(r.tipTo?" → "+r.tipTo:"")+"</span><span class='spacer'></span><span>"+money(r.tip)+"</span>"; c.appendChild(tl); }
    // redemptions: gift card balance + loyalty points (both attached to the customer)
    if(r.customer && r.status==="READY" && bal>0.0001){
      const cust=(DB.customers||[]).find(x=>x.phone===r.customer.phone)||{}; const loy=FLOW.endpoints.loyalty;
      if((cust.gift||0)>0 && !r.giftUsed){ const amt=Math.min(cust.gift, bal); const b=document.createElement("button"); b.textContent="Pay with gift card "+money(amt); b.style.margin="8px 8px 0 0"; b.onclick=()=>{ r.tenders.push({type:"gift",amount:amt}); r.giftUsed=amt; saveDB(DB); render(); }; c.appendChild(b); }
      if(loy && (cust.points||0)>=loy.redeemPoints && !r.redeemPts){ const b=document.createElement("button"); b.textContent="Redeem "+loy.redeemPoints+" pts (−"+money(loy.redeemValue)+")"; b.style.margin="8px 8px 0 0"; b.onclick=()=>{ r.tenders.push({type:"loyalty",amount:loy.redeemValue}); r.redeemPts=loy.redeemPoints; saveDB(DB); render(); }; c.appendChild(b); }
    }
    (r.tenders||[]).filter(t=>t.type==="card").forEach(t=>{ const cl=document.createElement("div"); cl.className="line"; cl.innerHTML="<span class='muted'>💳 "+t.brand+" ••"+t.last4+"</span><span class='spacer'></span><span>"+money(t.amount)+"</span>"; c.appendChild(cl); });
    // totals: subtotal / discount / tax (shown when either applies)
    const sub=lineSubtotal(r), disc=recordDiscount(r), tax=recordTax(r);
    const totLine=(lab,val)=>{ const d=document.createElement("div"); d.className="line"; d.innerHTML="<span class='muted'>"+lab+"</span><span class='spacer'></span><span>"+val+"</span>"; c.appendChild(d); };
    if(disc||tax){ totLine("Subtotal", money(sub)); }
    if(disc){ totLine("Discount", "−"+money(disc)); }
    if(tax){ totLine(taxIncluded()?"Tax (incl.)":"Tax", money(tax)); }
    const t=document.createElement("div"); t.className="line"; t.innerHTML="<b>Balance</b><span class='spacer'></span><b>"+money(bal)+"</b>"; c.appendChild(t);
    if(r.status==="READY"&&bal>0.0001){ const paid=recordPaid(r);
      // split the check evenly N ways (opt-in) — each tap takes one equal share until the balance clears
      if(FLOW.endpoints.payment.split){
        const wrap=document.createElement("div"); wrap.className="mgroup"; wrap.innerHTML="<div class='lbl'>Split evenly</div>";
        const opts=document.createElement("div"); opts.className="opts";
        [2,3,4].forEach(n=>{ const bb=document.createElement("button"); if(r.splitWays===n) bb.className="sel"; bb.textContent=n+" ways"; bb.onclick=()=>{ r.splitWays=n; r.splitShare=+(recordTotal(r)/n).toFixed(2); saveDB(DB); render(); }; opts.appendChild(bb); });
        const no=document.createElement("button"); if(!r.splitWays) no.className="sel"; no.textContent="No split"; no.onclick=()=>{ delete r.splitWays; delete r.splitShare; saveDB(DB); render(); }; opts.appendChild(no);
        wrap.appendChild(opts); c.appendChild(wrap);
        if(r.splitWays){ const paidShares=Math.round((recordTotal(r)-bal)/r.splitShare); const info=document.createElement("div"); info.className="muted"; info.style.margin="4px 0"; info.textContent=r.splitWays+" shares · "+money(r.splitShare)+" each · "+paidShares+" of "+r.splitWays+" paid"; c.appendChild(info); }
      }
      const payAmt = r.splitWays ? Math.min(r.splitShare, bal) : bal;
      const label = r.splitWays ? "Take share " : (paid>0?"Take balance ":"Take payment ");
      const b=document.createElement("button"); b.className="primary"; b.textContent=label+money(payAmt); b.style.marginTop="10px"; b.onclick=()=>{ r.tenders.push({type:"cash",amount:payAmt}); if(recordBalance(r)<=0.0001){ r.status="PAID"; onPaid(r); } saveDB(DB); render(); }; c.appendChild(b);
      if((FLOW.endpoints.payment.tenders||[]).includes("card")){
        const cb=document.createElement("button"); cb.textContent=(r.splitWays?"Share by card ":"Pay by card ")+money(payAmt); cb.style.margin="10px 0 0 8px";
        cb.onclick=()=>{ const res=payAdapter().charge(Math.round(payAmt*100)); if(res.status==="approved"){ r.tenders.push({type:"card",amount:payAmt,last4:res.last4,brand:res.brand,ref:res.ref}); if(recordBalance(r)<=0.0001){ r.status="PAID"; onPaid(r); } saveDB(DB); render(); } else { flash("Card "+(res.message||"declined")); } };
        c.appendChild(cb);
      }
      // house account: put it on the customer's tab (A/R) — settles the order now, they pay it later
      if((FLOW.endpoints.payment.tenders||[]).includes("account") && r.customer && r.customer.phone){
        const ab=document.createElement("button"); ab.textContent="Charge to account "+money(payAmt); ab.style.margin="10px 0 0 8px";
        ab.onclick=()=>{ r.tenders.push({type:"account",amount:payAmt}); const cust=DB.customers.find(x=>x.phone===r.customer.phone); if(cust){ cust.balance=+((cust.balance||0)+payAmt).toFixed(2); } if(recordBalance(r)<=0.0001){ r.status="PAID"; onPaid(r); } saveDB(DB); render(); }; c.appendChild(ab);
      }
    }
    else if(r.status==="READY"){ const b=document.createElement("button"); b.className="good"; b.textContent="Complete (paid)"; b.style.marginTop="10px"; b.onclick=()=>{ r.status="PAID"; onPaid(r); saveDB(DB); render(); }; c.appendChild(b); }   // fully covered by deposit/gift/loyalty
    else if(r.status==="PAID"){ const b=document.createElement("button"); b.className="good"; b.textContent="Done — close"; b.style.marginTop="10px"; b.onclick=()=>{ r.status="CLOSED"; saveDB(DB); render(); }; c.appendChild(b); }
    const rb=document.createElement("button"); rb.textContent=receiptOpen[r.id]?"Hide receipt":"🧾 Receipt"; rb.style.margin="10px 0 0 8px"; rb.onclick=()=>{ receiptOpen[r.id]=!receiptOpen[r.id]; render(); }; c.appendChild(rb);
    // notify: text the customer their order is ready (processor-agnostic; sim records it, hub sends it)
    if(FLOW.endpoints.notify && r.customer && r.customer.phone && (r.status==="READY"||r.status==="PAID")){
      if(!r.notified){ const nb=document.createElement("button"); nb.textContent="📱 Text ready"; nb.style.margin="10px 0 0 8px";
        nb.onclick=()=>{ const body=composeNotify(r); const res=notifyAdapter().send(r.customer.phone, body); if(res.status==="sent"){ r.notified={ to:res.to, body:res.body }; saveDB(DB); render(); } else { flash("Text failed"); } }; c.appendChild(nb); }
      else { const nl=document.createElement("div"); nl.className="muted"; nl.style.marginTop="8px"; nl.textContent="✓ Texted "+r.notified.to+": “"+r.notified.body+"”"; c.appendChild(nl); }
    }
    if(receiptOpen[r.id]) c.appendChild(receiptPanel(r));
    app.appendChild(c); });
  const closed=DB.records.filter(r=>r.status==="CLOSED").length;
  if(closed){ const f=document.createElement("p"); f.className="muted center"; f.textContent=closed+" order(s) completed today."; app.appendChild(f); }
}

window.addEventListener("storage",(e)=>{ if(e.key===dkey()||e.key===skey()||e.key==="custompos_flow") render(); });
if(SYNC.on){ SYNC.pull(); setInterval(()=>SYNC.pull(), 3000); }   // poll the hub when configured
render();
</script>
