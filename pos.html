/* --- UNIQUE / SERIALIZED INVENTORY: an item marked `serialized` becomes an individually-tracked UNIT with a
   durable tag (HSL for a cleaner, serial for jewelry, IMEI for a repair). Each unit is its own line and flows
   through the item's stops before it's fulfilled. Generalizes per-piece garment tracking — it's just unique
   inventory with stops before it sells. `tagLabel` names the tag; history recall keys off the tag across visits. */
function genUnitTag(){ return (Math.floor(performance.now()).toString(36) + Math.floor(Math.random()*46656).toString(36)).toUpperCase().slice(-7); }
function unitHistory(tag){ if(!tag) return []; try{ return (loadDB().records||[]).filter(r => (r.lines||[]).some(l => l.tag===tag)); }catch(e){ return []; } }
function tagChip(l){ if(!l||!l.serialized) return ""; const lbl=l.tagLabel||"Tag"; const seen=unitHistory(l.tag).length;
  return " <span class='pill' title='"+lbl+"'>🏷 "+(l.tag||"—")+"</span>" + (seen?" <span class='pill' style='border-color:var(--good);color:var(--good)'>↩ returning ×"+(seen+1)+"</span>":""); }
function addLine(item, choices, addons, flags, performer){
  const mods=[...Object.values(choices||{}), ...(addons||[])];
  const price=item.price + mods.reduce((s,m)=>s+(m.price||0),0);
  const modLabel=mods.map(m=>m.name).filter(Boolean).join(", ");
  const cart = editingId ? ((DB.records||[]).find(r=>r.id===editingId)||draft) : draft;   // detailing edits the order; intake edits the draft
  cart.lines.push({ id:"L"+Math.round(performance.now())+Math.floor(Math.random()*1e4), catId:item.id, name:item.name, modLabel, flags:(flags||[]).slice(), performer:performer||null, price, qty:1, category:item.category, path:item.path.slice(), stage:0, course:item.course||1,
    serialized: !!item.serialized, tag: item.serialized ? genUnitTag() : undefined, tagLabel: item.serialized ? (item.tagLabel||"Tag") : undefined });
  if(editingId) saveDB(DB);
  render();
}
function sendDraft(){
  DB=loadDB(); DB.seq++;
  const rec={ id:"R"+DB.seq, number:DB.seq, lines:draft.lines.map(l=>({...l, stage:0})), tenders:[], createdAt:new Date().toISOString().slice(11,16), ts:Date.now() };
  if(storesOn()) rec.storeId = storeForOrder(draft.customer);   // order belongs to a store (customer's, else this device's, else plant)
  if(draft.tableId){ rec.tableId = draft.tableId;   // ring the check to its table; nudge an empty table to "occupied"
    DB.tables=DB.tables||{}; const cur=DB.tables[draft.tableId]; if(!cur || cur.state==="empty" || !cur.state){ DB.tables[draft.tableId]={ state:"ordered", since:Date.now(), seatedTs:(cur&&cur.seatedTs)||Date.now() }; } }
  rec.status = allComplete(rec) ? "READY" : "INPROGRESS";
  const dep = FLOW.endpoints.payment.deposit;
  if(draft.takeDeposit && dep){ rec.tenders.push({ type:"deposit", amount:+(recordTotal(rec)*dep.pct/100).toFixed(2) }); }
  if(draft.customer){                          // persist the customer + remember 'the usual'
    rec.customer={ name:draft.customer.name, phone:draft.customer.phone };
    let c=DB.customers.find(x=>x.phone===draft.customer.phone);
    if(!c){ c={ phone:draft.customer.phone, name:draft.customer.name }; DB.customers.push(c); }
    c.name = draft.customer.name || c.name;
    if(storesOn() && !c.storeId) c.storeId = rec.storeId;   // remember the customer's home store
    c.lastItems = rec.lines.map(l=>({ catId:l.catId, name:l.name, price:l.price, qty:l.qty, category:l.category, path:(l.path||[]).slice(), performer:l.performer||null, modLabel:l.modLabel||"", flags:(l.flags||[]).slice() }));
  }
  DB.records.push(rec); saveDB(DB); draft=null; render();
}
/* QUICK DROP — take an order now as a piece count, itemize it later at a detail station ("drop now, detail
   later"): a cleaner counts bags at the counter and details at the plant; a repair shop takes the device and
   quotes after diagnosis. General — enabled just by having a `detail` station in the flow. */
function quickDrop(){
  const n=parseInt(prompt("How many pieces are being dropped?","1"),10); if(!n||n<1) return;
  DB=loadDB(); DB.seq++;
  const rec={ id:"R"+DB.seq, number:DB.seq, lines:[], tenders:[], createdAt:new Date().toISOString().slice(11,16), ts:Date.now(), undetailed:true, dropCount:n, status:"INPROGRESS" };
  if(storesOn()) rec.storeId = storeForOrder(draft&&draft.customer);
  if(draft && draft.customer){ rec.customer={ name:draft.customer.name, phone:draft.customer.phone };
    let c=DB.customers.find(x=>x.phone===draft.customer.phone); if(!c){ c={ phone:draft.customer.phone, name:draft.customer.name }; DB.customers.push(c); } if(storesOn()&&!c.storeId) c.storeId=rec.storeId; }
  DB.records.push(rec); draft=null; saveDB(DB); render();
}

/* --- ASSEMBLY: smart bag splitting + in/out reconciliation — both opt-in via station config (inert otherwise).
   station.bag = { max:N, solo:[cats], spread:[cats] } — group this order's pieces into numbered bags: `solo`
   categories bag alone (e.g. comforters), `spread` categories go at most one per bag (spread thick items
   across bags), the rest fill bags up to `max`. Pure + general — any trade that bags/boxes/totes an order.
   station.reconcile = true — every piece must be counted out before the order can leave the station:
   count-in (pieces that arrived) must equal count-out. A loss-prevention gate, keyed per station. */
function bagLines(units, cfg){
  const max=Math.max(1, (cfg&&cfg.max)||4), solo=new Set((cfg&&cfg.solo)||[]), spread=new Set((cfg&&cfg.spread)||[]);
  const bags=[]; const openBag=(isSolo)=>{ const b={items:[], spread:new Set(), solo:!!isSolo}; bags.push(b); return b; };
  units.filter(u=>solo.has(u.category)).forEach(u=>{ openBag(true).items.push(u); });                 // e.g. comforters bag alone
  units.filter(u=>!solo.has(u.category)).forEach(u=>{
    let bag=bags.find(b=>!b.solo && b.items.length<max && !(spread.has(u.category)&&b.spread.has(u.category)));
    if(!bag) bag=openBag(false);
    bag.items.push(u); if(spread.has(u.category)) bag.spread.add(u.category);
  });
  bags.forEach((b,i)=> b.items.forEach(u=> u.bag=i+1));
  return bags.length;
}
function bagOrder(r, station){ const n=bagLines(linesAtStation(r, station.id), station.bag||{}); r.bagsAt=r.bagsAt||{}; r.bagsAt[station.id]=n; saveDB(DB); render(); }
function bagChip(l){ return l.bag ? " <span class='pill' title='Bag'>🧺 bag "+l.bag+"</span>" : ""; }
function reconChecked(r, station, l){ return !!(r.recon && r.recon[station.id] && r.recon[station.id][l.id]); }
function reconToggle(r, station, l){ r.recon=r.recon||{}; r.recon[station.id]=r.recon[station.id]||{}; r.recon[station.id][l.id]=!r.recon[station.id][l.id]; saveDB(DB); render(); }
function pieceCount(lines){ return lines.reduce((s,l)=>s+(l.qty||1),0); }

function renderPipeline(app, station){
  app.innerHTML="<h2>"+station.label+"</h2>";
  const recs=DB.records.filter(r=> r.status==="INPROGRESS" && linesAtStation(r, station.id).length);
  if(!recs.length){ const e=document.createElement("div"); e.className="empty card"; e.textContent="Nothing waiting."; app.appendChild(e); }
  recs.forEach(r=>{ const mine=linesAtStation(r, station.id); const c=document.createElement("div"); c.className="card";
    c.innerHTML="<div class='row'><b>#"+r.number+"</b> <span class='pill'>"+r.status+"</span>"+clockChip(r)+storeChip(r)+tableChip(r)+"<span class='spacer'></span><span class='muted'>"+r.createdAt+"</span></div>";
    let hasFlags=false, reconOk=true;
    mine.forEach(l=>{ const row=document.createElement("div"); row.className="line"; const next=l.path[l.stage+1];
      const flagHtml=(l.flags||[]).map(f=>{ hasFlags=true; return " <span class='pill flag'>⚠ "+f+"</span>"; }).join("");
      const perfHtml=l.performer?" <span class='pill'>"+l.performer+"</span>":"";
      if(station.reconcile){ const ck=reconChecked(r,station,l); if(!ck) reconOk=false; const cb=document.createElement("button"); cb.textContent=ck?"✓":"○"; cb.title="Count this piece out"; cb.style.cssText="padding:2px 9px;margin-right:4px"; if(ck) cb.className="sel"; cb.onclick=()=>reconToggle(r,station,l); row.appendChild(cb); }
      row.insertAdjacentHTML("beforeend","<span>"+l.qty+"× "+l.name+(l.modLabel?" <small class='mods'>"+l.modLabel+"</small>":"")+perfHtml+flagHtml+tagChip(l)+bagChip(l)+"</span><span class='spacer'></span><span class='muted'>"+(next?"→ "+next:"→ ready")+"</span>"); c.appendChild(row); });
    if(station.bag){ const bagged=mine.some(l=>l.bag); const bw=document.createElement("div"); bw.className="mgroup"; bw.innerHTML="<div class='lbl'>Assembly bags</div>";
      const bb=document.createElement("button"); bb.textContent=bagged?("🧺 Re-bag ("+((r.bagsAt&&r.bagsAt[station.id])||0)+" bag(s))"):("🧺 Bag these "+pieceCount(mine)+" piece(s)"); bb.onclick=()=>bagOrder(r,station); bw.appendChild(bb); c.appendChild(bw); }
    if(printOn()){ const pw=document.createElement("div"); pw.className="mgroup"; pw.innerHTML="<div class='lbl'>Print</div>";
      const pt=document.createElement("button"); pt.textContent="🖨 Ticket"; pt.onclick=()=>printDoc("ticket",docTicket(r),{storeId:r.storeId,number:r.number}); pw.appendChild(pt);
      const serial=mine.filter(l=>l.serialized); if(serial.length){ const pg=document.createElement("button"); pg.textContent="🖨 Tags ("+serial.length+")"; pg.style.marginLeft="6px"; pg.onclick=()=>serial.forEach(l=>printDoc("tag",docTag(r,l),{storeId:r.storeId,number:r.number,tag:l.tag})); pw.appendChild(pg); }
      const inbags=mine.filter(l=>l.bag); if(inbags.length){ const cnts={}; inbags.forEach(l=>cnts[l.bag]=(cnts[l.bag]||0)+1); const pb=document.createElement("button"); pb.textContent="🖨 Bag labels"; pb.style.marginLeft="6px"; pb.onclick=()=>Object.keys(cnts).forEach(n=>printDoc("bagLabel",docBagLabel(r,+n,cnts[n]),{storeId:r.storeId,number:r.number,bag:+n})); pw.appendChild(pb); }
      c.appendChild(pw); }
    // checklist-as-gate: steps at this station must all be done before the record can advance
    let checksOk=true;
    if(station.checklist && station.checklist.length){
      r.checks=r.checks||{}; const done=r.checks[station.id]||{};
      const wrap=document.createElement("div"); wrap.className="mgroup"; wrap.innerHTML="<div class='lbl'>Checklist (required)</div>";
      const opts=document.createElement("div"); opts.className="opts";
      station.checklist.forEach((step,i)=>{ const on=!!done[i]; if(!on) checksOk=false; const bb=document.createElement("button"); if(on) bb.className="sel"; bb.textContent=(on?"✓ ":"○ ")+step; bb.onclick=()=>{ r.checks=r.checks||{}; r.checks[station.id]=r.checks[station.id]||{}; r.checks[station.id][i]=!on; saveDB(DB); render(); }; opts.appendChild(bb); });
      wrap.appendChild(opts); c.appendChild(wrap);
    }
    if(station.reconcile){ const inN=pieceCount(mine), outN=pieceCount(mine.filter(l=>reconChecked(r,station,l))); const rc=document.createElement("div"); rc.className="muted"; rc.style.cssText="margin:6px 0"+(reconOk?"":";color:var(--bad)"); rc.textContent=outN+" of "+inN+" pieces counted out"+(reconOk?" ✓":" — count every piece to continue"); c.appendChild(rc); }
    const needAck = hasFlags && !r.acked;   // acknowledged once per record; persists + broadcasts
    if(needAck){ const a=document.createElement("button"); a.className="primary"; a.textContent="⚠ Acknowledge & continue"; a.style.marginTop="10px"; a.onclick=()=>{ r.acked=true; saveDB(DB); render(); }; c.appendChild(a); }
    else { const b=document.createElement("button"); b.className="good"; b.textContent="Mark done here"; b.style.marginTop="10px"; b.disabled=!checksOk || (station.reconcile && !reconOk); b.onclick=()=>{ mine.forEach(l=>l.stage++); afterChange(r); render(); }; c.appendChild(b); }
    app.appendChild(c); });
}

/* DETAIL STATION — itemize a "quick drop" order: reuses the intake catalog + config panel (via addLine's
   activeCart hook) to add/price/tag real pieces onto the dropped order, then "Done detailing" releases it
   onto its normal path. Generalizes a cleaner's quick→detail two-step to any drop-now/itemize-later trade. */
function renderDetail(app, station){
  if(editingId && !(DB.records||[]).find(r=>r.id===editingId)) editingId=null;
  const rec = editingId ? (DB.records||[]).find(r=>r.id===editingId) : null;
  if(!rec){
    app.innerHTML="<h2>"+station.label+"</h2><p class='muted'>Orders dropped, waiting to be itemized.</p>";
    const undetailed=DB.records.filter(r=>r.undetailed);
    if(!undetailed.length){ const e=document.createElement("div"); e.className="empty card"; e.textContent="Nothing waiting to detail."; app.appendChild(e); }
    undetailed.forEach(r=>{ const c=document.createElement("div"); c.className="card"; const cnt=r.dropCount||r.lines.length;
      c.innerHTML="<div class='row'><b>#"+r.number+"</b>"+storeChip(r)+clockChip(r)+"<span class='spacer'></span><span class='muted'>"+(r.customer?r.customer.name+" · ":"")+cnt+" piece(s) dropped</span></div>";
      const open=document.createElement("button"); open.className="primary"; open.textContent="Detail this order"; open.style.marginTop="8px"; open.onclick=()=>{ editingId=r.id; pending=null; render(); }; c.appendChild(open);
      app.appendChild(c); });
    return;
  }
  app.innerHTML="<h2>Detailing #"+rec.number+"</h2>"+(rec.customer?"<p class='muted'>"+rec.customer.name+" · "+rec.customer.phone+"</p>":"")+(rec.dropCount?"<p class='muted'>"+rec.dropCount+" piece(s) were dropped — itemize them below.</p>":"");
  const addItem=item=> needsConfig(item) ? (pending={item, choices:{}, addons:[], flags:[], performer:null}, render()) : addLine(item, {}, [], [], null);
  const grid=document.createElement("div"); grid.className="grid";
  FLOW.catalog.forEach(item=>{ if(is86(item)||isOutOfStock(item)) return; const b=document.createElement("button"); b.className="tile"; b.innerHTML=item.name+"<small>"+(station.view.money?money(item.price):((item.path||[]).join(' → ')||'no prep'))+"</small>"; b.onclick=()=>addItem(item); grid.appendChild(b); });
  app.appendChild(grid);
  if(pending) app.appendChild(configPanel(station));
  const c=document.createElement("div"); c.className="card";
  if(!rec.lines.length){ c.innerHTML="<div class='empty'>No pieces yet — tap items above.</div>"; }
  else rec.lines.forEach(l=>{ const row=document.createElement("div"); row.className="line";
    row.insertAdjacentHTML("beforeend","<span>"+l.qty+"× "+l.name+(l.modLabel?" <small class='mods'>"+l.modLabel+"</small>":"")+tagChip(l)+"</span><span class='spacer'></span>"+(station.view.money?"<span>"+money(l.price*l.qty)+"</span>":""));
    if(l.serialized){ const tb=document.createElement("button"); tb.textContent="🏷 "+(l.tag||"tag"); tb.title="Scan / set the "+(l.tagLabel||"tag"); tb.style.cssText="padding:2px 8px;margin-left:6px"; tb.onclick=()=>{ const v=prompt("Scan or type the "+(l.tagLabel||"tag")+" for this "+l.name+":", l.tag||""); if(v!=null&&v.trim()){ l.tag=v.trim(); saveDB(DB); render(); } }; row.appendChild(tb); }
    const rm=document.createElement("button"); rm.textContent="✕"; rm.title="Remove"; rm.style.cssText="padding:2px 8px;margin-left:6px"; rm.onclick=()=>{ rec.lines=rec.lines.filter(x=>x.id!==l.id); saveDB(DB); render(); }; row.appendChild(rm);
    c.appendChild(row); });
  app.appendChild(c);
  if(printOn() && rec.lines.some(l=>l.serialized)){ const pg=document.createElement("button"); pg.textContent="🖨 Print tags"; pg.style.marginRight="8px"; pg.onclick=()=>rec.lines.filter(l=>l.serialized).forEach(l=>printDoc("tag",docTag(rec,l),{storeId:rec.storeId,number:rec.number,tag:l.tag})); app.appendChild(pg); }
  const done=document.createElement("button"); done.className="good"; done.textContent="Done detailing"; done.disabled=!rec.lines.length||!!pending;
  done.onclick=()=>{ delete rec.undetailed; delete rec.dropCount; rec.detailedAt=new Date().toISOString().slice(11,16); rec.status=allComplete(rec)?"READY":"INPROGRESS"; editingId=null; pending=null; saveDB(DB); render(); };
  app.appendChild(done);
  const back=document.createElement("button"); back.textContent="← Back"; back.style.marginLeft="8px"; back.onclick=()=>{ editingId=null; pending=null; render(); }; app.appendChild(back);
}
/* ===================================== PRINT SEAM =====================================
   One place all printing goes through. Renders a named text template (thermal-friendly) and hands it to the
   local print-agent hook (window.CUSTOMPOS_PRINT) if one is installed, else prints via the browser. Every job
   carries the ORDER's storeId so a multi-store shop routes each doc to that store's printer / colored paper —
   routing follows the ORDER, never the workstation (kernel invariant). Templates: ticket, tag (per serialized
   unit), bagLabel. Templated-print buttons are opt-in via FLOW.endpoints.print; the on-screen receipt Print is
   always available. Inert (no buttons) unless a flow turns it on. */
function printOn(){ return !!(FLOW.endpoints && FLOW.endpoints.print); }
function printHook(){ return (typeof window!=="undefined" && typeof window.CUSTOMPOS_PRINT==="function") ? window.CUSTOMPOS_PRINT : null; }
function printDoc(kind, text, meta){
  const job = Object.assign({ kind, text, biz:(FLOW.branding&&FLOW.branding.name)||"", storeName:(meta&&meta.storeId)?storeName(meta.storeId):"" }, meta||{});
  const hook = printHook();
  if(hook){ try{ hook(job); }catch(e){} return job; }                          // a print agent handles routing to the store's printer
  try{ const w=window.open("","_blank","width=360,height=640");
    if(w){ w.document.write("<pre style=\"font:12px/1.35 ui-monospace,Menlo,Consolas,monospace;white-space:pre-wrap;padding:10px\">"+String(text).replace(/&/g,"&amp;").replace(/</g,"&lt;")+"</pre>"); w.document.close(); w.focus(); w.print(); setTimeout(()=>{ try{ w.close(); }catch(_){}} ,150); }
    else { window.print(); }
  }catch(e){ try{ window.print(); }catch(_){} }
  return job;
}
function dueDateText(r){ const t=FLOW.timer; if(!t||t.mode!=="due"||!r.ts) return ""; return new Date(r.ts + t.promiseSec*1000).toISOString().slice(0,16).replace("T"," "); }
function docLineText(l){ return "  "+(l.qty||1)+"x "+l.name+(l.modLabel?" ("+l.modLabel+")":"")+(l.serialized&&l.tag?"  ["+(l.tagLabel||"Tag")+" "+l.tag+"]":"")+(l.bag?"  bag "+l.bag:""); }
function docTicket(r){
  const L=[]; L.push(((FLOW.branding&&FLOW.branding.name)||"Order").toUpperCase());
  if(storesOn()&&r.storeId){ L.push(storeName(r.storeId)); const aa=assembledAt(r); if(aa) L.push(aa); }
  L.push("Order #"+r.number+"   "+(r.createdAt||"")); if(r.customer) L.push((r.customer.name||"")+"   "+(r.customer.phone||""));
  L.push("------------------------------"); (r.lines||[]).forEach(l=>L.push(docLineText(l)));
  L.push("------------------------------"); const dd=dueDateText(r); if(dd) L.push("Promised: "+dd);
  return L.join("\n");
}
function docTag(r, l){
  const L=[]; if(storesOn()&&r.storeId) L.push(storeName(r.storeId));
  L.push("#"+r.number+(r.customer?"  "+r.customer.name:"")); L.push(l.name+(l.modLabel?" ("+l.modLabel+")":""));
  if(l.serialized&&l.tag) L.push((l.tagLabel||"Tag")+": "+l.tag); if(l.bag) L.push("Bag "+l.bag); const dd=dueDateText(r); if(dd) L.push("Due "+dd);
  return L.join("\n");
}
function docBagLabel(r, bagNo, count){
  const L=[]; if(storesOn()&&r.storeId){ L.push(storeName(r.storeId)); const aa=assembledAt(r); if(aa) L.push(aa.toUpperCase()); }
  L.push("#"+r.number+(r.customer?"  "+r.customer.name:"")); L.push("BAG "+bagNo+"   ("+count+" piece"+(count===1?"":"s")+")");
  return L.join("\n");
}
function receiptPanel(r){
  const sub=lineSubtotal(r), disc=recordDiscount(r), tax=recordTax(r), tip=r.tip||0, tot=recordTotal(r);
  const line=(l,v,b)=>"<div class='line'>"+(b?"<b>":"<span class='muted'>")+l+(b?"</b>":"</span>")+"<span class='spacer'></span>"+(b?"<b>":"<span>")+v+(b?"</b>":"</span>")+"</div>";
  const rows=r.lines.map(l=>"<div class='line'><span>"+l.qty+"× "+l.name+(l.modLabel?" ("+l.modLabel+")":"")+(l.serialized&&l.tag?" <small class='muted'>["+(l.tagLabel||"Tag")+" "+l.tag+"]</small>":"")+"</span><span class='spacer'></span><span>"+money(l.price*l.qty)+"</span></div>").join("");
  const hr="<hr style='border:none;border-top:1px dashed var(--line)'>";
  const totals=(disc||tax?line("Subtotal",money(sub)):"")+(disc?line("Discount","−"+money(disc)):"")+(tax?line(taxIncluded()?"Tax (incl.)":"Tax",money(tax)):"")+(tip?line("Tip",money(tip)):"")+line("Total",money(tot),true);
  const tenders=(r.tenders||[]).map(t=>line(t.type==="card"?("💳 "+t.brand+" ••"+t.last4):t.type[0].toUpperCase()+t.type.slice(1), money(t.amount))).join("");
  const wrap=document.createElement("div"); wrap.className="card"; wrap.style.borderColor="var(--brand)"; wrap.id="receipt";
  wrap.innerHTML="<div class='center'><b>"+FLOW.branding.name+"</b><div class='muted'>Order #"+r.number+" · "+r.createdAt+"</div></div>"+hr+rows+hr+totals+(tenders?hr+tenders:"")+"<p class='center muted' style='margin-top:8px'>Thank you!</p>";
  const pr=document.createElement("button"); pr.className="primary"; pr.textContent="Print"; pr.onclick=()=>window.print(); wrap.appendChild(pr);
  return wrap;
}
/* ===================================== CHECKOUT ===================================== */
function renderCheckout(app, station){
  const h=document.createElement("h2"); h.textContent=station.type==="central"?"Ready for pickup":station.label; app.appendChild(h);
  const recs=DB.records.filter(r=> r.status==="READY"||r.status==="PAID");
  if(!recs.length){ const e=document.createElement("div"); e.className="empty card"; e.textContent="No orders ready to check out."; app.appendChild(e); }
  recs.forEach(r=>{ const c=document.createElement("div"); c.className="card"; const bal=recordBalance(r);
    c.innerHTML="<div class='row'><b>#"+r.number+"</b> <span class='pill'>"+r.status+"</span>"+clockChip(r)+storeChip(r)+tableChip(r)+"<span class='spacer'></span><span class='muted'>"+r.createdAt+"</span></div>";
    r.lines.forEach(l=>{ const row=document.createElement("div"); row.className="line"; row.innerHTML="<span>"+l.qty+"× "+l.name+(l.modLabel?" <small class='mods'>"+l.modLabel+"</small>":"")+"</span><span class='spacer'></span><span>"+money(l.price*l.qty)+"</span>"; c.appendChild(row); });
    // tip UI (money-math): presets on the service subtotal, attributed to the provider
    const tipCfg=FLOW.endpoints.payment.tip;
    if(tipCfg && r.status==="READY"){
      const base=r.lines.filter(l=>l.performer).reduce((s,l)=>s+l.price*l.qty,0) || recordTotal(r);
      const wrap=document.createElement("div"); wrap.className="mgroup"; wrap.innerHTML="<div class='lbl'>Tip</div>";
      const opts=document.createElement("div"); opts.className="opts";
      tipCfg.presets.forEach(p=>{ const amt=+(base*p/100).toFixed(2); const on=Math.abs((r.tip||0)-amt)<0.005; const b=document.createElement("button"); if(on) b.className="sel"; b.textContent=p+"% "+money(amt); b.onclick=()=>{ r.tip=amt; r.tipTo=firstPerformer(r); saveDB(DB); render(); }; opts.appendChild(b); });
      const no=document.createElement("button"); if(!r.tip) no.className="sel"; no.textContent="No tip"; no.onclick=()=>{ r.tip=0; r.tipTo=null; saveDB(DB); render(); }; opts.appendChild(no);
      wrap.appendChild(opts); c.appendChild(wrap);
    }
    // round up for charity (opt-in) — offer to round the total up to the next dollar for a local cause
    const ru=FLOW.endpoints.payment.roundUp;
    if(ru && r.status==="READY"){ const cause=(ru.cause)||"a local cause";
      const base=+(recordTotal(r)-(r.roundUp||0)).toFixed(2); const up=+(Math.ceil(base)-base).toFixed(2);
      const wrap=document.createElement("div"); wrap.className="mgroup"; wrap.innerHTML="<div class='lbl'>Round up for "+cause+"</div>";
      const opts=document.createElement("div"); opts.className="opts";
      if(r.roundUp){ const done=document.createElement("div"); done.className="muted"; done.textContent="♥ Rounded up "+money(r.roundUp)+" for "+cause+" — thank you!"; wrap.appendChild(done);
        const clr=document.createElement("button"); clr.textContent="Undo"; clr.onclick=()=>{ delete r.roundUp; saveDB(DB); render(); }; opts.appendChild(clr);
      } else if(up>0.0001){ const b=document.createElement("button"); b.textContent="♥ Round up to "+money(Math.ceil(base))+" (+"+money(up)+")"; b.onclick=()=>{ r.roundUp=up; saveDB(DB); render(); }; opts.appendChild(b);
        const no=document.createElement("button"); no.textContent="No thanks"; no.onclick=()=>{ r.roundUp=0; saveDB(DB); render(); }; opts.appendChild(no);
      } else { const b=document.createElement("button"); b.textContent="♥ Add $1 for "+cause; b.onclick=()=>{ r.roundUp=1; saveDB(DB); render(); }; opts.appendChild(b); }
      wrap.appendChild(opts); c.appendChild(wrap);
    }
    // discounts (opt-in per flow)
    if(FLOW.endpoints.discounts && r.status==="READY"){
      const wrap=document.createElement("div"); wrap.className="mgroup"; wrap.innerHTML="<div class='lbl'>Discount</div>";
      const coupons=Array.isArray(FLOW.endpoints.discounts)?FLOW.endpoints.discounts:null;
      if(coupons){   // named coupon codes: type a code to apply its % or $ off
        const box=document.createElement("div"); box.className="opts";
        const inp=document.createElement("input"); inp.id="couponCode"; inp.placeholder="Coupon code"; inp.style.width="140px"; if(r.coupon) inp.value=r.coupon;
        const apply=document.createElement("button"); apply.textContent="Apply"; apply.onclick=()=>{ const code=(inp.value||"").trim().toUpperCase(); const co=coupons.find(x=>String(x.code).toUpperCase()===code); if(!co){ flash("No such coupon"); return; } r.discount = co.pct ? +(lineSubtotal(r)*co.pct/100).toFixed(2) : (co.amount||0); r.coupon=co.code; saveDB(DB); render(); };
        const clr=document.createElement("button"); clr.textContent="Clear"; clr.onclick=()=>{ r.discount=0; delete r.coupon; saveDB(DB); render(); };
        box.appendChild(inp); box.appendChild(apply); box.appendChild(clr); wrap.appendChild(box);
        if(r.coupon){ const ap=document.createElement("div"); ap.className="muted"; ap.style.marginTop="4px"; ap.textContent="✓ "+r.coupon+" applied"; wrap.appendChild(ap); }
      } else {
        const opts=document.createElement("div"); opts.className="opts";
        const mk=(lab,fn,on)=>{ const bb=document.createElement("button"); if(on) bb.className="sel"; bb.textContent=lab; bb.onclick=()=>{ fn(); saveDB(DB); render(); }; opts.appendChild(bb); };
        mk("10% off", ()=>{ r.discount=+(lineSubtotal(r)*0.10).toFixed(2); }, Math.abs((r.discount||0)-lineSubtotal(r)*0.10)<0.005 && r.discount);
        mk("$5 off", ()=>{ r.discount=5; }, r.discount===5);
        mk("None", ()=>{ r.discount=0; delete r.coupon; }, !r.discount);
        wrap.appendChild(opts);
      }
      c.appendChild(wrap);
    }
    if(r.tip){ const tl=document.createElement("div"); tl.className="line"; tl.innerHTML="<span class='muted'>Tip"+(r.tipTo?" → "+r.tipTo:"")+"</span><span class='spacer'></span><span>"+money(r.tip)+"</span>"; c.appendChild(tl); }
    // redemptions: gift card balance + loyalty points (both attached to the customer)
    if(r.customer && r.status==="READY" && bal>0.0001){
      const cust=(DB.customers||[]).find(x=>x.phone===r.customer.phone)||{}; const loy=FLOW.endpoints.loyalty;
      if((cust.gift||0)>0 && !r.giftUsed){ const amt=Math.min(cust.gift, bal); const b=document.createElement("button"); b.textContent="Pay with gift card "+money(amt); b.style.margin="8px 8px 0 0"; b.onclick=()=>{ r.tenders.push({type:"gift",amount:amt}); r.giftUsed=amt; saveDB(DB); render(); }; c.appendChild(b); }
      if(loy && (cust.points||0)>=loy.redeemPoints && !r.redeemPts){ const b=document.createElement("button"); b.textContent="Redeem "+loy.redeemPoints+" pts (−"+money(loy.redeemValue)+")"; b.style.margin="8px 8px 0 0"; b.onclick=()=>{ r.tenders.push({type:"loyalty",amount:loy.redeemValue}); r.redeemPts=loy.redeemPoints; saveDB(DB); render(); }; c.appendChild(b); }
    }
    (r.tenders||[]).filter(t=>t.type==="card").forEach(t=>{ const cl=document.createElement("div"); cl.className="line"; cl.innerHTML="<span class='muted'>💳 "+t.brand+" ••"+t.last4+"</span><span class='spacer'></span><span>"+money(t.amount)+"</span>"; c.appendChild(cl); });
    // totals: subtotal / discount / tax (shown when either applies)
    const sub=lineSubtotal(r), disc=recordDiscount(r), tax=recordTax(r);
    const totLine=(lab,val)=>{ const d=document.createElement("div"); d.className="line"; d.innerHTML="<span class='muted'>"+lab+"</span><span class='spacer'></span><span>"+val+"</span>"; c.appendChild(d); };
    if(disc||tax){ totLine("Subtotal", money(sub)); }
    if(disc){ totLine("Discount", "−"+money(disc)); }
    if(tax){ totLine(taxIncluded()?"Tax (incl.)":"Tax", money(tax)); }
    const t=document.createElement("div"); t.className="line"; t.innerHTML="<b>Balance</b><span class='spacer'></span><b>"+money(bal)+"</b>"; c.appendChild(t);
    if(r.status==="READY"&&bal>0.0001){ const paid=recordPaid(r);
      // age-restricted gate: if the order has 21+/18+ items, block payment until the ID is checked
      const ageReq=orderAgeReq(r);
      if(ageReq && !r.ageVerified){
        const gate=document.createElement("div"); gate.className="mgroup"; gate.style.cssText="border:1px solid var(--bad);border-radius:8px;padding:10px;margin-top:10px";
        gate.innerHTML="<div style='color:var(--bad);font-weight:700'>⚠ Age-restricted order</div><div class='muted'>This order has items that require the customer to be "+ageReq+"+. Check a photo ID before selling.</div>";
        const ok=document.createElement("button"); ok.className="primary"; ok.style.marginTop="8px"; ok.textContent="✓ ID checked — customer is "+ageReq+"+"; ok.onclick=()=>{ r.ageVerified=ageReq; saveDB(DB); render(); }; gate.appendChild(ok);
        c.appendChild(gate); app.appendChild(c); return;   // no tenders until verified
      }
      // split the check evenly N ways (opt-in) — each tap takes one equal share until the balance clears
      if(FLOW.endpoints.payment.split){
        const wrap=document.createElement("div"); wrap.className="mgroup"; wrap.innerHTML="<div class='lbl'>Split evenly</div>";
        const opts=document.createElement("div"); opts.className="opts";
        [2,3,4].forEach(n=>{ const bb=document.createElement("button"); if(r.splitWays===n) bb.className="sel"; bb.textContent=n+" ways"; bb.onclick=()=>{ r.splitWays=n; r.splitShare=+(recordTotal(r)/n).toFixed(2); saveDB(DB); render(); }; opts.appendChild(bb); });
        const no=document.createElement("button"); if(!r.splitWays) no.className="sel"; no.textContent="No split"; no.onclick=()=>{ delete r.splitWays; delete r.splitShare; saveDB(DB); render(); }; opts.appendChild(no);
        wrap.appendChild(opts); c.appendChild(wrap);
        if(r.splitWays){ const paidShares=Math.round((recordTotal(r)-bal)/r.splitShare); const info=document.createElement("div"); info.className="muted"; info.style.margin="4px 0"; info.textContent=r.splitWays+" shares · "+money(r.splitShare)+" each · "+paidShares+" of "+r.splitWays+" paid"; c.appendChild(info); }
      }
      const payAmt = r.splitWays ? Math.min(r.splitShare, bal) : bal;
      const label = r.splitWays ? "Take share " : (paid>0?"Take balance ":"Take payment ");
      const b=document.createElement("button"); b.className="primary"; b.textContent=label+money(payAmt); b.style.marginTop="10px"; b.onclick=()=>{ r.tenders.push({type:"cash",amount:payAmt}); if(recordBalance(r)<=0.0001){ r.status="PAID"; onPaid(r); } saveDB(DB); render(); }; c.appendChild(b);
      if((FLOW.endpoints.payment.tenders||[]).includes("card")){
        const cb=document.createElement("button"); cb.textContent=(r.splitWays?"Share by card ":"Pay by card ")+money(payAmt); cb.style.margin="10px 0 0 8px";
        cb.onclick=()=>{ const res=payAdapter().charge(Math.round(payAmt*100)); if(res.status==="approved"){ r.tenders.push({type:"card",amount:payAmt,last4:res.last4,brand:res.brand,ref:res.ref}); if(recordBalance(r)<=0.0001){ r.status="PAID"; onPaid(r); } saveDB(DB); render(); } else { flash("Card "+(res.message||"declined")); } };
        c.appendChild(cb);
      }
      // house account: put it on the customer's tab (A/R) — settles the order now, they pay it later
      if((FLOW.endpoints.payment.tenders||[]).includes("account") && r.customer && r.customer.phone){
        const ab=document.createElement("button"); ab.textContent="Charge to account "+money(payAmt); ab.style.margin="10px 0 0 8px";
        ab.onclick=()=>{ r.tenders.push({type:"account",amount:payAmt}); const cust=DB.customers.find(x=>x.phone===r.customer.phone); if(cust){ cust.balance=+((cust.balance||0)+payAmt).toFixed(2); } if(recordBalance(r)<=0.0001){ r.status="PAID"; onPaid(r); } saveDB(DB); render(); }; c.appendChild(ab);
      }
    }
    else if(r.status==="READY"){ const b=document.createElement("button"); b.className="good"; b.textContent="Complete (paid)"; b.style.marginTop="10px"; b.onclick=()=>{ r.status="PAID"; onPaid(r); saveDB(DB); render(); }; c.appendChild(b); }   // fully covered by deposit/gift/loyalty
    else if(r.status==="PAID"){ const b=document.createElement("button"); b.className="good"; b.textContent="Done — close"; b.style.marginTop="10px"; b.onclick=()=>{ r.status="CLOSED"; saveDB(DB); render(); }; c.appendChild(b); }
    const rb=document.createElement("button"); rb.textContent=receiptOpen[r.id]?"Hide receipt":"🧾 Receipt"; rb.style.margin="10px 0 0 8px"; rb.onclick=()=>{ receiptOpen[r.id]=!receiptOpen[r.id]; render(); }; c.appendChild(rb);
    // notify: text the customer their order is ready (processor-agnostic; sim records it, hub sends it)
    if(FLOW.endpoints.notify && r.customer && r.customer.phone && (r.status==="READY"||r.status==="PAID")){
      if(!r.notified){ const nb=document.createElement("button"); nb.textContent="📱 Text ready"; nb.style.margin="10px 0 0 8px";
        nb.onclick=()=>{ const body=composeNotify(r); const res=notifyAdapter().send(r.customer.phone, body); if(res.status==="sent"){ r.notified={ to:res.to, body:res.body }; saveDB(DB); render(); } else { flash("Text failed"); } }; c.appendChild(nb); }
      else { const nl=document.createElement("div"); nl.className="muted"; nl.style.marginTop="8px"; nl.textContent="✓ Texted "+r.notified.to+": “"+r.notified.body+"”"; c.appendChild(nl); }
    }
    if(receiptOpen[r.id]) c.appendChild(receiptPanel(r));
    app.appendChild(c); });
  const closed=DB.records.filter(r=>r.status==="CLOSED").length;
  if(closed){ const f=document.createElement("p"); f.className="muted center"; f.textContent=closed+" order(s) completed today."; app.appendChild(f); }
}

window.addEventListener("storage",(e)=>{ if(e.key===dkey()||e.key===skey()||e.key==="custompos_flow") render(); });
if(SYNC.on){ SYNC.pull(); setInterval(()=>SYNC.pull(), 3000); }   // poll the hub when configured
render();
</script>
