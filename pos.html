<!--
  customPOS — engine skeleton (v0.4)
  ==================================
  Spine (v0.1) · fan-out (v0.2) · per-item paths + central station, two trades on one engine (v0.3).
  v0.4 adds the RULES EVALUATOR — the one mechanism behind several primitives:
    • REQUIRED modifiers  — a choice that must be made before the line can send (steak temp, drink size, starch)
    • SUGGESTED add-ons   — an upsell prompted at order time (oat milk, Scotchgard)
    • 86 / PAR-COUNT      — a remaining-count that decrements and, at zero, disables the item everywhere
  All of it is DATA on the catalog item — no code per trade. Pick the demo business up top.

  One self-contained file, no build, no deps, localStorage. Neutral demo config only.
  Docs: FLOW-SCHEMA.md · MODULE-LIBRARY.md · THE-MODEL.md
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>customPOS — engine skeleton</title>
<style>
  :root { --brand:#1f6feb; --bg:#0f1115; --card:#181b22; --line:#272b33; --ink:#e6e9ef; --dim:#9aa4b2; --good:#2ea043; --warn:#e3893c; --bad:#d0433a; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  header { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:0; }
  header .dot { width:10px; height:10px; border-radius:50%; background:var(--brand); }
  header b { font-size:16px; } header .station { color:var(--dim); } header .spacer { flex:1; }
  header a.link { color:var(--brand); cursor:pointer; text-decoration:none; font-size:13px; }
  main { max-width:820px; margin:0 auto; padding:18px 16px 60px; }
  h2 { font-size:15px; letter-spacing:.02em; text-transform:uppercase; color:var(--dim); margin:22px 0 10px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; margin:10px 0; }
  .row { display:flex; align-items:center; gap:10px; } .row .spacer { flex:1; }
  button { font:inherit; color:var(--ink); background:#222834; border:1px solid var(--line); border-radius:8px; padding:9px 14px; cursor:pointer; }
  button:hover { border-color:var(--brand); } button:disabled { opacity:.4; cursor:default; }
  button.primary { background:var(--brand); border-color:var(--brand); color:#fff; font-weight:600; }
  button.good { background:var(--good); border-color:var(--good); color:#fff; }
  button.sel { border-color:var(--brand); color:var(--brand); background:#1b2536; }
  .tile { display:inline-block; min-width:150px; text-align:left; margin:5px 6px 0 0; }
  .tile small { display:block; color:var(--dim); }
  .tile.eightysix { position:relative; }
  .muted { color:var(--dim); } .center { text-align:center; }
  .pill { font-size:12px; padding:2px 8px; border-radius:20px; background:#222834; color:var(--dim); border:1px solid var(--line); }
  .pill.route { border-color:var(--brand); color:var(--brand); }
  .pill.x86 { border-color:var(--bad); color:var(--bad); }
  .pill.flag { border-color:var(--bad); color:var(--bad); font-weight:600; }
  .pill.clock.good { border-color:var(--good); color:var(--good); }
  .pill.clock.warn { border-color:var(--warn); color:var(--warn); }
  .pill.clock.bad  { border-color:var(--bad);  color:var(--bad); }
  .line { display:flex; gap:8px; padding:6px 0; border-bottom:1px dashed var(--line); align-items:center; }
  .line:last-child { border-bottom:0; } .line small.mods { color:var(--dim); display:block; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:8px; }
  .empty { color:var(--dim); padding:20px; text-align:center; }
  .picker button { display:block; width:100%; text-align:left; margin:8px 0; padding:14px; }
  .picker button b { font-size:16px; } .picker button small { color:var(--dim); }
  .flowsel { display:flex; gap:8px; margin:6px 0 18px; }
  .mgroup { margin:10px 0; } .mgroup .lbl { color:var(--dim); font-size:13px; margin-bottom:5px; }
  .mgroup .opts { display:flex; gap:6px; flex-wrap:wrap; }
</style>

<header>
  <span class="dot" id="brandDot"></span>
  <b id="bizName">customPOS</b>
  <span class="station" id="stationLabel"></span>
  <span class="spacer"></span>
  <a class="link" id="changeStation" style="display:none">change station</a>
</header>
<main id="app"></main>

<script>
/* ============================================================================
   THE FLOWS — businesses as config on ONE engine. Items carry `path` (workstations),
   `modifiers` (required choices), `addons` (suggested upsells), and `par` (86 count).
   ==========================================================================*/
const FLOWS = {
  counter: {
    label:"Counter shop", topology:"linear",
    branding:{ name:"Demo Counter", brandColor:"#1f6feb" },
    endpoints:{ customer:{persist:false}, payment:{tenders:["cash"], closeGate:"balanceLE0"} },
    timer:{ mode:"aging", warnSec:300, badSec:600, label:"prep" },   // ticket ages green->yellow->red
    catalog:[
      {id:"c1", name:"Coffee", price:3.50, category:"drink", path:["bar"]},
      {id:"c2", name:"Latte",  price:4.75, category:"drink", path:["bar"],
        modifiers:[{group:"Size", required:true, options:[{name:"Small",price:0},{name:"Medium",price:0.50},{name:"Large",price:1.00}]}],
        addons:[{name:"Oat milk", price:0.75},{name:"Extra shot", price:0.90}]},
      {id:"c3", name:"Muffin", price:3.25, category:"food", path:["kitchen"], par:1, flags:["Nut allergy"]},   // 86 after 1; flag needs ack at kitchen
      {id:"c4", name:"Bagel",  price:2.75, category:"food", path:["kitchen"]}
    ],
    stations:[
      {id:"order",    type:"intake",      label:"Order Counter", view:{money:true}},
      {id:"bar",      type:"production",  label:"Bar",           view:{money:false}},
      {id:"kitchen",  type:"production",  label:"Kitchen",       view:{money:false}},
      {id:"checkout", type:"fulfillment", label:"Checkout",      view:{money:true}}
    ]
  },
  cleaners: {
    label:"Cleaners", topology:"hub-and-spoke",
    branding:{ name:"Demo Cleaners", brandColor:"#2ea043" },
    endpoints:{ customer:{persist:true}, payment:{tenders:["cash","card","account"], closeGate:"balanceLE0", points:["deposit-balance"], deposit:{pct:50}} },
    timer:{ mode:"due", promiseSec:172800, warnSec:86400, label:"promise" },   // back-scheduled ready-by date
    catalog:[
      {id:"g1", name:"Shirt", price:6.50, category:"press", path:["assembly","rack"],
        modifiers:[{group:"Starch", required:true, options:[{name:"None",price:0},{name:"Light",price:0},{name:"Heavy",price:0.50}]}],
        flags:["Pre-existing damage"]},
      {id:"g2", name:"Pants", price:7.00, category:"press", path:["assembly","rack"]},
      {id:"g3", name:"Wash & Fold", price:2.75, category:"wf", path:["rack"]}
    ],
    stations:[
      {id:"counter",  type:"central",    label:"Front Counter", view:{money:true}},
      {id:"assembly", type:"production",  label:"Assembly",     view:{money:false}},
      {id:"rack",     type:"staging",     label:"Rack",         view:{money:false}}
    ]
  }
};

/* ============================================================================ ENGINE */
function flowId(){ return localStorage.getItem("custompos_flow") || "counter"; }
let FLOW = FLOWS[flowId()];
function dkey(){ return "custompos_demo_"+flowId(); }
function skey(){ return "custompos_station_"+flowId(); }
function loadDB(){ try { return JSON.parse(localStorage.getItem(dkey())) || {records:[],seq:0}; } catch(e){ return {records:[],seq:0}; } }
function saveDB(db){ localStorage.setItem(dkey(), JSON.stringify(db)); }
let DB = loadDB();

function setFlow(id){ localStorage.setItem("custompos_flow", id); FLOW=FLOWS[id]; draft=null; pending=null; DB=loadDB(); render(); }
function boundStation(){ const id=localStorage.getItem(skey()); return FLOW.stations.find(s=>s.id===id)||null; }
function bindStation(id){ localStorage.setItem(skey(), id); render(); }
function unbind(){ localStorage.removeItem(skey()); render(); }

function recordTotal(r){ return r.lines.reduce((s,l)=> s + l.price*l.qty, 0); }
function recordPaid(r){ return (r.tenders||[]).reduce((s,t)=> s + t.amount, 0); }
function recordBalance(r){ return recordTotal(r) - recordPaid(r); }
function lineComplete(l){ return l.stage >= l.path.length; }
function allComplete(r){ return r.lines.every(lineComplete); }
function linesAtStation(r, stationId){ return r.lines.filter(l => !lineComplete(l) && l.path[l.stage]===stationId); }
function afterChange(r){ if(r.status==="INPROGRESS" && allComplete(r)) r.status="READY"; saveDB(DB); }

/* --- TIMER / SLA service: one primitive, aging or back-scheduled-due, threshold colors --- */
function fmtDur(s){ s=Math.max(0,Math.round(s)); if(s>=3600){ const h=Math.floor(s/3600), m=Math.round((s%3600)/60); return h+"h "+m+"m"; } const m=Math.floor(s/60); return m+":"+String(s%60).padStart(2,"0"); }
function clockChip(r){
  const t=FLOW.timer; if(!t||!r.ts) return "";
  let cls, txt;
  if(t.mode==="due"){ const rem=(r.ts + t.promiseSec*1000 - Date.now())/1000;
    cls = rem<0 ? "bad" : rem<=t.warnSec ? "warn" : "good"; txt = rem<0 ? "OVERDUE" : "due "+fmtDur(rem); }
  else { const el=(Date.now()-r.ts)/1000; cls = el>=t.badSec ? "bad" : el>=t.warnSec ? "warn" : "good"; txt = fmtDur(el); }
  return " <span class='pill clock "+cls+"'>"+txt+"</span>";
}

/* --- the RULES EVALUATOR: par/86 remaining, and modifier requirements --- */
function soldOf(catId){
  let n = DB.records.reduce((s,r)=> s + r.lines.filter(l=>l.catId===catId).reduce((a,l)=>a+l.qty,0), 0);
  if(draft) n += draft.lines.filter(l=>l.catId===catId).reduce((a,l)=>a+l.qty,0);
  return n;
}
function remainingOf(item){ return item.par==null ? Infinity : item.par - soldOf(item.id); }
function is86(item){ return remainingOf(item) <= 0; }
function needsConfig(item){ return (item.modifiers&&item.modifiers.length) || (item.addons&&item.addons.length) || (item.flags&&item.flags.length); }

/* ============================================================================ RENDER */
function money(n){ return "$"+n.toFixed(2); }
function render(){
  DB = loadDB();
  document.getElementById("brandDot").style.background = FLOW.branding.brandColor;
  document.getElementById("bizName").textContent = FLOW.branding.name;
  const station = boundStation();
  document.getElementById("stationLabel").textContent = station ? "· "+station.label : "";
  const chg = document.getElementById("changeStation"); chg.style.display = station ? "" : "none"; chg.onclick = unbind;
  const app = document.getElementById("app"); app.innerHTML = "";
  if(!station){ renderPicker(app); return; }
  if(station.type==="intake")           renderIntake(app, station);
  else if(station.type==="production" || station.type==="staging") renderPipeline(app, station);
  else if(station.type==="fulfillment") renderCheckout(app, station);
  else if(station.type==="central"){ renderIntake(app, station); renderCheckout(app, station); }
}

function renderPicker(app){
  const fs=document.createElement("div"); fs.innerHTML="<h2>Demo business</h2>";
  const bar=document.createElement("div"); bar.className="flowsel";
  Object.keys(FLOWS).forEach(id=>{ const b=document.createElement("button"); if(id===flowId()) b.className="sel";
    b.innerHTML=FLOWS[id].label+" <small class='muted'>("+FLOWS[id].topology+")</small>"; b.onclick=()=>setFlow(id); bar.appendChild(b); });
  fs.appendChild(bar); app.appendChild(fs);
  const wrap=document.createElement("div"); wrap.className="picker";
  wrap.innerHTML="<h2>Set up this device</h2><p class='muted'>Which workstation is this? Open in another tab/device and pick a different station to watch an order flow between them.</p>";
  FLOW.stations.forEach(s=>{ const b=document.createElement("button");
    let role=s.type==="central"?"starts and finishes orders":s.type==="intake"?"starts orders":s.type==="fulfillment"?"finishes orders":"a workstation on the path";
    b.innerHTML="<b>"+s.label+"</b><small>"+s.type+" · "+role+"</small>"; b.onclick=()=>bindStation(s.id); wrap.appendChild(b); });
  app.appendChild(wrap);
}

/* ---- intake with the rules evaluator (modifiers + 86) ---- */
let draft = null;      // the order being built
let pending = null;    // an item being configured (required mods / add-ons / flags)
let acked = {};        // station+record acknowledgements (flag gates)
function renderIntake(app, station){
  if(!draft) draft = { lines:[] };
  const cat=document.createElement("div"); cat.innerHTML="<h2>New order</h2>";
  const grid=document.createElement("div"); grid.className="grid";
  FLOW.catalog.forEach(item=>{
    const b=document.createElement("button"); b.className="tile"; const rem=remainingOf(item); const out=is86(item);
    if(out) b.className="tile eightysix";
    const via=item.path.length?item.path.join(" → "):"no prep";
    let sub = station.view.money?money(item.price)+" · "+via:via;
    if(item.par!=null) sub += out ? " · <span class='pill x86'>86</span>" : " · "+rem+" left";
    b.innerHTML = item.name + "<small>"+sub+"</small>";
    b.disabled = out;
    b.onclick=()=> needsConfig(item) ? (pending={item, choices:{}, addons:[], flags:[]}, render()) : addLine(item, {}, [], []);
    grid.appendChild(b);
  });
  cat.appendChild(grid); app.appendChild(cat);

  if(pending) app.appendChild(configPanel(station));

  const c=document.createElement("div"); c.className="card";
  if(!draft.lines.length){ c.innerHTML="<div class='empty'>Tap items to build the order.</div>"; }
  else { draft.lines.forEach(l=>{ const row=document.createElement("div"); row.className="line";
      row.innerHTML="<span>"+l.qty+"× "+l.name+(l.modLabel?" <small class='mods'>"+l.modLabel+"</small>":"")+"</span><span class='pill route'>"+(l.path.join(' → ')||'—')+"</span><span class='spacer'></span>"+(station.view.money?"<span>"+money(l.price*l.qty)+"</span>":""); c.appendChild(row); });
    const tot=document.createElement("div"); tot.className="line"; tot.innerHTML="<b>Total</b><span class='spacer'></span><b>"+money(draft.lines.reduce((s,l)=>s+l.price*l.qty,0))+"</b>"; c.appendChild(tot); }
  app.appendChild(c);
  // deposit control (deposit-balance payment point)
  const dep = FLOW.endpoints.payment.deposit;
  if(dep && station.view.money && draft.lines.length){
    const amt=+(draft.lines.reduce((s,l)=>s+l.price*l.qty,0)*dep.pct/100).toFixed(2);
    const db=document.createElement("button"); if(draft.takeDeposit) db.className="sel"; db.style.marginRight="8px";
    db.textContent=(draft.takeDeposit?"✓ ":"")+"Take "+dep.pct+"% deposit "+money(amt);
    db.onclick=()=>{ draft.takeDeposit=!draft.takeDeposit; render(); }; app.appendChild(db);
  }
  const send=document.createElement("button"); send.className="primary"; send.textContent="Send order →"; send.disabled=!draft.lines.length||!!pending; send.onclick=sendDraft; app.appendChild(send);
}

function configPanel(station){
  const item=pending.item; const c=document.createElement("div"); c.className="card"; c.style.borderColor="var(--brand)";
  c.innerHTML="<b>"+item.name+"</b>";
  (item.modifiers||[]).forEach((g,gi)=>{
    const wrap=document.createElement("div"); wrap.className="mgroup";
    wrap.innerHTML="<div class='lbl'>"+g.group+(g.required?" (required)":"")+"</div>";
    const opts=document.createElement("div"); opts.className="opts";
    g.options.forEach(o=>{ const b=document.createElement("button"); if(pending.choices[g.group]&&pending.choices[g.group].name===o.name) b.className="sel";
      b.textContent=o.name+(o.price?" +"+money(o.price):""); b.onclick=()=>{ pending.choices[g.group]=o; render(); }; opts.appendChild(b); });
    wrap.appendChild(opts); c.appendChild(wrap);
  });
  if(item.addons&&item.addons.length){
    const wrap=document.createElement("div"); wrap.className="mgroup"; wrap.innerHTML="<div class='lbl'>Add-ons?</div>";
    const opts=document.createElement("div"); opts.className="opts";
    item.addons.forEach(a=>{ const on=pending.addons.some(x=>x.name===a.name); const b=document.createElement("button"); if(on) b.className="sel";
      b.textContent=(on?"✓ ":"+ ")+a.name+" "+money(a.price); b.onclick=()=>{ pending.addons = on?pending.addons.filter(x=>x.name!==a.name):[...pending.addons,a]; render(); }; opts.appendChild(b); });
    wrap.appendChild(opts); c.appendChild(wrap);
  }
  if(item.flags&&item.flags.length){
    const wrap=document.createElement("div"); wrap.className="mgroup"; wrap.innerHTML="<div class='lbl'>Flags</div>";
    const opts=document.createElement("div"); opts.className="opts";
    item.flags.forEach(f=>{ const on=pending.flags.includes(f); const b=document.createElement("button"); if(on) b.className="sel";
      b.textContent=(on?"✓ ⚠ ":"⚠ ")+f; b.onclick=()=>{ pending.flags = on?pending.flags.filter(x=>x!==f):[...pending.flags,f]; render(); }; opts.appendChild(b); });
    wrap.appendChild(opts); c.appendChild(wrap);
  }
  const reqMet=(item.modifiers||[]).every(g=>!g.required||pending.choices[g.group]);
  const add=document.createElement("button"); add.className="primary"; add.textContent="Add to order"; add.disabled=!reqMet; add.style.marginRight="8px";
  add.onclick=()=>{ addLine(item, pending.choices, pending.addons, pending.flags); pending=null; render(); };
  const cancel=document.createElement("button"); cancel.textContent="Cancel"; cancel.onclick=()=>{ pending=null; render(); };
  c.appendChild(add); c.appendChild(cancel);
  return c;
}

function addLine(item, choices, addons, flags){
  const mods=[...Object.values(choices||{}), ...(addons||[])];
  const price=item.price + mods.reduce((s,m)=>s+(m.price||0),0);
  const modLabel=mods.map(m=>m.name).filter(Boolean).join(", ");
  draft.lines.push({ id:"L"+Math.round(performance.now()), catId:item.id, name:item.name, modLabel, flags:(flags||[]).slice(), price, qty:1, category:item.category, path:item.path.slice(), stage:0 });
  render();
}
function sendDraft(){
  DB=loadDB(); DB.seq++;
  const rec={ id:"R"+DB.seq, number:DB.seq, lines:draft.lines.map(l=>({...l, stage:0})), tenders:[], createdAt:new Date().toISOString().slice(11,16), ts:Date.now() };
  rec.status = allComplete(rec) ? "READY" : "INPROGRESS";
  const dep = FLOW.endpoints.payment.deposit;
  if(draft.takeDeposit && dep){ rec.tenders.push({ type:"deposit", amount:+(recordTotal(rec)*dep.pct/100).toFixed(2) }); }
  DB.records.push(rec); saveDB(DB); draft=null; render();
}

function renderPipeline(app, station){
  app.innerHTML="<h2>"+station.label+"</h2>";
  const recs=DB.records.filter(r=> r.status==="INPROGRESS" && linesAtStation(r, station.id).length);
  if(!recs.length){ const e=document.createElement("div"); e.className="empty card"; e.textContent="Nothing waiting."; app.appendChild(e); }
  recs.forEach(r=>{ const mine=linesAtStation(r, station.id); const c=document.createElement("div"); c.className="card";
    c.innerHTML="<div class='row'><b>#"+r.number+"</b> <span class='pill'>"+r.status+"</span>"+clockChip(r)+"<span class='spacer'></span><span class='muted'>"+r.createdAt+"</span></div>";
    let hasFlags=false;
    mine.forEach(l=>{ const row=document.createElement("div"); row.className="line"; const next=l.path[l.stage+1];
      const flagHtml=(l.flags||[]).map(f=>{ hasFlags=true; return " <span class='pill flag'>⚠ "+f+"</span>"; }).join("");
      row.innerHTML="<span>"+l.qty+"× "+l.name+(l.modLabel?" <small class='mods'>"+l.modLabel+"</small>":"")+flagHtml+"</span><span class='spacer'></span><span class='muted'>"+(next?"→ "+next:"→ ready")+"</span>"; c.appendChild(row); });
    const needAck = hasFlags && !acked[station.id+":"+r.id];
    if(needAck){ const a=document.createElement("button"); a.className="primary"; a.textContent="⚠ Acknowledge & continue"; a.style.marginTop="10px"; a.onclick=()=>{ acked[station.id+":"+r.id]=true; render(); }; c.appendChild(a); }
    else { const b=document.createElement("button"); b.className="good"; b.textContent="Mark done here"; b.style.marginTop="10px"; b.onclick=()=>{ mine.forEach(l=>l.stage++); afterChange(r); render(); }; c.appendChild(b); }
    app.appendChild(c); });
}

function renderCheckout(app, station){
  const h=document.createElement("h2"); h.textContent=station.type==="central"?"Ready for pickup":station.label; app.appendChild(h);
  const recs=DB.records.filter(r=> r.status==="READY"||r.status==="PAID");
  if(!recs.length){ const e=document.createElement("div"); e.className="empty card"; e.textContent="No orders ready to check out."; app.appendChild(e); }
  recs.forEach(r=>{ const c=document.createElement("div"); c.className="card"; const bal=recordBalance(r);
    c.innerHTML="<div class='row'><b>#"+r.number+"</b> <span class='pill'>"+r.status+"</span>"+clockChip(r)+"<span class='spacer'></span><span class='muted'>"+r.createdAt+"</span></div>";
    r.lines.forEach(l=>{ const row=document.createElement("div"); row.className="line"; row.innerHTML="<span>"+l.qty+"× "+l.name+(l.modLabel?" <small class='mods'>"+l.modLabel+"</small>":"")+"</span><span class='spacer'></span><span>"+money(l.price*l.qty)+"</span>"; c.appendChild(row); });
    const t=document.createElement("div"); t.className="line"; t.innerHTML="<b>Balance</b><span class='spacer'></span><b>"+money(bal)+"</b>"; c.appendChild(t);
    if(r.status==="READY"&&bal>0.0001){ const paid=recordPaid(r); const b=document.createElement("button"); b.className="primary"; b.textContent=(paid>0?"Take balance ":"Take cash ")+money(bal); b.style.marginTop="10px"; b.onclick=()=>{ r.tenders.push({type:"cash",amount:bal}); r.status="PAID"; saveDB(DB); render(); }; c.appendChild(b); }
    else if(r.status==="PAID"){ const b=document.createElement("button"); b.className="good"; b.textContent="Done — close"; b.style.marginTop="10px"; b.onclick=()=>{ r.status="CLOSED"; saveDB(DB); render(); }; c.appendChild(b); }
    app.appendChild(c); });
  const closed=DB.records.filter(r=>r.status==="CLOSED").length;
  if(closed){ const f=document.createElement("p"); f.className="muted center"; f.textContent=closed+" order(s) completed today."; app.appendChild(f); }
}

window.addEventListener("storage",(e)=>{ if(e.key===dkey()||e.key===skey()||e.key==="custompos_flow") render(); });
render();
</script>
