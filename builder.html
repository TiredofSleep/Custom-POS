  customPOS — the builder (customPOS.com in one file)

  Trade-first wizard + a DEEP editor: click a workstation to configure it, click an item to
  configure everything that follows it (its path through the workstations, modifiers, flags,
  performer, 86 limit…), plus business-wide payments/tips/deposit/loyalty/timer/capacity.

// bulk item import: parse "name, price, category, barcode" rows (header auto-detected) into the catalog
function importItemsCSV(text){
  const rows=(text||'').split(/\r?\n/).map(r=>r.trim()).filter(Boolean);
  let added=0;
  rows.forEach((row,i)=>{
    const c=row.split(',').map(s=>s.trim());
    if(i===0 && /name/i.test(c[0]) && (/(price|cost)/i.test(c[1]||''))) return;   // skip a header row
    if(!c[0]) return;
    const it={ id:uid(), name:c[0], price:Number(c[1])||0, category:c[2]||'item', path:[] };
    if(c[3]) it.barcode=c[3];
    cfg.catalog.push(it); added++;
  });
  return added;
}

function genClaudeMd(cfg, build){
  const stations=cfg.stations.map(s=>"- **"+s.label+"** ("+s.type+")"+(s.checklist?" · checklist: "+s.checklist.join(", "):"")).join("\n");
  const items=cfg.catalog.map(i=>"- "+i.name+" — $"+i.price+(i.path&&i.path.length?" (flows: "+i.path.join(" → ")+")":"")+(i.performer?" · by staff":"")+(i.par!=null?" · 86 at "+i.par:"")).join("\n");
  const stamp = build ? `\n> Engine **v${build.version}** · built **${build.builtAt}**. Keep this file with your POS so you know what you're running.\n` : "";
  return `# CLAUDE.md — ${cfg.branding.name} (your point-of-sale)
${stamp}
This is **your** customPOS, generated for a ${(TEMPLATES[tradeKey]||{label:'business'}).label.toLowerCase()}. One self-contained
HTML file, runs in a browser, stores data locally. **You own it.** Open this folder in
[Claude Code](https://claude.com/claude-code) and change anything in plain English.

## It's all one object
The \`window.CUSTOMPOS_FLOW = { ... }\` at the top of the HTML is your whole setup:
- **branding** — name, color.  **endpoints** — tax, tips, deposits, loyalty, card payments.
- **catalog** — your items. Each has a \`path\` = the workstations it flows through (empty = sold at the counter),
  plus optional modifiers, add-ons, flags, a performer, and an 86 limit.
- **stations** — your ${cfg.stations.length} screens/devices. Each device opens the file, signs in, and picks which
  station it is; a station may carry a QC \`checklist\` that gates it.

## Your setup
**Business:** ${cfg.branding.name}  ·  **Layout:** ${cfg.topology}${cfg.staff&&cfg.staff.length?`  ·  **Staff:** ${cfg.staff.length} (clock in by PIN on a Time Clock station)`:''}

**Workstations**
${stations}

**Catalog**
${items}

## How you'll run it
${DEPLOY_NOTE[guide.deploy] || DEPLOY_NOTE.one}

## Across devices & payments
Run the optional hub (\`hub.js\`) to share one live POS across devices; otherwise each device is local.
Card payments are PCI-safe — the browser never sees a card number (see \`docs/PAYMENTS-MODULE.md\`); your
processor credentials live only on your own server.

## Ask Claude Code things like
- "Add an item ___ for $___ that flows through ${ (cfg.stations.find(s=>PATH_TYPES.includes(s.type))||{label:'the work station'}).label }."
- "Put a checklist on ___ before it can be marked ready."
- "Text the customer when their order is ready."

*Built with customPOS — software is free, knowledge is free, and this code is yours.*`;
}

/* ---- assemble + download ---- */
async function assemble(cfg){
  const engine = (typeof window!=="undefined" && window.__ENGINE_SRC__) ? window.__ENGINE_SRC__ : await fetch('pos.html').then(r=>r.text());
  const verM = engine.match(/CUSTOMPOS_VERSION\s*=\s*"([^"]+)"/);
  const build = { version: verM?verM[1]:"?", builtAt: new Date().toISOString().slice(0,10), business: cfg.branding.name };
  const banner = "<!-- customPOS · "+build.business+" · engine v"+build.version+" · built "+build.builtAt+" · your software, your data -->\n";
  const inject = "<script>window.CUSTOMPOS_FLOW = "+JSON.stringify(cfg)+"; window.CUSTOMPOS_BUILD = "+JSON.stringify(build)+";<\/script>\n";
  const html = banner + engine.replace("<script>", inject+"<script>");
  const claudeMd = genClaudeMd(cfg, build);
  window.__build = { flow:cfg, html, claudeMd, build };
  return { html, claudeMd };
}
function blobUrl(text, type){ return URL.createObjectURL(new Blob([text], {type:type||'text/plain'})); }
